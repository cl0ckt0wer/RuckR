name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      # Docker-in-Docker for Testcontainers.MsSql
      docker:
        image: docker:dind
        options: --privileged
        ports:
          - 2375:2375

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore RuckR.sln

      - name: Build
        run: dotnet build RuckR.sln --no-restore --configuration Release

      - name: Install Playwright browsers
        run: |
          dotnet tool install --global Microsoft.Playwright.CLI || true
          ~/.dotnet/tools/playwright install chromium --with-deps

      - name: Run tests
        run: dotnet test RuckR.sln --no-build --configuration Release --logger "console;verbosity=normal" --collect:"XPlat Code Coverage"
        env:
          CI: true
          DOCKER_HOST: tcp://localhost:2375

      - name: Upload coverage
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: '**/TestResults/**/coverage.cobertura.xml'
          retention-days: 7
