    description: >
      Create `RuckR/Server/Controllers/TelemetryController.cs` — an `[ApiController]` with
      `[Route("api/[controller]")]` that accepts batched client-side log entries. The
      endpoint is `POST /api/telemetry` and accepts a JSON array of log entry objects:
      `[{timestamp, level, category, message, exception?, scopes?}]`. Each entry is re-logged
      through the server's `ILogger<TelemetryController>` pipeline (which flows into OTEL).
      Validate payload: reject with 400 if array is empty, max batch size is 200 entries
      (return 413 Payload Too Large if exceeded). No authentication required for MVP
      (same-origin WASM client). Use `System.Text.Json` for deserialization. Follow
      existing controller pattern (block-scoped namespace, constructor DI for ILogger).
      Rate limit to 10 batches per minute per IP to prevent abuse. Return 202 Accepted
      on success (processing is async, not confirmed).
