plan_id: "20260506-otel-logging"
objective: >
  Add OpenTelemetry distributed tracing, metrics, and structured logging to the RuckR
  server, configure WASM client-side ILogger with browser console output, inject
  ILogger<T> into all 5 client services plus CookieAuthenticationStateProvider, and
  build a telemetry bridge so client-side logs flow to the server. This transforms
  RuckR from zero observability to full end-to-end traceability.
created_at: "2026-05-06T14:00:00Z"
created_by: gem-planner
status: pending
research_confidence: high
plan_metrics:
  wave_1_task_count: 3
  total_dependencies: 4
  risk_score: low
tldr: >
  3 waves, 8 tasks. Server OTEL (NuGet + Program.cs + HTTP logging) → Client WASM
  logging (browser console + ILogger DI into 5 services) → Telemetry bridge (server
  endpoint + client custom ILoggerProvider). Server uses OTLP exporter (primary) with
  Console exporter for dev. Client sends batched logs to server via POST /api/telemetry.
  Fixes silent exception swallowing in CookieAuthenticationStateProvider.

open_questions:
  - question: "Should the OTLP exporter be required at startup, or should the app start gracefully when no collector is available?"
    context: "OTLP gRPC default endpoint is http://localhost:4317. In development without a collector running, the exporter may fail to connect."
    type: decision_blocker
    affects: [T2]
  - question: "What should the telemetry bridge batch interval and buffer size be to avoid memory pressure in WASM?"
    context: "WASM runs in a constrained browser tab. Unbounded log buffering risks memory pressure."
    type: decision_blocker
    affects: [T8]

gaps:
  - description: "No environment variable or configuration pattern defined for the OTEL collector endpoint"
    refinement_requests:
      - query: "Should OTEL_EXPORTER_OTLP_ENDPOINT be the sole configuration mechanism, or should appsettings.json also support it?"
        source_hint: "Standard OTEL SDK behavior reads OTEL_EXPORTER_OTLP_ENDPOINT env var; appsettings fallback adds convenience for local dev"

pre_mortem:
  overall_risk_level: low
  critical_failure_modes:
    - scenario: "OTEL NuGet package version incompatible with net10.0, causing build failure"
      likelihood: medium
      impact: medium
      mitigation: "Install packages one at a time, verify dotnet build after each; pin to latest stable versions compatible with net10.0; if a package doesn't support net10.0, fall back to the previous stable release"
    - scenario: "OTLP exporter blocks app startup when collector endpoint is unreachable"
      likelihood: medium
      impact: medium
      mitigation: "Configure OTLP exporter with batch processor (default) which retries in background; app startup should not be blocked; if exporter connection failure crashes startup, wrap in try/catch with fallback to console-only"
    - scenario: "HttpLogging middleware doubles every log entry because OTEL AspNetCore instrumentation also captures requests"
      likelihood: low
      impact: low
      mitigation: "HttpLogging and OTEL instrumentation serve different purposes — HttpLogging captures raw HTTP details (headers, body size), OTEL captures spans with tags. Configure HttpLoggingFields to exclude verbose fields; verify no duplicate span creation"
    - scenario: "WASM telemetry bridge ILoggerProvider causes infinite loop (logs its own POST failures → triggers more logging → more POST failures)"
      likelihood: medium
      impact: high
      mitigation: "Use a dedicated named HttpClient with custom message handler; add a sentinel flag per-batch to prevent re-entrant logging; skip sending logs if previous batch failed within cooldown period; use a separate non-bridged ILogger for the bridge's own diagnostics"
    - scenario: "Browser console logging floods the browser with verbose output, degrading WASM performance"
      likelihood: low
      impact: low
      mitigation: "Set minimum log level to Information (not Debug) in production; use LogLevel configuration from appsettings; filter out SignalR ping/pong noise by category"

  assumptions:
    - "OTEL NuGet packages (1.x line) are compatible with net10.0 target framework"
    - "OTLP collector endpoint default (http://localhost:4317) is acceptable for local dev"
    - "Blazor WASM WebAssemblyHostBuilder.CreateDefault already includes Microsoft.Extensions.Logging with browser console provider"
    - "No third-party log aggregation service (Elastic, Datadog, etc.) required for MVP — OTLP to local collector is sufficient"
    - "Telemetry bridge is fire-and-forget POST with loss tolerance (acceptable for client logs in MVP)"
    - "WASM client and server share the same origin, so no CORS configuration needed for /api/telemetry"

