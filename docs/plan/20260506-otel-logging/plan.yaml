      Controllers/TelemetryController.cs — POST /api/telemetry endpoint
    RuckR.Client/
      Program.cs                        — WASM ILogger configuration + telemetry bridge registration
      Services/
        ApiClientService.cs             — Add ILogger<ApiClientService>
        GeolocationService.cs           — Add ILogger<GeolocationService>
        MapService.cs                   — Add ILogger<MapService>
        SignalRClientService.cs         — Add ILogger<SignalRClientService>
        CookieAuthenticationStateProvider.cs — Add ILogger<CookieAuthenticationStateProvider>
        TelemetryLogProvider.cs         — Custom ILoggerProvider + ILogger for WASM→server bridge

  affected_areas:
    - "RuckR/Server/Program.cs — Add OTEL configuration block (~60 lines) + HttpLogging middleware"
    - "RuckR/Server/RuckR.Server.csproj — Add 7 OTEL PackageReference elements"
    - "RuckR/Client/Program.cs — Add logging configuration + telemetry bridge registration"
    - "RuckR/Client/Services/ApiClientService.cs — Add ILogger DI + log calls"
    - "RuckR/Client/Services/GeolocationService.cs — Add ILogger DI + log calls"
    - "RuckR/Client/Services/MapService.cs — Add ILogger DI + log calls"
    - "RuckR/Client/Services/SignalRClientService.cs — Add ILogger DI + log calls"
    - "RuckR/Client/Services/CookieAuthenticationStateProvider.cs — Add ILogger DI + log auth failures"

  component_details:
    - component: OpenTelemetry Tracing Pipeline
      responsibility: "Distributed tracing for HTTP requests, EF Core queries, and HttpClient calls"
      interfaces: [AspNetCoreInstrumentation, HttpClientInstrumentation, EntityFrameworkCoreInstrumentation]
      dependencies:
        - component: "OTLP Exporter"
          relationship: "exports span data to collector"
        - component: "Console Exporter (dev only)"
          relationship: "outputs spans to stdout for local debugging"
      integration_points: ["ASP.NET Core request pipeline", "EF Core DbContext", "IHttpClientFactory/HttpClient"]

    - component: OpenTelemetry Metrics Pipeline
      responsibility: "Runtime metrics (GC, thread pool) + ASP.NET Core request metrics"
      interfaces: [AspNetCoreInstrumentation, HttpClientInstrumentation, RuntimeInstrumentation]
      dependencies:
        - component: "OTLP Exporter"
          relationship: "exports metric data to collector"
      integration_points: ["ASP.NET Core request pipeline", "HttpClient", "CLR runtime"]

    - component: OpenTelemetry Logging Pipeline
      responsibility: "Structured log export with trace correlation (TraceId/SpanId)"
      interfaces: [IncludeScopes option, OTLP log exporter, Console log exporter]
      dependencies:
        - component: "Microsoft.Extensions.Logging.ILogger<T>"
          relationship: "intercepts all ILogger calls and enriches with trace context"
      integration_points: ["All ILogger<T> consumers across server"]

    - component: Telemetry Bridge (Server)
      responsibility: "Receive batched client-side log entries via POST /api/telemetry"
      interfaces: ["POST /api/telemetry — accepts JSON array of log entries"]
      dependencies:
        - component: "ILogger<TelemetryController>"
          relationship: "re-logs each client entry through server logging pipeline"
      integration_points: ["Server OTEL logging pipeline"]

    - component: Telemetry Bridge (Client)
      responsibility: "Custom ILoggerProvider that batches log entries and POSTs to server"
      interfaces: ["ILoggerProvider, ILogger — registered in WASM DI"]
      dependencies:
        - component: "HttpClient"
          relationship: "POSTs batched logs to /api/telemetry"
        - component: "Microsoft.Extensions.Logging"
          relationship: "implements ILoggerProvider/ILogger for WASM logging pipeline"
      integration_points: ["Blazor WASM DI container", "Server /api/telemetry"]

