open_questions:
  - question: "Is Docker available on the development machine?"
    context: "Jaeger all-in-one Docker image is the recommended OTEL backend. Server log shows OTLP connection failures to localhost:4317 — no collector is running. Cannot verify Docker availability from file analysis alone; requires shell command (docker --version). Docker is referenced in Developer Guide for SQL Server but no docker-compose.yml exists."
    type: "decision_blocker"
    affects: ["Jaeger deployment method", "docker-compose.yml creation", "startup script design"]
  - question: "What PowerShell version is available — Windows PowerShell 5.1 or PowerShell Core (pwsh)?"
    context: "AGENTS.md uses Start-Job which is available in both. But pwsh (PowerShell Core 7+) is cross-platform and preferred for modern tooling. Playwright documentation references 'pwsh' specifically. Cannot verify from file analysis; requires shell command (Get-Command pwsh)."
    type: "decision_blocker"
    affects: ["script shebang/execution method", "cross-platform compatibility", "CI/CD integration"]
  - question: "Should OTEL_EXPORTER_OTLP_ENDPOINT be set in launchSettings.json, a startup script, or appsettings.json?"
    context: "Currently unset anywhere — defaults to http://localhost:4317. launchSettings.json is the logical place for dev (would set it per-profile). A startup script could set it before launching dotnet run. appsettings.json would require custom code to read (OTEL SDK doesn't read appsettings for this). Plan.yaml question is still open."
    type: "research"
    affects: ["startup script design", "launchSettings.json modification", "documentation"]
  - question: "Should the Console exporter be conditional on Development environment?"
    context: "Plan.yaml T2 spec'd Development-only console export. Current implementation has Console exporter always on. Always-on console export dumps verbose metrics to stdout every 10s — useful for dev but noisy for production."
    type: "research"
    affects: ["Program.cs cleanup", "production deployment", "log noise"]
