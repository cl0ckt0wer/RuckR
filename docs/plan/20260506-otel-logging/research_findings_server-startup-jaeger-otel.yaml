tldr: |
  - .opencode/commands/ does NOT exist — no custom OpenCode slash commands are defined.
  - No project-level skills/ directory exists either; only ~/.config/opencode/skills/ (global).
  - scripts/ directory contains 3 JS files (Playwright screenshot capture) — no server startup scripts.
  - OTEL is fully configured: 7 OTLP packages in RuckR.Server.csproj, full pipeline in Program.cs (tracing, metrics, logging), OTLP exporter reads OTEL_EXPORTER_OTLP_ENDPOINT, Console exporter always on.
