patterns_found:
  - category: "naming"
    pattern: "ILogger<T> DI convention"
    description: "ILogger is injected via constructor DI as private readonly field `_logger`. Used in ProfileController, PlayersController, SeedService, ErrorModel."
    examples:
      - file: "ProfileController.cs"
        location: "RuckR/Server/Controllers/ProfileController.cs:12"
        snippet: "private readonly ILogger<ProfileController> _logger;"
    prevalence: "occasional"
  - category: "naming"
    pattern: "No ILogger in non-seed controllers/services"
    description: "CollectionController, BattlesController, PitchesController, BattleHub, BattleResolver, LocationTracker, PlayerGeneratorService — all lack ILogger despite performing critical operations (captures, challenges, GPS tracking, procedural generation)."
    examples:
      - file: "BattlesController.cs"
        location: "RuckR/Server/Controllers/BattlesController.cs:25-29"
        snippet: "public BattlesController(RuckRDbContext db, UserManager<IdentityUser> userManager) { _db = db; _userManager = userManager; }"
    prevalence: "common"
  - category: "architecture"
    pattern: "Silent exception swallowing in Client services"
    description: "Both CookieAuthenticationStateProvider and GeolocationService catch exceptions without logging. SignalRClientService reconnect error handler swallows exceptions (line 165: empty catch)."
    examples:
      - file: "CookieAuthenticationStateProvider.cs"
        location: "RuckR/Client/Services/CookieAuthenticationStateProvider.cs:39-43"
        snippet: "catch { _currentUser = new ClaimsPrincipal(new ClaimsIdentity()); }"
      - file: "GeolocationService.cs"
        location: "RuckR/Client/Services/GeolocationService.cs:44-47"
        snippet: "catch (JSException) { return null; }"
    prevalence: "common"
  - category: "architecture"
    pattern: "Standard ASP.NET Core logging only — no structured logging provider"
    description: "Both Server (WebApplication.CreateBuilder) and Client (WebAssemblyHostBuilder.CreateDefault) use default providers (Console) with no custom builder.Logging configuration."
    examples:
      - file: "Program.cs"
        location: "RuckR/Server/Program.cs:9"
        snippet: "var builder = WebApplication.CreateBuilder(args);"
    prevalence: "common"
  - category: "error_handling"
    pattern: "Activity.Current?.Id for ambient trace context"
    description: "Error.cshtml.cs captures Activity.Current?.Id ?? HttpContext.TraceIdentifier for the RequestId display — uses System.Diagnostics (not OTEL)."
    examples:
      - file: "Error.cshtml.cs"
        location: "RuckR/Server/Pages/Error.cshtml.cs:24"
        snippet: "RequestId = Activity.Current?.Id ?? HttpContext.TraceIdentifier;"
    prevalence: "rare"
