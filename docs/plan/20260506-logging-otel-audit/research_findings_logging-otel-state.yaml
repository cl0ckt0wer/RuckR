plan_id: "20260506-logging-otel-audit"
objective: "Inventory current logging/observability state across the RuckR codebase — all projects, all layers."
focus_area: "logging-otel-state"
created_at: "2026-05-06T12:00:00Z"
created_by: "RESEARCHER"
status: completed
tldr: |
  - No OpenTelemetry, Serilog, NLog, or ApplicationInsights NuGet packages exist anywhere in the solution (4 .csproj files checked).
  - Standard ASP.NET Core logging (console provider) is active via `CreateBuilder` defaults on both Server and Client.
  - LogLevel configured in `appsettings.json` + `appsettings.Development.json`: Default=Information, Microsoft.AspNetCore=Warning.
  - ILogger DI present in 4 server-side classes (ProfileController, PlayersController, SeedService, ErrorModel) but absent from 3 controllers (Collection, Battles, Pitches), the BattleHub, all 3 remaining server services (BattleResolver, LocationTracker, PlayerGeneratorService), and all 5 client-side services.
  - Observability/monitoring is explicitly out-of-scope per PRD (20260505-creature-collector-rugby-gps).
  - `System.Diagnostics.Activity.Current?.Id` used in Error.cshtml.cs (ambient trace ID capture, not OTEL).
