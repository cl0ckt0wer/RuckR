plan_id: "20260505-creature-collector-rugby-gps"
objective: "Diagnose why MapStaticAssets() alone causes 404s on _framework files in .NET 10 Hosted Blazor WASM"
focus_area: "mapstaticassets_blazor_wasm_framework_serving"
created_at: "2026-05-06T21:30:00Z"
created_by: "RESEARCHER"
status: completed
tldr: |
  - Root cause: `MapStaticAssets()` alone cannot serve `_framework` files in the **Hosted Blazor WASM** model (old 3-project structure with `Microsoft.AspNetCore.Components.WebAssembly.Server`). The `UseBlazorFrameworkFiles()` middleware is required.
  - `UseBlazorFrameworkFiles()` creates a dedicated pipeline branch for `/_framework/*` paths with `ContentEncodingNegotiator` + `StaticFileMiddleware` serving files directly from the Client's build output directory.
  - `MapStaticAssets()` discovers `_framework` files in the runtime manifest but does NOT create working endpoint routes for them in the Hosted WASM model.
  - The working test fixture (`CustomWebApplicationFactory`) correctly uses BOTH: `UseBlazorFrameworkFiles()` BEFORE `MapStaticAssets()` (line 146-147).
  - Fix: Restore `app.UseBlazorFrameworkFiles();` at line 75 (before `app.MapStaticAssets();`). Both must coexist.
  - `.NET 10` specific: No regressions found; the MS docs statement "MapStaticAssets replaces UseBlazorFrameworkFiles" applies to the **Blazor Web App** model (`.Client` project with `AddInteractiveWebAssemblyComponents`), NOT the legacy Hosted WASM model used by RuckR.
