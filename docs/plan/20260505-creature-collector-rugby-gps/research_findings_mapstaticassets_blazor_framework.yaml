patterns_found:
  - category: architecture
    pattern: "Hosted Blazor WASM middleware pipeline"
    description: "The Hosted Blazor WASM model (Server+Client+Shared 3-project structure) requires UseBlazorFrameworkFiles() middleware to serve _framework files. MapStaticAssets() alone is insufficient because _framework files are served through a separate pipeline branch managed by Microsoft.AspNetCore.Components.WebAssembly.Server, not through the static web assets endpoint routing system."
    examples:
      - file: "RuckR.Tests/Fixtures/CustomWebApplicationFactory.cs"
        location: "lines 146-147"
        snippet: "_kestrelApp.UseBlazorFrameworkFiles();\n_kestrelApp.MapStaticAssets();"
    prevalence: common
  - category: architecture
    pattern: "MapStaticAssets co-existence with UseBlazorFrameworkFiles"
    description: "When both are used, UseBlazorFrameworkFiles() MUST come BEFORE MapStaticAssets(). UseBlazorFrameworkFiles() intercepts _framework/* requests in a branched pipeline; MapStaticAssets() handles all other static assets via endpoint routing. The order is critical — reversing causes 500 errors (GitHub #57756)."
    examples:
      - file: "RuckR.Tests/Fixtures/CustomWebApplicationFactory.cs"
        location: "lines 146-147"
        snippet: "_kestrelApp.UseBlazorFrameworkFiles();\n_kestrelApp.MapStaticAssets();\n_kestrelApp.UseRouting();"
    prevalence: common
  - category: architecture
    pattern: "Blazor WASM _framework file serving mechanism"
    description: "UseBlazorFrameworkFiles() sets up a middleware branch for /_framework/* paths. In the branch, it inserts ContentEncodingNegotiator (handles .br/.gz compression negotiation) + StaticFileMiddleware to serve files directly from the Client project's build output. This is fundamentally different from MapStaticAssets() which creates endpoint routing conventions."
    examples:
      - file: "RuckR/Server/RuckR.Server.csproj"
        location: "line 10"
        snippet: "<PackageReference Include=\"Microsoft.AspNetCore.Components.WebAssembly.Server\" Version=\"10.0.7\" />"
    prevalence: common
  - category: naming
    pattern: "Fingerprinted _framework filenames"
    description: "Blazor WASM _framework files have fingerprint hashes baked into filenames (e.g., RuckR.Client.t0u3ng1931.wasm). The Blazor runtime resolves these via the boot manifest and requests them by their fingerprinted names."
    examples:
      - file: "RuckR/Client/bin/Debug/net10.0/wwwroot/_framework/RuckR.Client.t0u3ng1931.wasm"
        location: "filename"
        snippet: "RuckR.Client.t0u3ng1931.wasm"
    prevalence: common
