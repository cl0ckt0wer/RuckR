open_questions:
  - question: "Does .NET 10 MapStaticAssets() have a flag or option to handle Hosted Blazor WASM _framework files without UseBlazorFrameworkFiles()?"
    context: "MS docs claim MapStaticAssets replaces UseBlazorFrameworkFiles in .NET 9+, but this does not work for Hosted Blazor WASM. The docs may only apply to the newer Blazor Web App model."
    type: research
    affects: ["Program.cs middleware pipeline"]
  - question: "Is there a .NET 10 regression where UseBlazorFrameworkFiles() + MapStaticAssets() together cause issues (unlike .NET 9 where GitHub #57756 was resolved)?"
    context: "GitHub #57756 was resolved in .NET 9 as 'By Design' — using both was problematic. But the test fixture demonstrates it works. Need to verify .NET 10 behavior hasn't changed."
    type: research
    affects: ["Program.cs middleware pipeline"]
  - question: "Could the _framework 404s be caused by the index.html file not being served from the correct location, preventing the Blazor bootstrap from ever loading?"
    context: "index.html references _framework/blazor.webassembly.js. If index.html itself isn't served correctly, the Blazor app never starts. The MapFallbackToFile('index.html') should serve it, but WebRootPath defaults to the Server's wwwroot (which is empty), not the Client's."
    type: research
    affects: ["Program.cs:95 MapFallbackToFile"]
gaps:
  - area: "MapFallbackToFile WebRootPath"
    description: "MapFallbackToFile('index.html') serves index.html from WebRootPath which defaults to Server's wwwroot (empty). The Client's index.html is in a different location. Without a custom WebRootPath or UseBlazorFrameworkFiles setting it up, the fallback itself may fail to find index.html. However, the static web assets system might serve index.html separately."
    impact: research_blocker
    affects: ["Program.cs:95"]
  - area: "MS Docs applicability to Hosted WASM model"
    description: "The Microsoft documentation statement 'MapStaticAssets also replaces calling UseBlazorFrameworkFiles' may only apply to the Blazor Web App model (.Client project + AddInteractiveWebAssemblyComponents), not the legacy Hosted Blazor WASM model (Server references Client as ProjectReference + Microsoft.AspNetCore.Components.WebAssembly.Server NuGet)."
    impact: decision_blocker
    affects: ["Program.cs:76", "Architecture decision on middleware pipeline"]
  - area: "No build warnings about missing _framework serving"
    description: "The build completes without warnings despite UseBlazorFrameworkFiles() being removed. The static web assets manifests DO include _framework entries (confirmed by grep), but MapStaticAssets() fails to serve them. This is a silent failure — no compile-time or build-time indication that _framework serving is broken."
    impact: research_blocker
    affects: ["Build system", "Developer experience"]
