plan_id: "20260505-creature-collector-rugby-gps"
objective: >
  Transform RuckR from a Blazor WASM demo into a rugby-themed creature-collector game with
  GPS integration, interactive Leaflet map, PVP battles via SignalR, and persistent storage
  via SQL Server. Players explore real-world locations, create rugby pitches, discover and
  collect auto-generated rugby player creatures, and challenge other players in async
  stat-based PVP battles.
created_at: "2026-05-06T01:00:00Z"
created_by: gem-planner
status: pending
research_confidence: high
plan_metrics:
  wave_1_task_count: 7
  total_dependencies: 84
  risk_score: medium
tldr: >
  8 waves, 39 tasks. Foundation (NuGet + models) → Database + Identity → API Controllers →
  Client State (Fluxor + services) → UI Pages (Map, Catalog, Collection) → SignalR Hub →
  PVP Battle System → Polish. Uses MSSQL with geography spatial type per user clarification.
  Fuzzy distance (±20%) applied client-side. Pitches are user-created with rate limiting
  (5/day); players are auto-generated (500) with seed region auto-detected from first user's
  GPS. CollectionModel is single source of truth for captures; PlayerModel is a shared template.
  Challenge expiry via lazy-read (GET /battles/pending); capture GPS validated server-side
  via SignalR in-memory position store.

open_questions: []

gaps:
  - description: "No research on player auto-generation algorithms (name pools, stat distributions, position-based biases)"
    refinement_requests:
