        source_hint: "research_findings_map-rendering-state-management.yaml gap #2"

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "SQL Server LocalDB not available on developer machine"
      likelihood: medium
      impact: high
      mitigation: "Provide Docker SQL Server connection string alternative in appsettings; document Docker setup in W2-02"

    - scenario: "NetTopologySuite not compatible with Blazor WASM (Shared project has SupportedPlatform browser)"
      likelihood: medium
      impact: high
      mitigation: "Reference only NetTopologySuite core (not IO.SqlServerBytes) in Shared; verify WASM compatibility during W1-01; fallback: move Point properties to a shared record struct using doubles"

    - scenario: "Too many NuGet packages cause version conflicts at net10.0"
      likelihood: medium
      impact: medium
      mitigation: "Add packages incrementally per wave; verify dotnet build after each wave; pin all versions to 10.0.7 for ASP.NET packages"

    - scenario: "Leaflet map interop causes WASM memory leaks due to undisposed IJSObjectReference"
      likelihood: low
      impact: medium
      mitigation: "Implement IAsyncDisposable on all map components; wrap DisposeAsync in try/catch for JSDisconnectedException"

    - scenario: "SignalR connection drops on mobile browsers when tab backgrounds"
      likelihood: high
      impact: low
      mitigation: "Use WithAutomaticReconnect() with exponential backoff; show connection status indicator; re-fetch battle state on reconnect"

    - scenario: "Browser geolocation permission denied by user"
      likelihood: medium
      impact: medium
      mitigation: "Graceful fallback: center map on default location; show manual coordinate entry; prompt to enable GPS with educational message"

    - scenario: "Server restart wipes in-memory SignalR location data and group state"
      likelihood: medium
      impact: medium
      mitigation: "Acceptable for MVP — ephemeral location data lost on restart; on reconnect, client re-sends position immediately (W6-03 OnConnectedAsync expects immediate UpdateLocation); active battle groups re-joined on Reconnected event (W6-04); battle data persists in SQL Server"

    - scenario: "Poor GPS accuracy on device causes capture/spoofing issues"
      likelihood: medium
      impact: medium
      mitigation: "Server-side position validation requires recent position (<60s) with accuracy < 50m; reject capture attempts with stale or inaccurate GPS data; use enableHighAccuracy:true in browser geolocation options"

    - scenario: "First user in an empty area has no opponents for PVP"
      likelihood: medium
      impact: medium
      mitigation: "Seed data generates 500 players distributed around first user's GPS region; pitches created by users expand the playable area; API /players/nearby shows players with distance; seed auto-detects from first user's location"

  assumptions:
    - "SQL Server LocalDB is installed on Windows dev machines (included with Visual Studio)"
    - "NetTopologySuite core library is WASM-compatible (pure .NET, no native dependencies)"
    - "ASP.NET Core Identity cookie auth flows automatically to same-origin SignalR connections"
    - "Blazor WASM hosted model serves Leaflet static assets from Client/wwwroot"
    - "OpenStreetMap tile server is accessible (free, no API key required)"
    - "Browser Geolocation API is available in all target browsers (Chrome, Firefox, Edge, Safari)"
    - "Single server instance is sufficient for MVP (no Redis backplane for SignalR)"

implementation_specification:
  code_structure: >
    RuckR.Server/
      Data/              — RuckRDbContext, migrations
      Hubs/              — BattleHub
      Services/          — BattleResolver, ProximityService, PlayerGeneratorService, LocationTracker, SeedService
      Controllers/       — PlayersController, PitchesController, CollectionController, BattlesController, SeedController
      Pages/             — Auth scaffold pages (Identity)
    RuckR.Client/
      Services/          — IGeolocationService, GeolocationService, MapService, SignalRClientService, ApiClientService
      Store/             — Fluxor features: LocationFeature, GameFeature, InventoryFeature, BattleFeature, MapFeature
      Pages/             — Map.razor, Catalog.razor, Collection.razor, PlayerGrid.razor, Battle.razor, PitchCreate.razor, BattleHistory.razor
      Shared/            — NotificationToast.razor, ConnectionStatus.razor
      wwwroot/js/        — geolocation.module.js, leaflet-map.module.js
    RuckR.Shared/
      Models/            — PlayerModel, PitchModel, CollectionModel, BattleModel, GeoPosition, DTOs

  affected_areas:
    - "RuckR.Server/Program.cs — Add DbContext, Identity, SignalR, spatial config"
    - "RuckR.Client/Program.cs — Add Fluxor, SignalR client, typed HttpClient"
    - "RuckR.Client/_Imports.razor — Add Fluxor, SignalR namespaces"
    - "RuckR.Client/App.razor — Add StoreInitializer, set default route to /map"
    - "RuckR.Client/wwwroot/index.html — Add Leaflet CSS/JS CDN links"
    - "RuckR.Client/Shared/NavMenu.razor — Replace demo links with game nav"
    - "appsettings.json — Add connection strings"

  component_details:
    - component: RuckRDbContext
      responsibility: "EF Core DbContext with Identity + game DbSets; spatial column configuration"
      interfaces: [IdentityDbContext, DbSet<PlayerModel>, DbSet<PitchModel>, DbSet<CollectionModel>, DbSet<BattleModel>]
      dependencies:
        - component: "PlayerModel, PitchModel, etc."
          relationship: "referenced as entity types"
      integration_points: ["ASP.NET Core DI", "EF Core migrations", "API controllers"]

    - component: GeoPosition
      responsibility: "Simple DTO for GPS coordinates with validation (lat: -90..90, lng: -180..180)"
      interfaces: [Latitude, Longitude, Accuracy, Timestamp]
      dependencies: []
      integration_points: ["GeolocationService", "API DTOs", "SignalR messages"]

    - component: ILocationTracker / LocationTracker
      responsibility: "Singleton in-memory store for user GPS positions (ConcurrentDictionary<UserId, (GeoPosition, DateTime)>). Created in W3-03; populated by BattleHub UpdateLocation in W6-03. Used for server-side capture proximity validation."
      interfaces: ["TryGetPosition(userId) -> (GeoPosition, DateTime)?", "UpdatePosition(userId, GeoPosition)"]
      dependencies: []
      integration_points: ["CollectionController (W3-03)", "BattleHub (W6-03)"]

    - component: Leaflet JS Module
      responsibility: "Encapsulates all Leaflet.js operations: init map, add/remove markers, pan to location, handle clicks"
      interfaces: ["initMap(element, lat, lng, zoom)", "addPitchMarkers(markers[])", "addUserMarker(lat, lng)", "centerOn(lat, lng)", "dispose()"]
      dependencies: []
      integration_points: ["Map.razor via IJSObjectReference", "DotNet.invokeMethodAsync for callbacks"]

    - component: BattleHub
      responsibility: "SignalR hub for real-time PVP: challenge delivery, accept/decline, location sharing, battle resolution notifications, pitch discovery alerts"
      interfaces: ["SendChallenge", "AcceptChallenge", "DeclineChallenge", "UpdateLocation", "JoinBattleGroup"]
      dependencies:
        - component: RuckRDbContext
          relationship: "persists challenges and battle results"
        - component: BattleResolver
          relationship: "delegates battle resolution logic"
        - component: ILocationTracker
          relationship: "writes user GPS updates to in-memory store"
      integration_points: ["SignalR middleware", "ASP.NET Core Identity [Authorize]"]

