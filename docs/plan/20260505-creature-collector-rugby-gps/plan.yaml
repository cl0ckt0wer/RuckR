      for in-memory user position storage. This service is created here to enable server-side
      GPS validation for capture; BattleHub (W6-03) will populate it via UpdateLocation.
      Create RuckR.Server.Controllers.CollectionController. All endpoints require [Authorize].
      Endpoints: GET /collection (user's collected players with player details),
      POST /collection/capture (capture a player at a pitch — requires {playerId, pitchId}).
      Capture validation: (1) user's server-authoritative position from ILocationTracker
      must be recent (<60s old) with accuracy < 50m, else reject 400 "GPS position required";
      (2) user must be within 100m of pitch via IsWithinDistance;
      (3) player must spawn at this pitch;
      (4) user must not already own this player (checked via unique constraint).
      Use a database transaction with the unique index on CollectionModel (UserId, PlayerId)
      to prevent duplicate captures (race condition). Rate limit: max 20 captures per hour
      per user (in-memory token bucket). CollectionModel captures are the single source of
      truth — PlayerModel has no CapturedByUserId.
