plan_id: "20260505-creature-collector-rugby-gps"
title: "RuckR Creature Collector — Rugby GPS Game"
version: "1.0"
created_at: "2026-05-05T23:00:00Z"
status: draft
tldr: |
  Transform the RuckR Blazor WASM Hosted demo app into a rugby-themed creature-collector game
  with GPS integration. Players explore a real-world map, discover procedurally-placed virtual
  rugby pitches, collect auto-generated fictional rugby players (creatures), and engage in
  turn-based asynchronous PVP battles. Built on SQL Server (geography type) + NetTopologySuite
  for geospatial queries, SignalR for real-time communication, Leaflet.js for map rendering,
  and Fluxor for client-state management. ASP.NET Core Identity provides authentication.

scope:
  description: |
    RuckR is currently a 3-project Blazor WASM Hosted demo (Server, Client, Shared) with
    two static endpoints (WeatherForecast, Profile) and no persistent storage, authentication,
    or real-time features. This plan delivers a rugby-themed creature-collector game layered
    on top of the existing architecture:
    
    - **Server** adds ASP.NET Core Identity with EF Core, SignalR hub, SQL Server (geography type)
      via NetTopologySuite and EF Core SqlServer spatial provider, and game-specific API controllers (players, pitches, collections, battles).
    - **Client** adds Leaflet.js interop for map rendering, Fluxor for client-side state,
      GPS geolocation via browser API, and game pages (Map, Collection, Battle, Catalog).
    - **Shared** gains new models: PlayerModel, PitchModel, CollectionModel, BattleModel.
    
    Rugby players are the "creatures" — each has position-based stats, a rarity tier,
    and is discoverable at virtual rugby pitches procedurally placed on the map. Players
    collect them, build a team, and challenge other users in async turn-based PVP.

  in_scope:
    # Foundation
    - ASP.NET Core Identity with EF Core for user registration, login, and session management
    - SQL Server database (LocalDB for dev, Docker SQL Server for cross-platform) with geography type via NetTopologySuite and EF Core SqlServer spatial provider
    - Entity Framework Core migrations for database schema management
    - Server-hosted Razor pages for auth UI (login, register, logout)

    # Game Data
    - Auto-generated fictional rugby players with name, position, stats, rarity, and bio
    - Procedurally-placed virtual rugby pitches with real-world GPS coordinates + geography type
    - Player collection per user (inventory with acquisition timestamp and location)
    - Player catalog page for browsing all known players

    # GPS & Map
    - Browser geolocation API integration for reading user GPS position
    - Leaflet.js interactive map rendered via Blazor JS interop (`IJSObjectReference`/`IJSRuntime`)
    - Distance-bucketed sorting for fuzzy location (exact GPS not exposed to other players)
    - Pitch markers on map with proximity-based discovery UI
    - User position indicator on map

    # Real-Time
    - SignalR hub for live map updates, battle notifications, and player location sharing
    - Real-time pitch discovery notifications
    - Battle challenge notifications via SignalR

    # PVP Battles
    - Turn-based asynchronous PVP challenge system
    - Challenge another user by selecting from your collection
    - Opponent accepts/declines challenge
    - Simple stat-based resolution (position matchups, rarity multipliers)
    - Battle history/log per user

    # Client State
    - Fluxor (Flux/Redux pattern) for client-side state management
    - Shared reactive state across map, collection, and battle pages
    - State slices: inventory, active battles, map state, user session

    # UI/UX
    - Bootstrap 5 styling consistent with existing pages
    - Responsive layout for mobile/desktop map usage
    - Loading, empty, and error states on all pages

  out_of_scope:
    - Real-money transactions or in-app purchases
    - Mobile-native apps (React Native, Expo, Flutter) — browser-only MVP
    - Third-party auth providers (Google, Facebook, etc.) — username/password only
    - Automated matchmaking or skill-based ranking
    - Real-time synchronous battles (only async turn-based)
    - AI/bot opponents — PVP only
    - Player trading or gifting between users
    - Offline support or local caching of game data
    - Admin dashboard or moderation tools
    - CI/CD pipelines, automated tests, or monitoring infrastructure
    - Social features (friends lists, chat, leaderboards) beyond PVP challenges

user_stories:
  - id: US-01
    title: "User Registration & Authentication"
    description: |
      As a new player, I want to register an account with a username and password
      so that I can save my collection and participate in PVP battles.
    acceptance_criteria:
      - "Register page at /Identity/Account/Register with username + password + confirm password fields"
      - "Login page at /Identity/Account/Login with username + password fields"
      - "Logout functionality clears session and redirects to home"
      - "Authentication state available in Blazor WASM via AuthenticationStateProvider"
      - "Unauthenticated users redirected to login when accessing protected pages"
      - "ASP.NET Core Identity backed by EF Core with default IdentityUser schema"
      - "Passwords hashed and stored securely (ASP.NET Core Identity default)"

  - id: US-02
    title: "Database & Spatial Foundation"
    description: |
      As a developer, I want SQL Server configured as the application database with spatial support
      so that all game data is persistently stored with geospatial query support.
    acceptance_criteria:
      - "SQL Server (LocalDB for dev; Docker SQL Server image for cross-platform) as the backing database"
      - "Microsoft.EntityFrameworkCore.SqlServer with NetTopologySuite spatial provider configured in Server"
      - "EF Core DbContext (RuckRDbContext) with DbSets for PlayerModel, PitchModel, CollectionModel, BattleModel"
      - "PitchModel has a SQL Server geography Point column (SRID 4326) for GPS coordinates"
      - "Proximity query: find pitches within X meters of a given coordinate using STDistance"
      - "EF Core migrations create all tables with correct spatial column types (geography)"
      - "Connection string configurable via appsettings.json"

  - id: US-03
    title: "GPS Location & Pitch Discovery"
    description: |
      As a player, I want the app to use my device's GPS location so that I can discover
      virtual rugby pitches near me and collect the rugby players at them.
    acceptance_criteria:
      - "Browser geolocation API accessed via JS interop to read user's current position"
      - "User's location displayed on the Leaflet map as a marker"
      - "Nearby pitches (within 500m) highlighted on the map with distance indicators"
      - "Distance shown in buckets: '< 50m', '< 100m', '< 250m', '< 500m' (fuzzy, not exact)"
      - "Tapping/clicking a nearby pitch opens discovery panel showing available players"
      - "Pitch discovery triggers when user is within proximity threshold (100m default)"
      - "User's exact GPS coordinates never exposed to other players — only distance bucket"

  - id: US-04
    title: "Interactive Map"
    description: |
      As a player, I want an interactive map showing my location and nearby rugby pitches
      so that I can navigate to pitches and discover new rugby players.
    acceptance_criteria:
      - "Leaflet.js map renders full-screen or large panel on the Map page (/map)"
      - "Map tiles load from OpenStreetMap (free tile provider)"
      - "User's current position shown as a distinct marker (e.g., blue dot with pulse)"
      - "Pitches rendered as rugby-ball markers on the map"
      - "Map auto-pans to user's location on load"
      - "Pitch markers update in real-time as user moves (SignalR or polling)"
      - "Map page works on mobile and desktop (responsive)"
      - "JS interop module encapsulates all Leaflet operations behind `IJSObjectReference`"

  - id: US-05
    title: "Rugby Player Collection"
    description: |
      As a player, I want to view my collection of discovered rugby players
      so that I can see their stats, manage my team, and select fighters for battles.
    acceptance_criteria:
      - "Collection page (/collection) shows all players the user has discovered"
      - "Each player card displays: name, position, stats (Speed, Strength, Agility, Kicking), rarity"
      - "Empty state message when user has no collected players"
      - "Player detail view showing full stats, bio, acquisition date, and discovery location"
      - "Collection persists across sessions (stored in SQL Server)"
      - "Players cannot be deleted or traded (collection is permanent for MVP)"

  - id: US-06
    title: "Player Catalog"
    description: |
      As a player, I want to browse a catalog of all rugby players that exist in the game
      so that I can see what players are available to discover.
    acceptance_criteria:
      - "Catalog page (/catalog) lists all rugby players in the game"
      - "Filter by position (Prop, Hooker, Lock, Flanker, Scrum-half, Fly-half, Centre, Wing, Fullback)"
      - "Filter by rarity tier (Common, Uncommon, Rare, Epic, Legendary)"
      - "Search by player name"
      - "Collected vs uncollected badge on each player card"
      - "Players are auto-generated fictional characters with rugby-appropriate names"

  - id: US-07
    title: "Turn-Based Async PVP Battles"
    description: |
      As a player, I want to challenge another player to a PVP battle using my collected rugby players
      so that I can compete and see whose collection is stronger.
    acceptance_criteria:
      - "Challenge form: select one player from collection, choose opponent by username"
      - "Challenge sent via SignalR notification to opponent in real-time"
      - "Opponent sees challenge notification with challenger name and selected player"
      - "Opponent can accept (with their own player selection) or decline"
      - "Battle resolution: stat-based comparison with position matchups and rarity multipliers"
      - "Simple resolution formula: base stat comparison + position advantage + rarity bonus + randomness"
      - "Battle result logged: winner, loser, players used, timestamp"
      - "Battle history page (/battles) shows past battle results"
      - "Players cannot challenge themselves"
      - "A player cannot have more than 3 active (pending) challenges at once"

  - id: US-08
    title: "Real-Time Notifications"
    description: |
      As a player, I want real-time notifications for pitch discoveries and battle challenges
      so that I am immediately aware of game events.
    acceptance_criteria:
      - "SignalR connection established on app load and maintained for session duration"
      - "Battle challenge notifications appear as toast/banner with accept/decline actions"
      - "New pitch discovery notifications when entering proximity of an undiscovered pitch"
      - "Connection state indicator shown in UI (connected/disconnected/reconnecting)"
      - "SignalR reconnection handled gracefully with exponential backoff"

  - id: US-09
    title: "Procedural Pitch & Player Generation"
    description: |
      As the system, I need a seed-based procedural generation system for rugby pitches and players
      so that the game world feels populated without manual data entry.
    acceptance_criteria:
      - "Pitches procedurally placed at real-world GPS coordinates (seed-based, reproducible)"
      - "~100 initial pitches generated across a metropolitan area (configurable seed/region)"
      - "Each pitch assigned a name (e.g., 'Thunderstrike Field', 'Ruck Arena') from a pool"
      - "~500 auto-generated fictional rugby players distributed across pitches"
      - "Player names drawn from rugby-appropriate first/last name pools"
      - "Player stats (Speed, Strength, Agility, Kicking) generated with position-based distributions"
      - "Player rarity assigned per distribution: Common 50%, Uncommon 25%, Rare 15%, Epic 7%, Legendary 3%"
      - "Seed stored in appsettings for reproducibility; can be changed to regenerate world"

acceptance_criteria:
  - "dotnet build RuckR.sln succeeds with zero errors and zero warnings after all waves"
  - "All new NuGet packages (SignalR, Fluxor, Identity, NetTopologySuite, EF Core SqlServer) resolve and compile"
  - "User can register, log in, and maintain authenticated session"
  - "Map page renders Leaflet with user location marker and nearby pitch markers"
  - "User can discover a pitch within proximity and collect a rugby player"
  - "Collection page shows discovered players with correct stats"
  - "PVP challenge can be sent, accepted, and resolved with battle result logged"
  - "All game data persists across server restarts (SQL Server)"
  - "SignalR delivers real-time challenge notifications between two browser sessions"

constraints:
  - "Browser-only: Blazor WASM hosted model; no native mobile apps"
  - "Username/password authentication only (ASP.NET Core Identity with EF Core)"
  - "SQL Server database (LocalDB for dev; Docker SQL Server for cross-platform; not SQLite or in-memory for production)"
  - "Must use existing 3-project structure (Server, Client, Shared)"
  - "Must follow existing code conventions: block-scoped namespaces, ControllerBase, ApiController, Bootstrap 5"
  - "All new models under RuckR.Shared.Models namespace"
  - "Leaflet.js via JS interop only — no C# map SDK"
  - "Fluxor for client state (not ad-hoc service injection)"
  - "Fuzzy location only — never expose exact user GPS to other users"

stakeholders:
  - role: "Developer"
    needs: "Clean architecture, maintainable code, documented patterns, incremental delivery"
  - role: "Player (End User)"
    needs: "Fun creature-collector experience, responsive map, fair PVP, persistent progress"

