state_machines:
  - name: "BattleModel"
    states:
      - Pending
      - Accepted
      - Completed
      - Declined
      - Expired
    transitions:
      - from: Pending
        to: Accepted
        trigger: "Opponent accepts challenge and selects their player"
      - from: Pending
        to: Declined
        trigger: "Opponent declines challenge"
      - from: Pending
        to: Expired
        trigger: "Challenge not responded to within 24 hours"
      - from: Accepted
        to: Completed
        trigger: "Battle resolved — stat comparison complete, result logged"

  - name: "PitchDiscovery"
    states:
      - Undiscovered
      - Discovered
    transitions:
      - from: Undiscovered
        to: Discovered
        trigger: "User's GPS position within 100m of pitch coordinates"

decisions:
  - id: ADR-004
    status: accepted
    decision: "Use SQL Server geography type + NetTopologySuite for spatial data layer"
    rationale: "User chose MSSQL for Windows dev simplicity (LocalDB); SQL Server's native geography type with SRID 4326 provides robust spatial query support. EF Core supports it via Microsoft.EntityFrameworkCore.SqlServer.NetTopologySuite."
    alternatives:
      - "PostgreSQL + PostGIS (mature open-source geospatial, but adds operational complexity for Windows dev)"
      - "SQLite with custom Haversine queries (no spatial index, poor perf at scale)"
    consequences:
      - "Requires SQL Server (LocalDB for Windows dev; Docker mcr.microsoft.com/mssql/server image for cross-platform)"
      - "Adds Microsoft.EntityFrameworkCore.SqlServer.NetTopologySuite and NetTopologySuite NuGet dependencies"
      - "Enables efficient proximity queries via STDistance and spatial indexes on geography columns"

  - id: ADR-005
    status: accepted
    decision: "Use SignalR for real-time communication"
    rationale: "SignalR is the idiomatic ASP.NET Core real-time library with built-in Blazor client support."
    alternatives:
      - "Polling (simple but wasteful, no real-time feel)"
      - "WebSocket raw (more boilerplate, no auto-reconnect)"
    consequences:
      - "Adds Microsoft.AspNetCore.SignalR NuGet dependency (built into ASP.NET Core)"
      - "Requires SignalR hub on server, connection management on client"
      - "Enables instant battle notifications and live map updates"

  - id: ADR-006
    status: accepted
    decision: "Use Leaflet.js via JS interop for map rendering"
    rationale: "Leaflet is lightweight (42 KB), open-source, and has mature Blazor interop community patterns."
    alternatives:
      - "Google Maps JS API (requires API key, larger payload, licensing concerns)"
      - "Mapbox GL JS (requires API key, larger payload)"
      - "Blazor Leaflet wrapper library (adds dependency, may lag Leaflet releases)"
    consequences:
      - "Requires JavaScript interop module (`IJSObjectReference`/`IJSRuntime`)"
      - "OpenStreetMap tiles are free with no API key"
      - "All map manipulation goes through JS interop boundary"

  - id: ADR-007
    status: accepted
    decision: "Create new models under RuckR.Shared.Models: PlayerModel, PitchModel, CollectionModel, BattleModel"
    rationale: "Follows existing ProfileModel convention (subdirectory with qualified namespace)."
    alternatives:
      - "Root namespace RuckR.Shared (follows WeatherForecast pattern — inconsistent with ProfileModel)"
    consequences:
      - "Namespace: RuckR.Shared.Models"
      - "PitchModel uses NetTopologySuite Point type for geometry"
      - "All models available to both Server and Client projects"

  - id: ADR-008
    status: accepted
    decision: "Use Fluxor for client-side state management"
    rationale: "Multiple pages (Map, Collection, Battle) need shared reactive state; Fluxor is the most popular Blazor state library."
    alternatives:
      - "Singleton service with event callbacks (simpler but manual plumbing, no dev tools)"
      - "BlazorFluxor (competing library, smaller community)"
    consequences:
      - "Adds Fluxor NuGet dependency to RuckR.Client"
      - "State organized into features: Inventory, Battles, Map, Auth"
      - "Redux dev tools available for debugging"

  - id: ADR-009
    status: accepted
    decision: "Use ASP.NET Core Identity with EF Core for authentication"
    rationale: "Built-in, battle-tested auth framework; avoids third-party auth dependencies."
    alternatives:
      - "Auth0/Okta (external dependency, requires internet, overkill for MVP)"
      - "Custom JWT (more boilerplate, less secure default configuration)"
    consequences:
      - "Adds Microsoft.AspNetCore.Identity.EntityFrameworkCore NuGet dependency"
      - "Server hosts Razor pages for auth UI (login, register)"
      - "EF Core manages IdentityUser and related tables alongside game tables"
      - "Cookie-based authentication with Blazor WASM AuthenticationStateProvider"

needs_clarification:
  - question: "Target platform — browser Blazor WASM only, or also mobile native?"
    context: "Browser GPS works in Blazor WASM but mobile-native (React Native/Expo) would provide better GPS accuracy and background tracking."
    impact: "Determines GPS implementation approach and whether React Native/Expo project scope is needed."
    status: open
    owner: "Product owner"

  - question: "Fuzzy location — exact distance-bucketed sorting or fully anonymized regions?"
    context: "Distance buckets (< 50m, < 100m, etc.) still reveal approximate location. Region-based (suburb/neighborhood) would be more private."
    impact: "Affects privacy model and how pitch proximity is calculated."
    status: open
    owner: "Product owner"

  - question: "PVP depth — simple stat comparison or full turn-based move selection?"
    context: "Simple stat-based resolution is faster to build. Full move selection (like Pokemon) requires more design, moves, and balance."
    impact: "Affects BattleModel complexity, UI design, and development timeline."
    status: open
    owner: "Product owner"

  - question: "Data persistence — SQL Server or lighter alternatives?"
    context: "SQL Server with geography type provides robust spatial support. SQLite with Haversine could work for MVP but lacks spatial indexing."
    impact: "SQL Server adds a server dependency (LocalDB for dev, Docker for cross-platform); SQLite is simpler but limited for spatial queries."
    status: resolved
    owner: "Technical lead"

  - question: "Authentication — simple username/password or third-party providers?"
    context: "ASP.NET Core Identity handles both. Third-party (Google, etc.) reduces friction but adds setup."
    impact: "Username/password is simpler to implement; third-party requires OAuth setup."
    status: open
    owner: "Product owner"

  - question: "Rugby player data — auto-generated fictional or real-world rugby players?"
    context: "Fictional players avoid licensing issues. Real players would require data rights."
    impact: "Fictional is legally safe and more fun for a creature-collector theme."
    status: open
    owner: "Product owner"

  - question: "Rugby pitches — procedurally placed virtual locations or real rugby venues?"
    context: "Virtual pitches give full control over placement and density. Real venues limit to existing fields."
    impact: "Virtual pitches create a parallel game world; real venues tie to actual geography."
    status: open
    owner: "Product owner"

risks:
  - risk: "SQL Server spatial setup complexity slows initial development"
    severity: medium
    mitigation: "Docker Compose for local SQL Server (mcr.microsoft.com/mssql/server) instance; connection string via appsettings; well-documented setup; LocalDB zero-config for Windows dev"

  - risk: "Leaflet.js interop performance with many markers"
    severity: low
    mitigation: "Leaflet handles hundreds of markers natively; clustering plugin if needed; only load visible pitches"

  - risk: "Browser geolocation API permission denial — user refuses GPS access"
    severity: medium
    mitigation: "Graceful fallback: show map centered on default location; prompt user to enable GPS; manual coordinate entry"

  - risk: "SignalR connection instability on mobile networks"
    severity: medium
    mitigation: "Automatic reconnection with exponential backoff; connection state indicator; graceful degradation when offline"

  - risk: "Too many NuGet dependencies introduced at once causing version conflicts"
    severity: medium
    mitigation: "Add dependencies incrementally per wave; verify build after each wave; pin compatible versions"

  - risk: "No automated tests — regressions from game logic changes"
    severity: high
    mitigation: "Manual verification per wave; small codebase manageable; critical paths (auth, battle resolution) verified manually"

  - risk: "Long dev cycle — feature creep before playable MVP"
    severity: high
    mitigation: "Deliver in waves: auth+DB, map+GPS, collection, PVP; each wave delivers a testable increment"

