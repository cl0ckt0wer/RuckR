open_questions:
  - question: "Is NetTopologySuite compatible with Blazor WASM (browser) for the Shared project?"
    context: "RuckR.Shared has `SupportedPlatform include=\"browser\"`. NTS must work in WASM. NTS is a pure .NET library and should be WASM-compatible, but the full dependency chain (NTS → NetTopologySuite.IO.SqlServerBytes → Microsoft.Data.SqlClient) may not be. The Shared project may only need NetTopologySuite (not the EF Core spatial package)."
    type: "research"
    affects: ["RuckR.Shared.csproj", "Model design"]

  - question: "How to configure spatial indexes via EF Core Fluent API?"
    context: "EF Core supports `HasIndex()` for regular indexes, but spatial indexes have special parameters (tessellation scheme: GEOGRAPHY_AUTO_GRID, cells per object, bounding box). EF Core does not have a dedicated Fluent API for spatial indexes. Spatial indexes must be added via raw SQL in a migration (`migrationBuilder.Sql(\"CREATE SPATIAL INDEX ...\")`)."
    type: "research"
    affects: ["EF Core migrations", "Performance"]

  - question: "Should PlayerModel have a spatial Location property or is it only on PitchModel?"
    context: "The PRD mentions 'Player locations (for proximity-based PVP matchmaking)'. This could mean: (a) each Player creature has a fixed spawn location (Point on PitchModel), or (b) each human user has a current GPS position stored separately. Clarifying this determines whether PlayerModel gets a Point property or a separate UserLocation table."
    type: "decision_blocker"
    affects: ["PlayerModel design", "PVP matchmaking queries"]

  - question: "Will SQL Server Express LocalDB spatial features (geography, spatial indexes) work identically to full SQL Server?"
    context: "LocalDB is a full SQL Server Express engine running in user mode. Spatial types (geography, geometry) and spatial indexes are available in all editions including Express/LocalDB. No feature gap for the game's spatial needs."
    type: "research"
    affects: ["Development environment setup"]

  - question: "How to handle the `BufferedWithCurves` warning in SQL Server geography?"
    context: "SQL Server `STBuffer()` on geography returns a `FullGlobe` instance when the buffer distance exceeds the distance from equator to pole. For game-typical buffer distances (≤10km around a point), this is not a concern. The buffer polygon ring orientation requirements (exterior CCW) are handled by NTS validation."
    type: "nice_to_know"
    affects: ["Edge cases in pitch discovery radius"]

gaps:
  - area: "EF Core spatial index configuration"
    description: "EF Core lacks a dedicated Fluent API for configuring spatial index tessellation parameters (GEOGRAPHY_AUTO_GRID, cells per object). Spatial indexes must be created via raw SQL in migrations. This is a known limitation — not a blocking issue."
    impact: "research_blocker"
    affects: ["EF Core migrations", "Query performance"]

  - area: "NetTopologySuite WASM compatibility"
    description: "The Shared project targets WASM (`SupportedPlatform browser`). NTS and its full dependency tree must be verified to work in the browser. The `NetTopologySuite.IO.SqlServerBytes` package (transitive dependency) references `Microsoft.Data.SqlClient` which may not work in Blazor WASM. Likely only `NetTopologySuite` (core library) should be referenced in Shared."
    impact: "research_blocker"
    affects: ["RuckR.Shared.csproj", "NuGet package references"]

  - area: "Client-side distance calculation"
    description: "NTS ignores SRID on client side — `point1.Distance(point2)` returns degrees, not meters. For client-only distance calculations (e.g., sorting markers on map without server round-trip), the ProjNet library should be used for coordinate projection or a simple Haversine formula. This gap may affect offline map interactions."
    impact: "nice_to_know"
    affects: ["Client-side map features", "Offline experience"]

  - area: "PostGIS-to-MSSQL migration of ADR-004"
    description: "The PRD and ADR-004 currently specify PostgreSQL + PostGIS. The decision to switch to MSSQL requires an updated architectural decision record. This is a documentation/documentation gap, not a technical blocker."
    impact: "decision_blocker"
    affects: ["PRD.yaml", "AGENTS.md", "ADR-004"]

# ============================================================================
# APPENDIX: Code Examples & Configuration (reference material, not findings)
# ============================================================================

supplementary:
  nuget_packages_required:
    - name: "Microsoft.EntityFrameworkCore.SqlServer"
      version: "10.0.7"
      project: "RuckR.Server"
      purpose: "SQL Server EF Core provider"
    - name: "Microsoft.EntityFrameworkCore.SqlServer.NetTopologySuite"
      version: "10.0.7"
      project: "RuckR.Server"
      purpose: "Spatial support for SQL Server provider"
    - name: "NetTopologySuite"
      version: "2.6.0+"
      project: "RuckR.Shared"
      purpose: "NTS Point, Geometry types for spatial models (WASM-compatible core library only)"
    - name: "Microsoft.EntityFrameworkCore.Design"
      version: "10.0.7"
      project: "RuckR.Server"
      purpose: "EF Core CLI tooling for migrations (PrivateAssets=all)"

  dbcontext_configuration_example: |
    // RuckR.Server/Data/RuckRDbContext.cs
    using Microsoft.EntityFrameworkCore;
    using RuckR.Shared.Models;
    using NetTopologySuite.Geometries;

    public class RuckRDbContext : DbContext
    {
        public RuckRDbContext(DbContextOptions<RuckRDbContext> options) : base(options) { }

        public DbSet<PitchModel> Pitches => Set<PitchModel>();
        public DbSet<PlayerModel> Players => Set<PlayerModel>();
        public DbSet<CollectionModel> Collections => Set<CollectionModel>();
        public DbSet<BattleModel> Battles => Set<BattleModel>();

        protected override void OnModelCreating(ModelBuilder modelBuilder)
        {
            base.OnModelCreating(modelBuilder);

            // Spatial column: maps Point to geography by default
            modelBuilder.Entity<PitchModel>(entity =>
            {
                entity.Property(p => p.Location)
                    .HasColumnType("geography");  // Explicit; 'geography' is default
            });
        }
    }

  program_cs_registration_example: |
    // RuckR.Server/Program.cs — Add to builder.Services
    using Microsoft.EntityFrameworkCore;

    builder.Services.AddDbContext<RuckRDbContext>(options =>
        options.UseSqlServer(
            builder.Configuration.GetConnectionString("RuckRDbContext"),
            sqlOptions => sqlOptions.UseNetTopologySuite()));

  connection_string_localdb: |
    // appsettings.Development.json
    {
      "ConnectionStrings": {
        "RuckRDbContext": "Server=(localdb)\\MSSQLLocalDB;Database=RuckR;Trusted_Connection=True;TrustServerCertificate=True;"
      }
    }

  connection_string_docker: |
    // appsettings.Development.json (Docker)
    {
      "ConnectionStrings": {
        "RuckRDbContext": "Server=localhost,1433;Database=RuckR;User=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;"
      }
    }
    // Docker command:
    // docker run -e "ACCEPT_EULA=Y" -e "MSSQL_SA_PASSWORD=YourStrong!Passw0rd" -p 1433:1433 -d mcr.microsoft.com/mssql/server:2022-latest

  spatial_model_example: |
    // RuckR.Shared/Models/PitchModel.cs
    using System.ComponentModel.DataAnnotations;
    using NetTopologySuite.Geometries;

    namespace RuckR.Shared.Models
    {
        public class PitchModel
        {
            public int Id { get; set; }

            [Required]
            [StringLength(200)]
            public string Name { get; set; } = string.Empty;

            // Spatial column — maps to SQL Server geography
            // X = longitude, Y = latitude, SRID = 4326
            [Required]
            public Point Location { get; set; } = Point.Empty;

            [Required]
            [StringLength(450)] // Max key length for Identity FK
            public string CreatorUserId { get; set; } = string.Empty;

            public DateTime CreatedAt { get; set; } = DateTime.UtcNow;
        }
    }

  key_linq_query_patterns:
    - pattern: "Find pitches within radius"
      description: "Get all pitches within 500 meters of user's GPS position"
      code: |
        var userPoint = new Point(longitude, latitude) { SRID = 4326 };
        var nearbyPitches = await context.Pitches
            .Where(p => p.Location.IsWithinDistance(userPoint, 500))
            .Select(p => new {
                p.Id, p.Name,
                Distance = p.Location.Distance(userPoint)
            })
            .OrderBy(p => p.Distance)
            .ToListAsync();
        // SQL: WHERE Location.STDistance(@userPoint) <= 500 ORDER BY Location.STDistance(@userPoint)

    - pattern: "Find nearest N pitches"
      description: "Get the 10 closest pitches to user"
      code: |
        var nearestPitches = await context.Pitches
            .Where(p => p.Location.Distance(userPoint) != null) // required for spatial index
            .OrderBy(p => p.Location.Distance(userPoint))
            .Take(10)
            .ToListAsync();
        // SQL: SELECT TOP(10) ... WHERE Location.STDistance(@userPoint) IS NOT NULL ORDER BY Location.STDistance(@userPoint)

    - pattern: "Sort players by fuzzy distance"
      description: "Sort players by distance, apply ±20% fuzz, bucket"
      code: |
        // Step 1: Get exact distances from server
        var playersWithDistance = await context.Collections
            .Where(c => c.OwnerId != currentUserId)
            .Select(c => new {
                c.OwnerId,
                Distance = c.OwnerLocation.Distance(userPoint)
            })
            .ToListAsync();

        // Step 2: Apply fuzz client-side
        var rng = new Random();
        var fuzzed = playersWithDistance
            .Select(p => new {
                p.OwnerId,
                Distance = p.Distance * (0.8 + rng.NextDouble() * 0.4), // ±20%
                Bucket = p.Distance switch {
                    < 50 => "nearby",
                    < 100 => "close",
                    < 250 => "medium",
                    < 500 => "far",
                    _ => "distant"
                }
            })
            .OrderBy(p => p.Distance)
            .ToList();

    - pattern: "Pitch interaction (geofence)"
      description: "Check if user is within discovery range (100m)"
      code: |
        var canDiscover = await context.Pitches
            .AnyAsync(p => p.Id == pitchId && p.Location.IsWithinDistance(userPoint, 100));
        // SQL: WHERE Location.STDistance(@userPoint) <= 100

  spatial_index_migration_example: |
    // In migration Up() method — raw SQL for spatial index
    protected override void Up(MigrationBuilder migrationBuilder)
    {
        // Create table first (EF Core generates this)
        // ...

        // Add spatial index for nearest-neighbor queries
        migrationBuilder.Sql(@"
            CREATE SPATIAL INDEX [IX_Pitches_Location]
            ON [Pitches] ([Location])
            USING GEOGRAPHY_AUTO_GRID
            WITH (CELLS_PER_OBJECT = 16);");
    }

  gotchas_and_limitations:
    - gotcha: "NTS coordinate order: X=longitude, Y=latitude"
      detail: "In NTS, `Point.X` is longitude and `Point.Y` is latitude. This is the opposite of human-readable `(lat, lng)` order. Always document this. Constructor: `new Point(longitude, latitude) { SRID = 4326 }`."
      severity: "high"
      mitigation: "Document in model comments; add validation helper; use named parameters or factory method"

    - gotcha: "NTS client-side Distance() returns degrees, not meters"
      detail: "When NTS calculates distance in C# (not via SQL), it ignores SRID and uses planar math. `point1.Distance(point2)` returns degrees for WGS 84 coordinates — meaningless for the game."
      severity: "medium"
      mitigation: "Always use EF Core LINQ (server-side) for distance calculations. For client-only needs, use ProjNet or the Haversine formula."

    - gotcha: "Spatial indexes require primary key on the table"
      detail: "SQL Server spatial indexes can only be created on tables with a primary key (max 15 columns). All our game entity tables will have `Id` PK, so this is not a restriction."
      severity: "low"

    - gotcha: "InMemory provider does not support spatial"
      detail: "EF Core's InMemory provider cannot run spatial queries. Spatial integration tests must use a real SQL Server instance (LocalDB or Docker)."
      severity: "medium"
      mitigation: "Use LocalDB for integration tests; SimonCropp/LocalDb NuGet wrapper simplifies test setup."

    - gotcha: "STDistance() with geography vs geometry — different units"
      detail: "`geography::STDistance()` returns meters. `geometry::STDistance()` returns degrees (meaningless for lat/lng). Always use geography for GPS data."
      severity: "high"
      mitigation: "Explicitly set column type to `geography` in model configuration; never use `geometry` for GPS."

    - gotcha: "SRID mismatch = NULL distance"
      detail: "If two geography instances have different SRIDs, `STDistance()` returns NULL. All Points must use SRID 4326 consistently."
      severity: "medium"
      mitigation: "Enforce SRID 4326 in a factory method or validation attribute."

    - gotcha: "SQL Server geography polygon ring orientation"
      detail: "Geography polygons require exterior ring counterclockwise, interior rings clockwise. NTS validates this. For buffer operations, SQL Server handles orientation correctly. Not a concern for Point-only operations (pitches, player locations)."
      severity: "low"

    - gotcha: "Maximum geography buffer distance"
      detail: "`STBuffer()` max distance is ~0.999 × half Earth circumference. For game-typical distances (≤10km), this is irrelevant."
      severity: "low"

    - gotcha: "SQL Server Express LocalDB is Windows-only"
      detail: "LocalDB is a Windows feature. For macOS/Linux development, Docker-based SQL Server must be used. The connection string pattern differs."
      severity: "medium"
      mitigation: "Provide both LocalDB (Windows) and Docker (cross-platform) connection string examples in documentation."

    - gotcha: "FullGlobe instances not supported by NTS"
      detail: "SQL Server can return FullGlobe geography instances when buffer distances are extreme. NTS cannot represent these. Not applicable for game-scale spatial operations."
      severity: "low"

    - gotcha: "GeometryCollection, Curve types not supported by NTS"
      detail: "NTS does not support CircularString, CompoundCurve, CurvePolygon, or FullGlobe. Use `STCurveToLine()` in SQL for curve conversions if needed. Not applicable to point-based game data."
      severity: "low"
