domain_security_considerations:
  sensitive_areas:
    - area: "Exact user GPS coordinates"
      location: "Server-side queries; SignalR hub"
      concern: "User's exact lat/lng must NEVER be exposed to other users. Only distance buckets or fuzzed distance values are shared. The raw Point should be stored server-side only and used for proximity calculations that return bucketed/fuzzed results."
    - area: "Spatial query injection"
      location: "API endpoints accepting lat/lng parameters"
      concern: "Lat/lng values from client should be validated (range checks: lat -90..90, lng -180..180) before constructing NTS Point objects to prevent malformed spatial queries."
    - area: "Connection string"
      location: "appsettings.json"
      concern: "SQL Server credentials (especially sa password in Docker) must be stored in User Secrets during development, not committed to source control."
  authentication_patterns_in_domain: "ASP.NET Core Identity — user must be authenticated to query nearby players, access pitch discovery, or participate in PVP"
  authorization_patterns_in_domain: "Proximity queries are per-user: only return pitches/players within the requesting user's vicinity. The user's own location determines query scope."
  data_validation_in_domain: |
    - Latitude: -90.0 to 90.0
    - Longitude: -180.0 to 180.0
    - SRID: Must be 4326 for all geography Points (WGS 84)
    - Distance radius: Reasonable cap (e.g., max 10,000 meters) to prevent full-table scans
    - Pitch name: Required, max 200 chars
    - Creator User ID: Foreign key to Identity user

