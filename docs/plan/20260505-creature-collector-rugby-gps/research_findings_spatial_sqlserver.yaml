patterns_found:
  - category: "architecture"
    pattern: "Geography over Geometry for GPS coordinates"
    description: |
      SQL Server supports two spatial types. For GPS lat/lng data on a round earth:
      - `geography`: Ellipsoidal (round-earth) model. SRID 4326 (WGS 84). `STDistance()` returns meters. Must use supported EPSG SRID from `sys.spatial_reference_systems`. Polygon ring orientation matters (exterior CCW, interior CW).
      - `geometry`: Euclidean (flat-plane) model. No SRID constraint. `STDistance()` returns units of the coordinate system (meaningless for lat/lng in degrees).
      **Recommendation: geography with SRID 4326** for all game location data, since the game operates with GPS coordinates on a real map and needs accurate distance calculations.
    examples:
      - file: "SQL Server docs"
        location: "https://learn.microsoft.com/en-us/sql/relational-databases/spatial/spatial-data-sql-server"
        snippet: |
          -- geography: round-earth, meters
          DECLARE @g geography = geography::Point(47.65100, -122.34900, 4326);
          -- STDistance() returns distance in meters
    prevalence: common

  - category: "structure"
    pattern: "NetTopologySuite Point for spatial columns in EF Core"
    description: |
      EF Core maps `NetTopologySuite.Geometries.Point` to SQL Server `geography` by default.
      Coordinate convention: X = longitude, Y = latitude (reversed from typical lat,lng order).
      SRID is set on the `Point` object (`point.SRID = 4326`). EF Core passes it through to SQL Server.
      NTS 2.6.0+ is available and compatible with .NET 10.
    examples:
      - file: "EF Core spatial docs"
        location: "https://learn.microsoft.com/en-us/ef/core/modeling/spatial#longitude-and-latitude"
        snippet: |
          // X = longitude, Y = latitude (backwards from lat,lng)
          var seattle = new Point(-122.333056, 47.609722) { SRID = 4326 };
    prevalence: common

  - category: "architecture"
    pattern: "IsWithinDistance for radius queries"
    description: |
      For "find all X within Y meters of Z", use `.IsWithinDistance(geometry, distance)` in LINQ.
      This translates to `column.STDistance(@point) <= @distance` in SQL, which is more efficient
      than standalone `.Distance()` when combined with `WHERE`, especially with spatial indexes.
    examples:
      - file: "EF Core spatial function mappings"
        location: "https://learn.microsoft.com/en-us/ef/core/providers/sql-server/spatial#spatial-function-mappings"
        snippet: |
          // EF Core LINQ
          var nearby = await context.Pitches
              .Where(p => p.Location.IsWithinDistance(userPoint, 500))
              .ToListAsync();
          // Translates to: WHERE Location.STDistance(@userPoint) <= 500
    prevalence: common

  - category: "architecture"
    pattern: "OrderBy Distance + Take for nearest-neighbor"
    description: |
      For "find nearest N to location", use `.OrderBy(x => x.Location.Distance(point)).Take(N)`.
      SQL Server requires: `WHERE STDistance() IS NOT NULL`, `ORDER BY STDistance() ASC`, `TOP(N)`.
      EF Core generates this pattern automatically when using `.OrderBy(...Distance...)` + `.Take(N)`.
      This enables spatial index usage.
    examples:
      - file: "EF Core spatial docs"
        location: "https://learn.microsoft.com/en-us/ef/core/modeling/spatial#querying-data"
        snippet: |
          var nearestCity = await db.Cities
              .OrderBy(c => c.Location.Distance(currentLocation))
              .FirstOrDefaultAsync();
    prevalence: common

  - category: "architecture"
    pattern: "Fuzzy distance applied client-side after DB query"
    description: |
      SQL Server returns exact distance in meters. The PRD requires ±20% display fuzz for player-to-player
      distance (no exact GPS exposed). This is applied in C# after fetching sorted results:
      1. Query players sorted by exact distance from DB
      2. In C#, apply random fuzz factor (0.8–1.2) per player before display
      3. Bucket into display categories ("< 50m", "< 100m", "< 250m", "< 500m")
      This keeps spatial index usage intact while achieving the privacy goal.
    examples:
      - file: "PRD.yaml user_stories.US-03"
        location: "docs/plan/20260505-creature-collector-rugby-gps/PRD.yaml:118-128"
        snippet: |
          // C# fuzzy distance after query
          var exactDistance = player.Location.Distance(userPoint); // server-side, meters
          var fuzzFactor = Random.Shared.NextDouble() * 0.4 + 0.8; // 0.8–1.2
          var displayDistance = exactDistance * fuzzFactor;
          var bucket = displayDistance switch {
              < 50 => "< 50m",
              < 100 => "< 100m",
              < 250 => "< 250m",
              < 500 => "< 500m",
              _ => "> 500m"
          };
    prevalence: occasional

