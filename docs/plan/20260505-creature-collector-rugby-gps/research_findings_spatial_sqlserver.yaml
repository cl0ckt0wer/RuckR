related_conventions:
  naming_patterns_in_domain: |
    - Spatial properties: `Location` (Point), `SpawnLocation` (Point)
    - DB column: EF Core maps to `geography` type; column name = property name
    - SRID: Always set to 4326 when creating Point objects
    - Coordinate order: X = longitude, Y = latitude (NTS convention; reversed from human-readable lat,lng)
  structure_of_domain: |
    - Models in `RuckR.Shared.Models` (e.g., `PitchModel`, `PlayerModel`)
    - DbContext in `RuckR.Server.Data` (e.g., `RuckRDbContext`)
    - Migrations managed by EF Core CLI (`dotnet ef migrations add`)
    - Connection string in `appsettings.json` under `ConnectionStrings:RuckRDbContext`
  error_handling_in_domain: |
    - `STDistance()` returns NULL if SRIDs mismatch — always set SRID consistently to 4326
    - NTS validates geography polygon ring orientation before sending to SQL Server
    - Null spatial values handled by EF Core; `IsWithinDistance` returns false for NULL operands
    - SQL Server throws if geography polygon ring orientation is inverted (exterior must be CCW)
  testing_in_domain: |
    - No test projects currently exist in the codebase
    - Spatial queries should be tested against a real SQL Server instance (LocalDB or Docker)
    - The InMemory EF Core provider does NOT support spatial types — use real SQL Server for spatial tests
    - Consider using the `SimonCropp/LocalDb` NuGet wrapper for test automation
  documentation_in_domain: |
    - ADR should be created documenting the MSSQL choice (replacing original ADR-004 for PostGIS)
    - Spatial query patterns should be documented in a developer guide (LINQ → SQL translations)
    - Coordinate convention (X=lng, Y=lat) must be prominently documented to prevent bugs

