plan_id: "20260505-creature-collector-rugby-gps"
objective: "Research spatial/geospatial capabilities in Microsoft SQL Server (MSSQL) for a .NET 10 / EF Core rugby-themed creature-collector game — replacing the originally planned PostgreSQL + PostGIS stack."
focus_area: "spatial_sqlserver"
created_at: "2026-05-05T23:30:00Z"
created_by: "gem-researcher"
status: completed
tldr: |
  - Use the `geography` type (not `geometry`) for lat/lng earth coordinates — SQL Server geography returns distances in meters with SRID 4326 (WGS 84), using ellipsoidal (round-earth) calculations with ≤0.25% deviation from true geodesic distance.
  - EF Core supports SQL Server spatial via `Microsoft.EntityFrameworkCore.SqlServer.NetTopologySuite` (version 10.0.7 available). NetTopologySuite `Point` type maps to SQL `geography` by default.
  - Core LINQ patterns: `IsWithinDistance()` for radius queries, `.Distance()` with `OrderBy` / `Take` for nearest-neighbor, `STBuffer()` for geofencing. All translate to SQL.
  - Fuzzy distance (±20%) applies in C# after fetching sorted results from the database.
  - LocalDB (`(localdb)\MSSQLLocalDB`) provides a zero-config development environment on Windows. Docker-based SQL Server covered for cross-platform dev.
  - Key gotcha: NTS ignores SRID on client-side calculations (returns degrees); server-side SQL queries (via EF Core) return proper meters. NTS X=longitude, Y=latitude (reversed from lat,lng convention).
  - Spatial indexes require a primary key on the table; SQL Server `GEOGRAPHY_AUTO_GRID` tessellation is recommended for nearest-neighbor queries.

