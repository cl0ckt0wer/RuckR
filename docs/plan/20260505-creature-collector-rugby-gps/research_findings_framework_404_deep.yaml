patterns_found:
  - category: architecture
    pattern: "UseBlazorFrameworkFiles requires WebRootPath to contain _framework files"
    description: "UseBlazorFrameworkFiles() middleware serves _framework/* files from the WebRootPath/_framework directory. In development mode, WebRootPath defaults to the Server project's wwwroot directory (which is empty in RuckR). The test fixture works because it explicitly sets WebRootPath to the Client's build output. Without this, UseBlazorFrameworkFiles can't find any _framework files and passes requests through to MapStaticAssets, which also can't serve them."
    examples:
      - file: "RuckR.Tests/Fixtures/CustomWebApplicationFactory.cs"
        location: "line 77"
        snippet: "WebRootPath = clientWwwrootDir; // Explicitly set to Client build output"
      - file: "RuckR/Server/Program.cs"
        location: "lines 76-77"
        snippet: "app.UseBlazorFrameworkFiles(); // Cannot find files: WebRootPath is empty\napp.MapStaticAssets(); // No _framework routes"
    prevalence: common
  - category: architecture
    pattern: "MapStaticAssets does not create _framework endpoint routes for Hosted Blazor WASM"
    description: "MapStaticAssets() creates endpoint routes from the static web assets build manifest. In the Hosted Blazor WASM model, the Client's _framework build output files are NOT registered as static web assets in the build manifest's Assets array or endpoint routes. Only the Client's source wwwroot files (favicon.png, index.html, css/, js/) and NuGet package assets (Identity.UI) get endpoints. The _framework directory from the Client's build output is present in ContentRoots but has no tree entries or endpoints."
    examples:
      - file: "RuckR/Server/obj/Debug/net10.0/staticwebassets.build.endpoints.json"
        location: "line 1"
        snippet: "Endpoints: [Identity/css/site.css, Identity/favicon.ico, ...] // NO _framework routes"
      - file: "RuckR/Server/obj/Debug/net10.0/staticwebassets.development.json"
        location: "line 1"
        snippet: "Root.Children: {favicon.png, index.html, manifest.json, ...} // NO _framework entry"
    prevalence: common
  - category: architecture
    pattern: "Static web assets discovery only scans source wwwroot, not build output"
    description: "The DiscoveryPatterns in staticwebassets.build.json defines a single pattern that scans the Client's SOURCE wwwroot directory (ContentRoot=C:\\...\\RuckR\\Client\\wwwroot\\, Pattern=**). The _framework directory is in the BUILD OUTPUT wwwroot (C:\\...\\RuckR\\Client\\bin\\Debug\\net10.0\\wwwroot\\_framework\\), which is NOT in any discovery pattern. The build output directory is registered as ContentRoot[6] in the development.json but is only used for hot reload module discovery, not general static asset serving."
    examples:
      - file: "RuckR/Server/obj/Debug/net10.0/staticwebassets.build.json"
        location: "line 1"
        snippet: "DiscoveryPatterns: [{ContentRoot: '...Client\\wwwroot\\', Pattern: '**'}] // Only source wwwroot"
    prevalence: common
