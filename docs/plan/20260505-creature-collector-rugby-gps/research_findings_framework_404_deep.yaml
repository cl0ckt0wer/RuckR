open_questions:
  - question: "Why doesn't UseWebAssemblyDebugging() configure WebRootPath or add a file provider for UseBlazorFrameworkFiles?"
    context: "UseWebAssemblyDebugging() is called at line 65 in dev mode. In .NET 8, this would configure the static file options to include the Client's output. In .NET 10, this may not work with the new static web assets system."
    type: research
    affects: ["Program.cs:65", "Middleware pipeline"]
  - question: "Should UseBlazorFrameworkFiles() be called AFTER UseRouting() like MapStaticAssets?"
    context: "Currently MapStaticAssets is before UseRouting (line 77→79). UseBlazorFrameworkFiles is also before UseRouting (line 76). MS docs for Blazor WASM show UseBlazorFrameworkFiles before UseRouting. But maybe the order needs adjustment for .NET 10."
    type: research
    affects: ["Program.cs:76-79"]
  - question: "Is there a .NET 10 MSBuild property to make the Client's build output _framework directory discoverable by MapStaticAssets?"
    context: "The DiscoveryPatterns only scan source wwwroot. There might be a property like <StaticWebAssetDiscoveryPatterns> or <BlazorWebAssemblyStaticWebAssets> to include build output."
    type: research
    affects: ["RuckR.Server.csproj", "Build system"]
gaps:
  - area: "WebRootPath not configured in Program.cs"
    description: "The Server's Program.cs never sets WebRootPath. It defaults to the Server project's wwwroot/ directory which does not exist and has no _framework files. The test fixture demonstrates the fix: set WebRootPath to the Client's build output directory. This is the single most impactful gap."
    impact: decision_blocker
    affects: ["Program.cs", "_framework file serving", "UseBlazorFrameworkFiles effectiveness"]
  - area: "_framework not in MapStaticAssets endpoint routes"
    description: "MapStaticAssets() has zero _framework routes in its endpoint table. This means even if UseBlazorFrameworkFiles passes through, MapStaticAssets will 404. The fundamental issue is that the static web assets build system (DiscoveryPatterns) only discovers Client source wwwroot files, not build output _framework files. This may be a .NET 10 regression or a Hosted WASM model limitation."
    impact: decision_blocker
    affects: ["Program.cs:77", "staticwebassets.build.json", "MapStaticAssets routing"]
  - area: "MapFallbackToFile serves index.html for _framework 404s"
    description: "When both UseBlazorFrameworkFiles and MapStaticAssets fail to serve _framework/*.wasm, the request falls through to MapFallbackToFile('index.html') which returns HTML. The Blazor runtime interprets HTML as WASM binary, producing confusing errors. This is a secondary effect — fixing the primary gap (WebRootPath) will eliminate the fallback issue."
    impact: research_blocker
    affects: ["Program.cs:96", "Error diagnostics quality"]
