plan_id: "20260505-creature-collector-rugby-gps"
objective: "Investigate why _framework/*.wasm files still 404 even with UseBlazorFrameworkFiles() restored before MapStaticAssets()"
focus_area: "framework_files_404_deep_diagnosis"
created_at: "2026-05-06T23:00:00Z"
created_by: "RESEARCHER"
status: completed
tldr: |
  - UseBlazorFrameworkFiles() IS present at line 76 (restored per prior research). 404s still occur.
  - Framework files EXIST on disk: `RuckR\Client\bin\Debug\net10.0\wwwroot\_framework\` has 452 files including `RuckR.Client.t0u3ng1931.wasm`
  - Server bin output has NO wwwroot directory — no _framework files copied to Server output
  - `_framework` is NOT in `staticwebassets.development.json` tree (only source wwwroot files like favicon.png, index.html)
  - `_framework` is NOT in `staticwebassets.build.endpoints.json` (only Identity/ routes from NuGet)
  - `DiscoveryPatterns` in `staticwebassets.build.json` only scans Client's SOURCE wwwroot, NOT build output
  - ROOT CAUSE: `UseBlazorFrameworkFiles()` requires a physical `_framework` directory under WebRootPath, but Server's WebRootPath is empty. The static web assets system (ContentRootIndex 6 = Client bin wwwroot) knows about the files but `MapStaticAssets()` doesn't register them as endpoint routes, so neither middleware can serve them.
  - FIX OPTION A: Set `WebRootPath` explicitly in Program.cs to the Client's build output directory (what test fixture does)
  - FIX OPTION B: Add `app.UseStaticFiles()` alongside `MapStaticAssets()` for fallback physical file serving
  - FIX OPTION C: Build the Client project to populate the static web assets properly, then verify endpoints
