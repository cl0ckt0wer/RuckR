domain_security_considerations:
  sensitive_areas:
    - area: "User GPS coordinates"
      location: "Hub method: UpdateLocation(lat, lng)"
      concern: "Exact GPS must never be exposed to other players. Server only sends distance buckets (< 50m, < 100m, < 250m, < 500m). Raw coordinates stored only for proximity calculation."
    - area: "Challenge forgery prevention"
      location: "Hub method: SendChallenge(targetUserId, ...)"
      concern: "Verify Context.UserIdentifier matches the sender; verify target exists; verify sender cannot challenge self; enforce max 3 pending challenges"
    - area: "Connection hijacking"
      location: "SignalR connection"
      concern: "Cookie auth in same-origin hosted model prevents token theft. Use HTTPS (already configured). Add CloseOnAuthenticationExpiration = true on hub options so expired auth closes connections."
  authentication_patterns_in_domain: |
    Cookie-based authentication via ASP.NET Core Identity:
    - Server hosts Razor pages for login/register at /Identity/Account/*
    - Identity sets auth cookie in browser
    - SignalR connection (same origin) automatically includes cookie
    - `[Authorize]` on BattleHub class ensures only authenticated users can connect
    - `Context.UserIdentifier` returns the authenticated user's ID for per-user routing
    - No bearer token or access token factory needed for same-origin hosted Blazor WASM
  authorization_patterns_in_domain: |
    - `[Authorize]` attribute on BattleHub class restricts all connections to authenticated users
    - Individual hub methods could use `[Authorize("PolicyName")]` for role-based restrictions if needed
    - Challenge validation in hub method logic (not self, not exceeding limits) — custom business rules in code
  data_validation_in_domain: |
    - ChallengeRequest DTO: validate targetUserId not null/empty, not same as sender
    - Creature selection: validate creature belongs to sender's collection
    - LocationUpdate DTO: validate lat/lng are within valid ranges (-90..90, -180..180)
    - Max 3 pending challenges per user — validated server-side before persisting
