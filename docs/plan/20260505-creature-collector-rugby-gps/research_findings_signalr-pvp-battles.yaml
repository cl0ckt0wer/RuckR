open_questions:
  - question: "MSSQL vs PostgreSQL — the research task header says 'MSSQL for persistence' but PRD ADR-004 explicitly selects PostgreSQL + PostGIS. Which is the correct database for the Server project?"
    context: "Research task header states 'MSSQL for persistence' but the PRD's ADR-004 accepts PostgreSQL + PostGIS with Npgsql EF Core provider. SignalR itself is database-agnostic, but the DbContext configuration and spatial queries differ significantly between MSSQL and PostgreSQL."
    type: decision_blocker
    affects:
      - "RuckR.Server.csproj NuGet packages (Npgsql vs SqlServer)"
      - "RuckRDbContext configuration in Program.cs"
      - "BattleService spatial proximity queries"
  - question: "Should location updates be sent via SignalR or a separate REST endpoint?"
    context: "GPS location updates could go through the SignalR hub (low latency, persistent connection) or via periodic POST to a REST API (simpler, decoupled). SignalR is better for real-time but REST is easier to throttle. The PRD mentions SignalR for 'player location sharing' but also describes browser geolocation API."
    type: research
    affects:
      - "BattleHub method design"
      - "Client-side GPS polling/throttling strategy"
      - "Server-side proximity calculation frequency"
  - question: "Should expired challenges use a background service (IHostedService) or be checked lazily when user reconnects?"
    context: "PRD specifies challenges expire after 24 hours (Pending→Expired). A background service (e.g., periodic timer) would proactively expire challenges. Lazy checking defers to when the user views pending challenges. Background service is more correct but adds complexity."
    type: research
    affects:
      - "Server-side architecture — need IHostedService or similar"
      - "BattleService design"
  - question: "What happens when a player disconnects mid-battle (after accepting but before resolution)?"
    context: "Since battles are async turn-based and resolved instantly upon acceptance, the window for mid-battle disconnect is tiny (only between accept and instant resolution). If disconnect occurs during the accept→resolve chain, the Hub method should complete atomically (persist result before sending notification). The opponent should see the result when they reconnect (via REST API to check battle history)."
    type: research
    affects:
      - "Battle resolution atomicity"
      - "Reconnection logic — re-fetch pending battle results on reconnect"
  - question: "Should the SignalR hub use strongly-typed hubs (Hub<T>) or string-based method names?"
    context: "Strongly-typed hubs (`Hub<IBattleClient>`) provide compile-time safety for client method names but require a shared interface in the Shared project. String-based (`SendAsync(\"MethodName\", ...)`) is simpler and used in all official Blazor WASM tutorials. For MVP, string-based is sufficient."
    type: nice_to_know
    affects:
      - "Hub class design"
      - "Shared project interfaces"
