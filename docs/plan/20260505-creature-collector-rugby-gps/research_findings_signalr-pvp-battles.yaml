objective: "Implement real-time PVP battles using SignalR in ASP.NET Core + Blazor WASM hosted app"
focus_area: "SignalR real-time communication for PVP battles"
created_at: "2026-05-05T23:30:00Z"
created_by: "gem-researcher"
status: completed
tldr: |
  - SignalR setup follows standard ASP.NET Core pattern: `AddSignalR()` + `MapHub<BattleHub>("/battlehub")` in Server Program.cs, `Microsoft.AspNetCore.SignalR.Client` NuGet (v10.0.7) on Client.
  - Cookie-based auth flows automatically from ASP.NET Core Identity to SignalR connections in hosted Blazor WASM (same-origin); `[Authorize]` on Hub and `Context.UserIdentifier` for per-user routing.
  - PVP battle uses SignalR Groups for battle rooms: each battle instance is a group (`battle_{battleId}`). Matchmaking flow: challenge → notify opponent via `Clients.User()` → accept/decline → resolve → notify both.
  - PRD specifies async turn-based (not real-time synchronous) PVP; battle state machine: Pending→Accepted→Completed|Declined|Expired. No real-time move-by-move exchange needed.
  - Location-based matchmaking: clients send GPS coords to hub → server filters nearby players using in-memory proximity check (Haversine) → return distance-bucketed results; GPS updates throttled to every 30s.
  - For MVP, in-memory Hub state is sufficient (no Redis backplane needed). Connection count limitations: ~10K concurrent per server with WebSockets.
  - Key gotcha: `InvokeAsync(StateHasChanged)` required in SignalR callbacks; `IAsyncDisposable` for cleanup; `WithAutomaticReconnect()` for dropped connections; `SetBrowserRequestCredentials` if cross-origin.
