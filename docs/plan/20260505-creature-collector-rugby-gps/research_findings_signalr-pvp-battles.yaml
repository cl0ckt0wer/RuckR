  data_flow_involving_domain: |
    1. Player A selects opponent and creature → calls hub.SendAsync("SendChallenge", targetUserId, challengeDto)
    2. Hub validates (auth, not self, <3 pending) → persists challenge to DB → calls Clients.User(targetUserId).SendAsync("ReceiveChallenge", challengeDto)
    3. Player B receives notification → UI shows accept/decline → calls hub.SendAsync("AcceptChallenge", challengeId, creatureId) or SendAsync("DeclineChallenge", challengeId)
    4. Hub resolves battle (stat comparison service) → updates DB → calls Clients.Group($"battle_{id}").SendAsync("BattleResolved", result)
    5. Both players see result via SignalR callback → Fluxor state updated
    6. Location updates: client sends throttle GPS → hub stores in-memory → hub recalculates nearby players → pushes updated nearby list to all connected clients
