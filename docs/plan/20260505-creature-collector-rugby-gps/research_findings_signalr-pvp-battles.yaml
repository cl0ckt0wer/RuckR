patterns_found:
  - category: architecture
    pattern: "Hosted Blazor WASM + SignalR Hub pattern"
    description: "In the hosted Blazor WASM model, the Server project hosts the SignalR hub. The Client project uses `Microsoft.AspNetCore.SignalR.Client` NuGet to build a `HubConnection`. Cookie authentication flows automatically because the client and server share the same origin. No token management needed for same-origin cookie-based Identity auth."
    examples:
      - file: "Microsoft Docs: Blazor SignalR tutorial"
        location: "Server: Program.cs adds AddSignalR() + MapHub(); Client: HubConnectionBuilder.WithUrl(Navigation.ToAbsoluteUri(\"/battlehub\"))"
        snippet: |
          // Server Program.cs
          builder.Services.AddSignalR();
          app.MapHub<BattleHub>("/battlehub");
          
          // Client component
          hubConnection = new HubConnectionBuilder()
              .WithUrl(Navigation.ToAbsoluteUri("/battlehub"))
              .WithAutomaticReconnect()
              .Build();
    prevalence: common
  - category: architecture
    pattern: "Group-based battle room pattern"
    description: "Each PVP battle creates a SignalR group (`battle_{battleId}`). Both players join the group on battle start. All battle-related messages (challenge accepted, result) are sent to the group. When battle ends, both players are removed from the group."
    examples:
      - file: "Microsoft Docs: SignalR Groups"
        location: "SignalR: Groups.AddToGroupAsync / Groups.RemoveFromGroupAsync / Clients.Group()"
        snippet: |
          await Groups.AddToGroupAsync(Context.ConnectionId, $"battle_{battleId}");
          await Clients.Group($"battle_{battleId}").SendAsync("BattleResolved", result);
          await Groups.RemoveFromGroupAsync(Context.ConnectionId, $"battle_{battleId}");
    prevalence: common
  - category: architecture
    pattern: "User-targeted notification pattern"
    description: "For 1:1 notifications (challenge received, opponent disconnected), use `Clients.User(userId).SendAsync()`. SignalR's default `IUserIdProvider` uses `ClaimTypes.NameIdentifier` from Identity. For custom user ID mapping, implement `IUserIdProvider`."
    examples:
      - file: "Microsoft Docs: SignalR authn-and-authz"
        location: "Hub: Clients.User(userId).SendAsync(\"ReceiveChallenge\", challenge)"
        snippet: |
          [Authorize]
          public async Task SendChallenge(string targetUserId, ChallengeRequest challenge)
          {
              await Clients.User(targetUserId).SendAsync("ReceiveChallenge", challenge);
          }
    prevalence: common
  - category: error_handling
    pattern: "Automatic reconnect with exponential backoff"
    description: "The .NET SignalR client supports `WithAutomaticReconnect()` using default retry delays [0s, 2s, 10s, 30s]. For Blazor WASM, subscribe to `Reconnecting`, `Reconnected`, and `Closed` events to update UI state. Must rejoin groups after reconnect since group membership is in-memory."
    examples:
      - file: "Microsoft Docs: SignalR .NET Client"
        location: "HubConnectionBuilder: WithAutomaticReconnect()"
        snippet: |
          hubConnection = new HubConnectionBuilder()
              .WithUrl(Navigation.ToAbsoluteUri("/battlehub"))
              .WithAutomaticReconnect(new[] { TimeSpan.Zero, TimeSpan.FromSeconds(2), TimeSpan.FromSeconds(10), TimeSpan.FromSeconds(30) })
              .Build();
          
          hubConnection.Reconnecting += error => { /* show reconnecting banner */ return Task.CompletedTask; };
          hubConnection.Reconnected += async connectionId => { /* rejoin battle groups */ };
    prevalence: common
  - category: structure
    pattern: "Block-scoped namespace convention"
    description: "All server-side classes (controllers, hubs) use block-scoped namespaces (`namespace X { ... }`). The Hub class should follow this convention in `RuckR.Server.Hubs`."
    examples:
      - file: "ProfileController.cs"
        location: "ProfileController.cs:4-5"
        snippet: |
          namespace RuckR.Server.Controllers
          {
              [ApiController]
              public class ProfileController : ControllerBase { ... }
          }
    prevalence: common
