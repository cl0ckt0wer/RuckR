patterns_found:
  - category: "architecture"
    pattern: "JS interop module encapsulation via IJSObjectReference + dynamic import()"
    description: |
      Microsoft's recommended pattern for .NET 5+ Blazor: load JS as an ES module via 
      `await JS.InvokeAsync<IJSObjectReference>("import", "./path/to/module.js")`. 
      The returned IJSObjectReference isolates all JS behind a module boundary. 
      Dispose it in IAsyncDisposable.DisposeAsync. No global namespace pollution.
    examples:
      - file: "Microsoft official docs"
        location: "blazor/js-interop/call-javascript-from-dotnet#javascript-isolation-in-javascript-modules"
        snippet: |
          // In OnAfterRenderAsync:
          module = await JS.InvokeAsync<IJSObjectReference>("import", "./Pages/JsCollocation2.razor.js");
          // In DisposeAsync:
          await module.DisposeAsync();
    prevalence: "common"

  - category: "architecture"
    pattern: "Fluxor [FeatureState] + [ReducerMethod] + [EffectMethod] for Blazor"
    description: |
      Fluxor organizes state into features: each feature has a State (immutable record with [FeatureState]),
      Actions (plain records/classes), Reducers (static methods with [ReducerMethod] — pure functions),
      and Effects (instance/static methods with [EffectMethod] — async side-effect handlers).
      Components inject IState<T> and IDispatcher, inherit FluxorComponent for auto-subscription.
    examples:
      - file: "Fluxor Blazor tutorial — StateActionsReducers"
        location: "Fluxor/Source/Tutorials/02-Blazor/02A-StateActionsReducersTutorial/README.md"
        snippet: |
          [FeatureState]
          public record CounterState(int ClickCount) { public CounterState() : this(0) {} }

          // Reducer:
          [ReducerMethod]
          public static CounterState ReduceIncrementCounterAction(CounterState state, IncrementCounterAction action) =>
            new CounterState(clickCount: state.ClickCount + 1);
    prevalence: "common"

  - category: "architecture"
    pattern: "Leaflet map initialization in Blazor OnAfterRenderAsync"
    description: |
      The map <div> must exist in the DOM before Leaflet can initialize. This means map creation
      must happen in OnAfterRenderAsync(firstRender: true), not in OnInitializedAsync.
      The JS module approach requires: (1) import module, (2) call module.InvokeVoidAsync("initMap", element, options).
    examples:
      - file: "Microsoft official docs"
        location: "blazor/js-interop/call-javascript-from-dotnet#prerendering"
        snippet: |
          protected override async Task OnAfterRenderAsync(bool firstRender)
          {
              if (firstRender)
              {
                  module = await JS.InvokeAsync<IJSObjectReference>("import", "./js/leaflet-map.js");
                  await module.InvokeVoidAsync("initMap", mapElement, centerLat, centerLng, zoomLevel);
              }
          }
    prevalence: "common"

  - category: "structure"
    pattern: "Feature-folder organization for Fluxor stores"
    description: |
      Fluxor recommends organizing state by feature, not by layer. Each feature gets its own folder
      (e.g., Store/MapFeature/) containing: State class, Actions (one file or multiple), Reducers class,
      Effects class. This contrasts with layer-based organization (all states in one folder, all reducers in another).
    examples:
      - file: "Fluxor Blazor tutorial — StateActionsReducers"
        location: "Smrpmorris/Fluxor/Source/Tutorials/02-Blazor/02A-StateActionsReducersTutorial/README.md"
        snippet: |
          Store/
            CounterFeature/
              CounterState.cs
              IncrementCounterAction.cs
              Reducers.cs
    prevalence: "common"

  - category: "structure"
    pattern: "Static Leaflet files in wwwroot directory"
    description: |
      Leaflet CSS and JS are static web assets. In Blazor WASM, place them under Client/wwwroot/.
      Options: (a) download Leaflet 1.9.4 dist files to wwwroot/leaflet/, reference with relative paths;
      (b) use CDN (unpkg) links in index.html. CDN approach is simplest for MVP; local files give offline control.
      OpenStreetMap tiles always loaded from CDN (https://tile.openstreetmap.org/{z}/{x}/{y}.png).
    examples:
      - file: "Leaflet Quick Start Guide"
        location: "https://leafletjs.com/examples/quick-start/"
        snippet: |
          <!-- In index.html <head>: -->
          <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
          <!-- Before </body>: -->
          <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    prevalence: "common"

