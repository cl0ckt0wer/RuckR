related_conventions:
  naming_patterns_in_domain: |
    - Fluxor actions: PascalCase verb-noun, e.g., UpdateLocationAction, SelectPitchAction, FetchInventoryAction
    - Fluxor states: PascalCase noun + "State", e.g., MapState, GameState, InventoryState, BattleState
    - Fluxor feature folders: PascalCase noun + "Feature", e.g., MapFeature/, GameFeature/, InventoryFeature/
    - JS module functions: camelCase, e.g., initMap(), addPitchMarker(), centerOn()
    - JS module file: kebab-case, e.g., leaflet-map.js (in Client/wwwroot/js/)
    - Blazor pages: PascalCase + "Page" suffix (if needed for clarity), e.g., MapPage.razor
    - All C# code in the project uses block-scoped namespaces per AGENTS.md convention
  structure_of_domain: |
    Client-side store organized by feature folders under RuckR/Client/Store/:
      Store/
        GameFeature/         — GameState.cs, GameActions.cs, GameReducers.cs, GameEffects.cs
        MapFeature/          — MapState.cs, MapActions.cs, MapReducers.cs, MapEffects.cs
        InventoryFeature/    — InventoryState.cs, InventoryActions.cs, InventoryReducers.cs, InventoryEffects.cs
        BattleFeature/       — BattleState.cs, BattleActions.cs, BattleReducers.cs, BattleEffects.cs

    JS interop files under RuckR/Client/wwwroot/js/:
      leaflet-map.js        — All Leaflet operations as exported module functions
      geolocation.js         — Browser geolocation API wrapper (optional, could merge into leaflet-map.js)
    
    Blazor pages under RuckR/Client/Pages/:
      MapPage.razor          — Full-screen map with Leaflet
      CollectionPage.razor   — Player inventory grid
      CatalogPage.razor      — All known players, filterable
      BattlePage.razor       — PVP challenge UI and history
  error_handling_in_domain: |
    - JS interop: try/catch JSDisconnectedException during IJSObjectReference.DisposeAsync() 
      (required for server-side scenarios; optional but safe practice in WASM)
    - Map initialization: wrap in try/catch; if module load fails, show error UI with retry button
    - GPS permission denied: catch in JS; call DotNet.invokeMethodAsync with error; display fallback UI
    - Fluxor effects: catch exceptions in EffectMethod, dispatch ErrorAction for UI notification
    - Existing pattern: Profile.razor uses try/catch with errorMessage string + retry button
  testing_in_domain: |
    No test projects exist in codebase (AGENTS.md confirms). MVP testing is manual. 
    Fluxor enables testability: reducers are pure static functions → trivially unit-testable.
    JS interop not covered by tests in current plan scope.
