plan_id: "20260505-creature-collector-rugby-gps"
objective: "Research map rendering (Leaflet.js via Blazor JS interop) and client-side state management (Fluxor) for rugby creature-collector game"
focus_area: "map-rendering-state-management"
created_at: "2026-05-05T23:30:00Z"
created_by: "gemini-researcher"
status: completed
tldr: |
  - Leaflet.js is confirmed as the optimal map library: 42KB, free tiles (OpenStreetMap), mature JS interop patterns via IJSObjectReference modules
  - Fluxor (latest 6.9.0) is the recommended state library: zero boilerplate Redux, Blazor-native, Redux DevTools support
  - JS interop encapsulation: leaflet-map.js module loaded via dynamic import(), disposed via IAsyncDisposable
  - State stores designed: MapState, GameState, InventoryState, BattleState — each a [FeatureState] immutable record
  - Map→State flow: marker click → JS callback → DotNet.invokeMethodAsync → dispatch action → reducer → UI re-render
  - Only 3 NuGet packages needed; Leaflet itself is pure JS loaded from wwwroot or CDN
  - Key gotcha: JS interop only after first render (OnAfterRenderAsync); module disposal prevents memory leaks
