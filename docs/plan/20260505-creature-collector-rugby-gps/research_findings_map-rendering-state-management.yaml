map_to_state_flow: |
  1. User taps pitch marker on map
  2. Leaflet 'click' event fires in leaflet-map.js
  3. JS calls: DotNet.invokeMethodAsync('RuckR.Client', 'OnPitchMarkerClicked', pitchId)
  4. C# method in MapPage.razor dispatches: Dispatcher.Dispatch(new SelectPitchAction(pitchId))
  5. Fluxor calls MapReducers.ReduceSelectPitchAction(state, action)
  6. New MapState returned with SelectedPitchId = pitchId
  7. FluxorComponent base class detects IState<MapState>.Value change
  8. StateHasChanged() called → MapPage re-renders
  9. MapPage @code section reads MapState.Value.SelectedPitchId
  10. If pitchId is set, pitch detail panel slides up / navigates to detail view

Blazor_WASM_gotchas:
  - gotcha: "JS interop only available after first render — map initialization MUST be in OnAfterRenderAsync(firstRender: true), never in OnInitializedAsync"
    impact: "Map will fail silently if initialized too early — no DOM element exists yet"
    mitigation: "Use OnAfterRenderAsync bool firstRender guard; set a bool _isMapInitialized flag"
  - gotcha: "IJSObjectReference must be disposed — memory leak if JS module references are not released"
    impact: "Multiple page navigations accumulate unreleased JS handles; WASM heap grows"
    mitigation: "Implement IAsyncDisposable; call await module.DisposeAsync() in DisposeAsync(); trap JSDisconnectedException"
  - gotcha: "Leaflet div needs explicit height — Leaflet requires a non-zero height container; CSS `height: 100%` won't work unless parent chain has heights set"
    impact: "Map renders as 0px tall strip (common first-time issue)"
    mitigation: "Set CSS: `#map { height: calc(100vh - var(--navbar-height)); }` or use `position: fixed; top; bottom; left; right;` for full-screen map"
  - gotcha: "DotNet.invokeMethodAsync requires assembly-qualified name or the component must be rendered"
    impact: "JS callback to .NET may fail with 'No call dispatcher' if component is disposed or Blazor isn't running"
    mitigation: "Check component lifecycle; pass DotNetObjectReference to JS rather than relying on static method dispatch for per-component instances"
  - gotcha: "Fluxor.Effects are singletons — injected services share store lifetime, not scoped lifetime"
    impact: "HttpClient injected into effects lives for the entire browser session; DNS changes won't be picked up"
    mitigation: "Use IHttpClientFactory in effects to create fresh HttpClient per request instead of injecting HttpClient directly"
  - gotcha: "FluxorComponent.OnInitialized must call base.OnInitialized() — if overridden without base call, state subscriptions won't register"
    impact: "Component won't react to state changes; appears 'stuck' with initial values"
    mitigation: "Always call base.OnInitialized() or base.OnInitializedAsync() first in overrides"
  - gotcha: "WASM payload size: adding Leaflet.js (~42KB) + Fluxor assemblies (~150KB) increases initial download"
    impact: "Slower first load, especially on mobile connections"
    mitigation: "Leaflet is small (42KB); Fluxor assemblies are AOT-compiled to WASM. Acceptable for MVP. Brotli compression helps."

open_questions:
  - question: "Should Leaflet CSS/JS be loaded from CDN (unpkg) or downloaded as local static assets in wwwroot?"
    context: "CDN is simpler — two lines in index.html. Local files give offline control and no external dependency at runtime. CDN uses subresource integrity hashes for security. For MVP, CDN is recommended for speed of implementation."
    type: "research"
    affects: ["index.html setup", "CSP headers"]
  - question: "Should geolocation watching be in the leaflet-map.js module or a separate geolocation.js module?"
    context: "Leaflet itself has map.locate() for one-shot positioning, but continuous watching requires navigator.geolocation.watchPosition(). Separation of concerns suggests a dedicated module; simplicity suggests one module. One module is simpler for MVP."
    type: "nice_to_know"
    affects: ["JS module structure"]
  - question: "When should the Fluxor store hydrate from server vs from localStorage cache?"
    context: "On app startup, should InventoryState load from localStorage first (instant), then fetch from server (eventual consistency)? Or always fetch from server? PRD says 'Syncing with server on reconnect' but localStorage cache is out of MVP scope."
    type: "research"
    affects: ["InventoryEffects", "user experience on slow connections"]
  - question: "Should map markers be managed entirely by Fluxor state or by direct JS interop calls for performance?"
    context: "Updating 50+ marker positions via state → JS interop round-trip per marker is slow. Better approach: send the full list to JS in one call (addMarkers(markerData[])), and only track which pitch is selected in Fluxor state. Bulk operations preferred over per-marker state."
    type: "decision_blocker"
    affects: ["MapState design", "leaflet-map.js API", "performance with many markers"]

gaps:
  - area: "Blazor WASM performance profiling with real GPS data"
    description: "No empirical data on how many markers Leaflet can handle with JS interop latency before UI feels sluggish. Leaflet itself handles 1000s of markers, but each interop call adds ~1-5ms WASM→JS bridge overhead."
    impact: "nice_to_know"
    affects: ["marker update strategy", "clustering plugin decision"]
  - area: "Fluxor middleware chain for SignalR integration"
    description: "Exact middleware pattern for connecting SignalR hub events to Fluxor effect dispatch not yet designed. Need to determine: (a) effects connect to hub in constructor, or (b) middleware listens to hub events, or (c) a service bridges hub → IDispatcher."
    impact: "research_blocker"
    affects: ["SignalR integration design", "GameState.Effects architecture"]
  - area: "Custom marker icon assets"
    description: "Rugby ball, player jersey, pitch marker icons need graphic design or free icon sourcing. No assets exist in project yet. Leaflet custom icons need PNG/SVG files with defined iconSize and iconAnchor."
    impact: "nice_to_know"
    affects: ["marker visual design", "wwwroot asset organization"]
