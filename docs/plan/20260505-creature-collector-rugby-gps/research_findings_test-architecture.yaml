domain_security_considerations:
  sensitive_areas:
    - area: "Authentication cookies"
      location: "ASP.NET Core Identity middleware (Server/Program.cs:34-46)"
      concern: "Cookie auth with 14-day sliding expiration; test must handle cookie extraction and reuse for authenticated API calls"
    - area: "GPS position data"
      location: "LocationTracker (Server), GeolocationService (Client), PlayerGrid.razor fuzzy distance"
      concern: "Server stores real user GPS positions; client displays only fuzzy distance buckets to other users; tests must verify fuzzy distance masking"
    - area: "Rate limiting state"
      location: "PitchesController.cs:18, CollectionController.cs:21, BattlesController.cs:20"
      concern: "ConcurrentDictionary-based in-memory rate limiters; tests must account for rate limit state across test runs (isolated per test or reset between tests)"
  authentication_patterns_in_domain: "Cookie-based ASP.NET Core Identity. Login POST to /Identity/Account/Login with username + password + __RequestVerificationToken (anti-CSRF). Successful login sets .AspNetCore.Identity.Application cookie. Client HttpClient auto-sends cookie on subsequent requests (same origin). No JWT bearer tokens used."
  authorization_patterns_in_domain: "All 4 controllers have [Authorize] at class level (PitchesController has it only on POST). BattleHub has [Authorize] at class level. GET /pitches and GET /pitches/nearby are public. Protected pages check auth in OnInitializedAsync and redirect to login. [Authorize] attribute on PitchCreate.razor provides declarative protection."
  data_validation_in_domain: "Server-side: ASP.NET Core model binding with [Required], [Range], [MaxLength] on DTOs; manual lat/lng range checks; enum parsing validation. Client-side: DataAnnotationsValidator in EditForm; form submit disabled binding on validation state. No FluentValidation or custom validators."

testing_patterns:
