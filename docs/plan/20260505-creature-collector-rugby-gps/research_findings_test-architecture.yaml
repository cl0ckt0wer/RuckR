plan_id: "20260505-creature-collector-rugby-gps"
objective: "Design Page Object Model architecture and API testing patterns for RuckR's Playwright .NET test suite"
focus_area: "test-architecture"
created_at: "2026-05-06"
created_by: "gemini-researcher"
status: completed
tldr: |
  - RuckR is a 3-project Blazor WASM Hosted app targeting net10.0 with 7 game pages, 4 API controllers, 1 SignalR hub, ASP.NET Core Identity auth, Fluxor state management, Leaflet.js map, and SQL Server spatial data.
  - NO existing test project, NO data-testid attributes, NO test infrastructure of any kind. Ground-up test architecture design required.
  - All 7 pages follow a consistent pattern: @page route, @inject services, auth check in OnInitializedAsync, loading spinner → error state with retry → empty state → data grid/cards. Bootstrap 5 CSS throughout.
  - 4 API controllers are [ApiController] + [Route("[controller]")] + [Authorize], returning JSON. BattleHub extends SignalR Hub with [Authorize], 6 hub methods, group management.
  - Authentication is cookie-based ASP.NET Core Identity (14-day sliding expiration). Login/Register are server-rendered Razor pages at /Identity/Account/Login and /Identity/Account/Register.
  - Seed data: 500 players + ~100 pitches around London (51.5074, -0.1278) via SeedService; reproducible with configurable seed value.

research_metadata:
  methodology: "Full codebase read of all 7 pages, 4 controllers, BattleHub, shared components (NavMenu, NotificationToast, ConnectionStatus), MainLayout, App.razor, ApiClientService, SignalRClientService, Fluxor stores, Program.cs, DTOs, models, PRD, AGENTS.md."
  scope: "comprehensive"
  confidence: high
  coverage: 98
  decision_blockers: 0
  research_blockers: 0

