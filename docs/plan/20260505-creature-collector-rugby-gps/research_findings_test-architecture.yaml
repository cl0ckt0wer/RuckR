related_conventions:
  naming_patterns_in_domain: |
    - Private fields: _camelCase (_isLoading, _errorMessage, _nearbyPlayers)
    - Public/model fields: PascalCase with @bind (formModel, selectedPosition)
    - Controller actions: PascalCase matching HTTP verb semantics (GetPlayers, CreatePitch, CapturePlayer)
    - Page routes: lowercase with hyphens for multi-word (/players/nearby, /pitches/create, /battles/history)
    - Namespace: RuckR.Shared.Models for shared types, RuckR.Client.Pages for pages, RuckR.Server.Controllers for controllers
  structure_of_domain: |
    - 3-project solution: Server (host), Client (WASM SPA), Shared (models/DTOs)
    - Pages: @page directive at line 1, @inject services, @code block with OnInitializedAsync
    - Controllers: [ApiController] + [Route("[controller]")] + [Authorize], block-scoped namespace
    - DTOs: sealed records in DTOs.cs (ChallengeRequest, AcceptChallengeRequest, CreatePitchRequest, etc.)
  error_handling_in_domain: |
    - All pages catch HttpRequestException for API failures; display in alert-danger with retry button
    - Controllers return HttpResponseMessage with status codes: 400 (BadRequest), 401 (Unauthorized), 403 (Forbid), 404 (NotFound), 409 (Conflict), 410 (Gone/Expired), 429 (RateLimit)
    - Battle.razor catches specific HTTP status codes (400, 409, 429) for targeted user-facing messages
    - All pages have generic Exception catch-all for unexpected errors
  testing_in_domain: "No existing tests. No test project. No test NuGet packages. No test files. No CI/CD. No editorconfig. No linting config. 'out_of_scope' in PRD explicitly excludes automated tests."
  documentation_in_domain: "AGENTS.md (architecture, conventions, ADRs); PRD.yaml (scope, user stories, acceptance criteria); code comments are sparse but present for complex methods."

