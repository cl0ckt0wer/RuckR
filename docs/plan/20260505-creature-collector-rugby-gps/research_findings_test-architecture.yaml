patterns_found:
  - category: structure
    pattern: "Blazor page state machine (loading → error → empty → data)"
    description: "Every page follows a strict 4-state UI pattern: (1) auth check with redirect, (2) loading spinner with visually-hidden text, (3) error alert with dismiss/retry button, (4) empty state with CTA, (5) data grid/cards. This is consistent across all 7 game pages."
    examples:
      - file: Collection.razor
        location: "Collection.razor:18-204"
        snippet: "if (requiresAuth) → spinner → error alert → empty state → card grid"
      - file: PlayerGrid.razor
        location: "PlayerGrid.razor:15-155"
        snippet: "if (_requiresAuth) → spinner → GPS disabled → error alert → radius selector → player card grid"
      - file: Map.razor
        location: "Map.razor:27-104"
        snippet: "if (_showOnboarding) → spinner → error with retry → GPS disabled banner → map container + pitch overlay"
    prevalence: common

  - category: structure
    pattern: "EditForm with DataAnnotationsValidator + [Authorize] attribute"
    description: "Forms use Blazor's built-in EditForm component with DataAnnotationsValidator for server-side model validation. The forms are protected either via code-behind auth check (Collection, PlayerGrid) or the declarative [Authorize] attribute (PitchCreate)."
    examples:
      - file: PitchCreate.razor
        location: "PitchCreate.razor:6,28-94"
        snippet: "@attribute [Authorize] + <EditForm Model=\"formModel\" OnValidSubmit=\"HandleSubmit\">"
      - file: Battle.razor
        location: "Battle.razor:97-137"
        snippet: "Select dropdown + text input + submit button with disabled binding based on validation state"
    prevalence: common

  - category: architecture
    pattern: "Fluxor state slices (Redux pattern) for client state"
    description: "Client-side state managed via Fluxor with 5 feature slices: LocationFeature (GPS position), MapFeature (visible pitches, selection), InventoryFeature (collected players), BattleFeature (active challenges, history), GameFeature (SignalR connection state). Each follows the Actions → Reducers → State pattern."
    examples:
      - file: RuckR/Client/Store/MapFeature/MapActions.cs
        location: "Store pattern: Actions + Reducers + State per feature directory"
        snippet: "SetPitchesAction, SetSelectedPitchAction, ClearSelectionAction"
      - file: RuckR/Client/Store/InventoryFeature/InventoryActions.cs
        location: "Store pattern"
        snippet: "FetchInventoryResultAction, ToggleFavoriteAction"
    prevalence: common

  - category: architecture
    pattern: "Cookie-based auth with redirect to Identity Razor pages"
    description: "ASP.NET Core Identity uses cookie authentication (not JWT bearer tokens). Protected pages check AuthenticationStateProvider.User.Identity.IsAuthenticated in OnInitializedAsync and redirect to /Identity/Account/Login?returnUrl=... with forceLoad:true. The login page is a server-rendered Razor page (not Blazor WASM)."
    examples:
      - file: Collection.razor
        location: "Collection.razor:216-224"
        snippet: "if (!user.Identity.IsAuthenticated) { Navigation.NavigateTo($\"/Identity/Account/Login?returnUrl={returnUrl}\", forceLoad: true); }"
      - file: PlayerGrid.razor
        location: "PlayerGrid.razor:184-189"
        snippet: "Same auth check pattern — identical across all protected pages"
    prevalence: common

  - category: architecture
    pattern: "JS interop for Leaflet map and geolocation"
    description: "Map rendering uses IJSRuntime/IJSObjectReference interop through IMapService. Geolocation uses browser API through IGeolocationService. The map div is a plain HTML element (#ruckr-map) with Leaflet initialized via JS. No C# map component wrapper — all map operations cross the interop boundary."
    examples:
      - file: Map.razor
        location: "Map.razor:14,70,147"
        snippet: "@inject IJSRuntime JS → <div id=\"ruckr-map\"> → MapService.InitMapAsync(\"ruckr-map\", lat, lng, 15)"
      - file: GeolocationService.cs
        location: "RuckR/Client/Services/GeolocationService.cs"
        snippet: "Calls navigator.geolocation.watchPosition via JS interop"
    prevalence: common

  - category: naming
    pattern: "Private backing fields prefixed with underscore"
    description: "All Blazor page code-behind fields use _camelCase naming: _isLoading, _errorMessage, _selectedPitch, etc. Public/component-visible fields (used in @bind) use camelCase without underscore: formModel, selectedPosition, nameFilter."
    examples:
      - file: Battle.razor
        location: "Battle.razor:334-359"
        snippet: "_requiresAuth, _isLoading, _errorMessage, _activeTab fields"
      - file: PitchCreate.razor
        location: "PitchCreate.razor:99-103"
        snippet: "formModel (public for @bind), isSubmitting, gpsUsed, errorMessage"
    prevalence: common

