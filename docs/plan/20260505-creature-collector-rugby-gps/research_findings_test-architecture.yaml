open_questions:
  - question: "How to extract the anti-CSRF token (__RequestVerificationToken) from the server-rendered Login page for automated form submission?"
    context: "ASP.NET Core Identity uses anti-forgery tokens on login forms. Playwright needs to extract the hidden input value from the page before POSTing credentials."
    type: research
    affects: ["LoginPage Object", "API authentication setup"]

  - question: "How to handle SignalR hub testing in Playwright — WebSocket route interception or separate .NET SignalR client?"
    context: "BattleHub requires authenticated WebSocket connection. Playwright can intercept WebSocket frames via Route objects, but verifying hub method calls and receiving server-to-client events requires WebSocket frame parsing. Alternative: use Microsoft.AspNetCore.SignalR.Client in the test project to connect directly alongside Playwright for E2E."
    type: decision_blocker
    affects: ["BattleHub API tests", "Real-time notification E2E tests"]

  - question: "How to reset rate-limit state between test runs given in-memory ConcurrentDictionary storage?"
    context: "PitchesController, CollectionController, and BattlesController all use static ConcurrentDictionary fields for rate limiting. These persist across test runs if the same server instance is reused. Options: restart server between tests, expose a test-only reset endpoint, or use a fresh server instance per test class."
    type: research
    affects: ["API test isolation", "Rate limit test scenarios"]

  - question: "What is the optimal test database strategy — use seed data 500 players or create minimal test-specific data?"
    context: "Existing seed data provides 500 players around London. Spatial query tests (players/nearby, pitches/nearby) need known coordinates and distances. Options: reuse seed data with known center point, or insert minimal test-specific spatial records. Using seed data means tests depend on specific seed values."
    type: research
    affects: ["Spatial query tests", "Test data fixtures"]

  - question: "Should data-testid attributes be added to Blazor components as part of the test setup, or rely on semantic selectors (text, role, CSS)?"
    context: "Currently NO data-testid attributes exist anywhere in the app. Playwright recommends data-testid for stable locators, but adding them requires modifying production code. Semantic selectors (GetByRole, GetByText, GetByLabel) are resilient but may break on copy changes."
    type: decision_blocker
    affects: ["All Page Objects", "Locator strategy", "Test maintenance"]

gaps:
  - area: "Test project infrastructure"
    description: "No test project exists in the solution. No NuGet test packages (xUnit, Playwright, coverlet) are referenced. No test configuration files. No CI/CD pipeline. The PRD explicitly excludes automated tests from scope ('out_of_scope: CI/CD pipelines, automated tests')."
    impact: research_blocker
    affects: ["All test initialization"]

  - area: "WebSocket/SignalR testing pattern for Playwright"
    description: "Playwright .NET has WebSocket route interception (Page.RouteWebSocket) but no high-level SignalR testing utilities. The BattleHub has 6 server-side hub methods and 4 client-side events. Testing real-time flows (challenge → notification → accept → result) requires either WebSocket frame-level testing or a parallel SignalR client in tests."
    impact: research_blocker
    affects: ["BattleHub API tests", "Real-time notification E2E tests"]

  - area: "Blazor WASM initialization timing"
    description: "Blazor WASM has a startup sequence: download WASM runtime → initialize .NET → start SignalR connection → render first page. Playwright needs to wait for Blazor to fully initialize before interacting with pages. The existing app has NO 'ready' event or DOM marker to signal Blazor readiness. Tests must poll for known DOM elements or use Playwright's WaitForSelector with timeout."
    impact: research_blocker
    affects: ["BasePage.WaitForBlazorAsync implementation", "All page navigation waits"]

  - area: "GPS mock strategy for E2E tests"
    description: "Playwright supports geolocation mocking (context.SetGeolocation) for browser tests. However, the app's IGeolocationService calls navigator.geolocation.watchPosition via JS interop. The Playwright geolocation API should work since it overrides the browser's native geolocation. Need to verify that Blazor JS interop calls to navigator.geolocation respect Playwright's mocked geolocation."
    impact: research_blocker
    affects: ["MapPage E2E tests", "PlayerGridPage E2E tests", "PitchCreatePage GPS auto-fill tests"]

  - area: "Leaflet.js map interaction testing"
    description: "The map is rendered entirely in JavaScript via Leaflet.js. Pitch markers are added via JS interop (MapService.AddPitchMarkersAsync). Testing map interactions (click marker, verify overlay) requires either (a) Playwright to click on Leaflet-generated DOM elements based on their CSS classes, or (b) the Blazor page to expose click handlers via JS interop callbacks. Current code uses Fluxor state change callbacks (MapState.StateChanged) to detect pitch selection."
    impact: research_blocker
    affects: ["MapPage.GetPitchMarkersAsync", "MapPage.ClickPitchMarkerAsync", "MapPage.IsUserMarkerVisibleAsync"]
