  test_organization: "Proposed structure per user request:"
  mock_patterns:
    - "Browser context: Playwright's built-in browser isolation (new Browser.NewContextAsync per test)"
    - "API context: Playwright.APIRequest.NewContextAsync for direct HTTP tests (no browser)"
