patterns_found:
  - category: architecture
    pattern: "JS Module Lazy-Load via IJSRuntime.import()"
    description: "Both geolocation.module.js and leaflet-map.module.js are loaded on first use via `_jsRuntime.InvokeAsync<IJSObjectReference>('import', './js/xxx.module.js')`. This means AddInitScript must execute before the Blazor app calls import()."
    examples:
      - file: GeolocationService.cs
        location: GeolocationService.cs:99-100
        snippet: "_module = await _jsRuntime.InvokeAsync<IJSObjectReference>(\"import\", \"./js/geolocation.module.js\");"
    prevalence: common
  - category: architecture
    pattern: "DotNetObjectReference callback from JS to C#"
    description: "JS modules receive DotNetObjectReference and call [JSInvokable] methods. GeolocationService.OnPositionChanged is called by geolocation.module.js's watchPosition success callback."
    examples:
      - file: GeolocationService.cs
        location: GeolocationService.cs:53-55
        snippet: "_dotNetRef = DotNetObjectReference.Create(this); await _module!.InvokeVoidAsync(\"startWatch\", _dotNetRef);"
    prevalence: common
  - category: architecture
    pattern: "SignalR Hub with [Authorize] + Clients.User(opponent.Id)"
    description: "BattleHub uses cookie-based auth from ASP.NET Core Identity. Hub methods use Context.UserIdentifier and Clients.User(userId) for targeted notifications."
    examples:
      - file: BattleHub.cs
        location: BattleHub.cs:140
        snippet: "await Clients.User(opponent.Id).SendAsync(\"ReceiveChallenge\", notification);"
    prevalence: common
  - category: architecture
    pattern: "xUnit IClassFixture<T> for shared browser/DB resources"
    description: "Standard xUnit pattern for E2E tests: IClassFixture<BrowserFixture> (shared Playwright instance) + IClassFixture<DatabaseFixture> (shared Docker SQL Server). WebApplicationFactory<T> for in-process server hosting."
    prevalence: occasional
  - category: testing
    pattern: "Deterministic seed parameter on business logic"
    description: "IBattleResolver.Resolve() accepts optional int? seed. When provided, creates new Random(seed.Value) instead of Random.Shared. Enables repeated deterministic outcomes in test assertions."
    examples:
      - file: IBattleResolver.cs
        location: IBattleResolver.cs:7
        snippet: "BattleResult Resolve(..., int? seed = null);"
    prevalence: rare
  - category: structure
    pattern: "Block-scoped namespaces with subdirectory models"
    description: "All code uses `namespace RuckR.Server.Services { ... }` style. Shared models in RuckR.Shared.Models subdirectory follow ProfileModel convention."
    examples:
      - file: BattleModel.cs
        location: BattleModel.cs:4
        snippet: "namespace RuckR.Shared.Models { ... }"
    prevalence: common
