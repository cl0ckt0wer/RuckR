plan_id: "20260505-creature-collector-rugby-gps"
objective: "Research GPS geolocation mocking + SignalR multi-user PVP testing patterns with Playwright .NET for the RuckR rugby GPS Blazor WASM game"
focus_area: "testing_patterns"
created_at: "2026-05-06"
created_by: "gemini-researcher"
status: completed
tldr: |
  - GPS mocking: `BrowserContext.AddInitScriptAsync()` is the only reliable method for `navigator.geolocation.watchPosition()` in Blazor WASM. `SetGeolocationAsync()` from Playwright only fires once and does not trigger the watchPosition callback repeatedly.
  - Multi-position simulation: Queue-based JS override in AddInitScript that emits positions from a script-controlled array, dispatched via `dispatchEvent(new CustomEvent(...))` or direct `success()` callback re-invocation.
  - Permission: `GrantPermissionsAsync(new[] { "geolocation" })` must be called BEFORE `Page.GotoAsync()`.
  - Multi-user SignalR testing: Two `IBrowserContext` instances with independent cookie jars. Each context registers/logs in via UI, then connects to `/battlehub`. Use `Page.WaitForSelectorAsync()` with CSS class selectors for event assertions.
  - `BattleResolver` accepts optional `int? seed` parameter for deterministic outcomes in tests.
  - Reconnection: `RouteWebSocketAsync("/battlehub", ...)` at context level blocks WS to force reconnect. `SetOfflineAsync(true)` also works.
  - Database: Docker SQL Server via `Testcontainers.MsSql` 4.11.0 (supports net10.0). Per-test database isolation via unique GUID-suffixed DB name. OR manual `docker run` with `mcr.microsoft.com/mssql/server:2022-latest`.
  - NuGet packages: `Microsoft.Playwright` 1.59.0, `Microsoft.Playwright.Xunit` 1.59.0 (xUnit helpers), `Testcontainers.MsSql` 4.11.0, `Microsoft.AspNetCore.Mvc.Testing` (built-in for WebApplicationFactory).
