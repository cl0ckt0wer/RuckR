open_questions:
  - question: "Does `BrowserContext.SetGeolocationAsync()` trigger `navigator.geolocation.watchPosition`'s success callback repeatedly on position change?"
    context: "Playwright docs show SetGeolocationAsync sets a static position. It fires getCurrentPosition but watchPosition behavior is implementation-specific. In Chromium, SetGeolocationAsync only fires once for watchPosition — does not re-trigger on subsequent calls."
    type: research
    affects: ["GPS mocking approach — determines whether AddInitScript override is mandatory"]
  - question: "Is `Microsoft.Playwright.Xunit` 1.59.0 compatible with xUnit v3?"
    context: "NuGet shows separate `Microsoft.Playwright.Xunit.v3` package exists. For xUnit v2, use Playwright.Xunit. xUnit v3 requires Playwright.Xunit.v3."
    type: research
    affects: ["NuGet package selection — depends on desired xUnit version"]
  - question: "Can `WebApplicationFactory<Program>` be used with a real Docker SQL Server or only in-memory?"
    context: "WebApplicationFactory can override connection strings via `WithWebHostBuilder()`. Can point to Testcontainers SQL Server by customizing configuration."
    type: research
    affects: ["Test server configuration pattern"]
  - question: "Does Blazor WASM's `app.UseBlazorFrameworkFiles()` serve static assets from a test WebApplicationFactory?"
    context: "WebApplicationFactory creates an in-memory TestServer. Blazor WASM assets are served as static files. TestServer by default serves from project root's wwwroot, not the Client's published output. May need CustomWebApplicationFactory override."
    type: research
    affects: ["Whether full E2E works with WebApplicationFactory or requires running server separately"]
  - question: "Optimal timeout values for SignalR event delivery in Playwright tests?"
    context: "SignalR messages are near-instant on localhost but Blazor WASM has an initialization delay (~2-5 seconds for .NET runtime load). Challenge → notification may take 200-2000ms. Need empirically determined WaitForSelectorAsync timeouts."
    type: nice_to_know
    affects: ["Test reliability — too short timeouts cause flaky tests"]
gaps:
  - area: "Blazor WASM static asset serving in WebApplicationFactory"
    description: "WebApplicationFactory's default TestServer may not serve Blazor WASM's compiled _framework assets correctly. The Client project is compiled to bin/Release/net10.0/wwwroot/_framework. The test server needs to find and serve these files. May require a custom DelegatingHandler or running the actual Kestrel server via Playwright instead."
    impact: decision_blocker
    affects: ["Test architecture — determines whether to use WebApplicationFactory or standalone server process"]
  - area: "Auth flow automation in Playwright"
    description: "ASP.NET Core Identity UI (login/register Razor pages) is server-hosted. Initial page load redirects to /Identity/Account/Login. The test must: navigate to login, fill form, submit, wait for redirect back to Blazor app, then wait for Blazor to initialize before SignalR connects. No existing test auth helper exists."
    impact: research_blocker
    affects: ["Multi-user test setup — 2 auth flows needed per test"]
  - area: "AddInitScriptAsync execution timing vs Blazor module import"
    description: "Official Playwright docs: AddInitScript runs 'after the document was created but before any of its scripts were run.' However, Blazor WASM loads its runtime via a <script> tag, then JS modules are loaded via dynamic import(). The init script must override navigator.geolocation before any page script calls import('./js/geolocation.module.js'). Since import() is async and called by C# code (not <script>), the timing should be safe, but needs verification."
    impact: research_blocker
    affects: ["GPS mocking reliability"]
  - area: "Test project structure and .csproj configuration"
    description: "No test project exists. Need to create: (a) decide project name (RuckR.Tests or RuckR.Tests.E2E), (b) target framework (net10.0), (c) reference Server project for WebApplicationFactory, (d) reference Shared project for models, (e) configure NuGet packages (Playwright, Testcontainers, xUnit). Need to ensure Playwright browsers are installed (playwright.ps1 install)."
    impact: decision_blocker
    affects: ["All testing implementation"]
