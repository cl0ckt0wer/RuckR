patterns_found:
  - category: architecture
    pattern: "Hosted Blazor WASM (legacy pattern on .NET 10)"
    description: |
      The project uses the older "Hosted Blazor WebAssembly" template pattern (Server project hosts
      Client WASM assets) but targets net10.0. The Microsoft documentation for .NET 9+ recommends
      migrating to the "Blazor Web App" model, though the hosted pattern is still supported.
      The middleware pipeline shows a mix of old and new patterns.
    examples:
      - file: RuckR/Server/Program.cs
        location: "76-77"
        snippet: |
          app.UseBlazorFrameworkFiles();  // OLD pattern
          app.MapStaticAssets();          // NEW pattern (replaces UseBlazorFrameworkFiles)
    prevalence: common
  - category: structure
    pattern: "Conflicting static-file middleware (UseBlazorFrameworkFiles + MapStaticAssets)"
    description: |
      .NET 10 Microsoft Learn docs explicitly state: "Map Static Assets also replaces calling
      UseBlazorFrameworkFiles in apps that serve Blazor WebAssembly framework files."
      When both are called, MapStaticAssets() (which uses build-time asset fingerprinting)
      overrides the _framework path mapping set up by UseBlazorFrameworkFiles(). PDB files
      are not fingerprinted as static assets, so MapStaticAssets() returns 404 for them.
    examples:
      - file: RuckR/Server/Program.cs
        location: "76-77"
        snippet: |
          app.UseBlazorFrameworkFiles();
          app.MapStaticAssets();
    prevalence: rare
  - category: error_handling
    pattern: "Mono WASM PDB download at startup when UseWebAssemblyDebugging() is active"
    description: |
      When UseWebAssemblyDebugging() is enabled (Development mode), the Mono WASM runtime
      in the browser tries to download .pdb files for every DLL in blazor.boot.json.
      If the PDB isn't served by the static file middleware, a 404 error is logged.
      This is a known behavior pattern in Blazor WASM across .NET 6-10.
    examples:
      - file: (browser console)
        location: "runtime"
        snippet: |
          Error in mono_download_assets: Error: download 'https://localhost:7161/_framework/RuckR.Client.tj0vat3k5u.pdb' for RuckR.Client.tj0vat3k5u.pdb failed 404
    prevalence: common
related_architecture:
  components_relevant_to_domain:
    - component: Static file middleware pipeline
      responsibility: Serves WASM framework files (_framework/*) and app static assets to the browser
      location: RuckR/Server/Program.cs:74-77
      relationship_to_domain: Directly responsible for the 404 — conflicting middleware prevents PDB delivery
    - component: Blazor WASM debugging proxy
      responsibility: Enables IDE/browser debugging of WASM .NET code; triggers PDB downloads
      location: RuckR/Server/Program.cs:65 (UseWebAssemblyDebugging)
      relationship_to_domain: Activates the PDB download behavior that triggers the 404 error
    - component: Service worker (PWA)
      responsibility: Offline caching of app assets including PDBs; registered in index.html
      location: RuckR/Client/wwwroot/service-worker.js, service-worker.published.js
      relationship_to_domain: Published version caches PDBs; stale cache could compound the issue
  interfaces_used_by_domain:
    - interface: IApplicationBuilder.UseWebAssemblyDebugging()
      location: RuckR/Server/Program.cs:65
      usage_pattern: Called in Development environment only; enables WASM debug proxy
    - interface: IApplicationBuilder.UseBlazorFrameworkFiles()
      location: RuckR/Server/Program.cs:76
      usage_pattern: Maps _framework path to Client build output; REDUNDANT when MapStaticAssets() follows
    - interface: IEndpointRouteBuilder.MapStaticAssets()
      location: RuckR/Server/Program.cs:77
      usage_pattern: .NET 9+ optimized static asset delivery; replaces UseBlazorFrameworkFiles per docs
  data_flow_involving_domain: |
    Browser requests _framework/blazor.boot.json → static file middleware serves it →
    Mono runtime parses assembly list → for each DLL, Mono requests matching .pdb →
    middleware checks asset manifest → PDB not in MapStaticAssets manifest → 404 returned
  key_relationships_to_domain:
    - from: MapStaticAssets() endpoint
      to: _framework/* files
      relationship: serves (but only assets tracked in build-time manifest)
    - from: UseBlazorFrameworkFiles() middleware
      to: _framework/* files
      relationship: serves (maps to Client build output, but overridden by MapStaticAssets)
    - from: UseWebAssemblyDebugging() middleware
      to: Mono WASM runtime
      relationship: enables (tells runtime to download PDBs for debugging)
