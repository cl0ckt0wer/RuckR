status: completed
tldr: |
  - Root cause: Conflicting static file middleware — `UseBlazorFrameworkFiles()` (line 76) is overridden by `MapStaticAssets()` (line 77) in `Program.cs`. .NET 10 docs state `MapStaticAssets()` replaces `UseBlazorFrameworkFiles()`; when both are called, the second overrides the first. `MapStaticAssets()` uses a build-time asset manifest and does not serve PDB files from `_framework`, causing 404s.
  - Secondary: `UseWebAssemblyDebugging()` triggers Mono runtime to aggressively download all PDBs at startup (Development mode).
  - Secondary: `index.html` uses legacy non-fingerprinted `blazor.webassembly.js` script tag; service worker registered unconditionally.
  - Fix: Remove `app.UseBlazorFrameworkFiles()` line (redundant/conflicting), OR replace `app.MapStaticAssets()` with `app.UseStaticFiles()` for the classic Hosted WASM pipeline. Also consider adding `<WasmDebugLevel>0</WasmDebugLevel>` to suppress PDB downloads.
  - Tech stack: .NET 10, Blazor WASM Hosted, ASP.NET Core Identity, SignalR, Fluxor, EF Core + SQL Server
  - Critical files: `RuckR/Server/Program.cs:76-77`, `RuckR/Client/RuckR.Client.csproj`, `RuckR/Client/wwwroot/index.html:33,35`
