plan_id: "20260505-creature-collector-rugby-gps"
objective: "Diagnose UI bug where navigation menu items visually overlap the map component"
focus_area: "nav-menu-map-overlap"
created_at: "2026-05-06T00:00:00Z"
created_by: "RESEARCHER"
status: completed
tldr: |
  - PRIMARY BUG: `.sidebar` (250px fixed width, position:sticky) lacks `overflow: hidden`, allowing nav item text (esp. "Hello, {username}!") to overflow visually into the map area on desktop
  - SECONDARY BUG: The map's `height: calc(100vh - 56px)` on mobile assumes only `main > .top-row` consumes space, but mobile layout stacks sidebar above main; when nav is expanded, map height pushes beyond viewport
  - TERTIARY: `.sidebar` has `position: sticky` but no `z-index`, creating ambiguous stacking against `main > .top-row` (z-index: 1) and `#ruckr-map` (z-index: 1)
  - 6 files directly involved; fix requires CSS changes to MainLayout.razor.css (overflow + z-index), NavMenu.razor.css (text overflow), and Map.razor (height calc)
research_metadata:
  methodology: "semantic_search + grep_search + read_file — full structural analysis of all .razor, .razor.css, and .css files"
  scope: "medium — 15 razor/css files analyzed, DOM tree traced through 3 layout layers"
  confidence: high
  coverage: 95
  decision_blockers: 1
  research_blockers: 0
