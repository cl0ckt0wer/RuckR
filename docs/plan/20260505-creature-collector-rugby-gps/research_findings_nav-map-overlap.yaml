open_questions:
  - question: "Should the fix add overflow:hidden to .sidebar (truncates overflow) or make .sidebar wider / nav items wrap/truncate?"
    context: ".sidebar is 250px wide. Nav items with icon + padding leave ~186px for text. Long usernames overflow. Options: (1) overflow:hidden on sidebar (clips), (2) overflow-x:hidden + text-overflow:ellipsis on nav items, (3) increase sidebar width, (4) wrap long text."
    type: "decision_blocker"
    affects: ["MainLayout.razor.css", "NavMenu.razor.css"]
  - question: "Should the map height on mobile be recalculated to account for expanded nav menu, or should the nav overlay the map on mobile?"
    context: "The map uses height: calc(100vh - 56px) which assumes only main > .top-row exists. On mobile, the sidebar sits above main. When nav is expanded, map height pushes far below viewport. Options: (1) use flex:1 + min-height instead of calc, (2) make nav an overlay on mobile, (3) recalculate calc to subtract sidebar + nav height."
    type: "decision_blocker"
    affects: ["Map.razor", "MainLayout.razor.css"]
  - question: "Is the z-index: 1 on #ruckr-map and main > .top-row intentional or vestigial?"
    context: "#ruckr-map has z-index: 1 but no position property — z-index has no effect. The main > .top-row has position: sticky + z-index: 1. Should .sidebar get an explicit z-index for unambiguous stacking?"
    type: "research"
    affects: ["Map.razor", "MainLayout.razor.css"]
gaps:
  - area: "Sidebar overflow containment"
    description: ".sidebar (MainLayout.razor.css) has width: 250px and position: sticky on desktop but no overflow: hidden. Nav items and ConnectionStatus text can overflow the 250px boundary into the main/map area. No text-overflow:ellipsis, word-break, or overflow-x:hidden on nav items."
    impact: "decision_blocker"
    affects: ["MainLayout.razor.css:58-63", "NavMenu.razor.css:63-67", "NavMenu.razor.css:34-41"]
  - area: "Mobile map height calculation"
    description: "Map.razor uses height: calc(100vh - 56px). The 56px subtraction accounts only for main > .top-row (3.5rem). On mobile (<641px), main > .top-row is display:none AND the sidebar navbar + expanded nav items add substantial height above the map. The map extends beyond viewport, requiring scroll."
    impact: "decision_blocker"
    affects: ["Map.razor:19,41,51"]
  - area: "Sidebar z-index"
    description: ".sidebar has position: sticky on desktop but no z-index. The sibling main > .top-row has z-index: 1. The #ruckr-map has unused z-index: 1 (no position). The .map-overlay has z-index: 1000. Stacking context is ambiguous and could cause unexpected overlap in edge cases."
    impact: "nice_to_know"
    affects: ["MainLayout.razor.css:58-63"]
  - area: "No responsive nav pattern for mobile"
    description: "On mobile, the nav menu uses Bootstrap collapse toggle but when expanded, it pushes all content down (conventional behavior). However, combined with the map's fixed calc height, this creates a broken scroll experience. No overlay/off-canvas pattern for mobile nav."
    impact: "nice_to_know"
    affects: ["NavMenu.razor", "NavMenu.razor.css"]
