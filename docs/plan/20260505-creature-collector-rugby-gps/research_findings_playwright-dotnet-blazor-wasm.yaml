related_conventions:
  naming_patterns_in_domain: |
    - Test project: RuckR.Tests (in repo root, sibling to RuckR/ directory)
    - Test classes: {PageName}PageTests.cs or {ControllerName}ControllerTests.cs
    - Test methods: Should_{ExpectedBehavior}_When_{Condition} OR {Method}_{Scenario}_{ExpectedResult}
    - Page Object classes: {PageName}Page.cs (e.g., ProfilePage.cs, MapPage.cs)
    - Base classes: PageTest (from Playwright), CustomWebApplicationFactory (inherits WebApplicationFactory<Program>)
    - Factories/helpers: BlazorWaitHelper.cs, TestDataFactory.cs
  structure_of_domain: |
    RuckR.Tests/
    ├── RuckR.Tests.csproj         # net10.0, xUnit, Playwright, Mvc.Testing
    ├── playwright.runsettings      # BrowserName, Headless, Worker count
    ├── CustomWebApplicationFactory.cs  # Inherits WebApplicationFactory<Program>
    ├── appsettings.Test.json       # Docker SQL Server connection string
    ├── E2E/                        # Playwright browser tests
    │   ├── Pages/                  # Page Object Model classes
    │   │   ├── BasePage.cs
    │   │   ├── ProfilePage.cs
    │   │   ├── MapPage.cs
    │   │   ├── CollectionPage.cs
    │   │   └── LoginPage.cs
    │   ├── MapPageTests.cs         # E2E tests for /map
    │   ├── ProfilePageTests.cs     # E2E tests for /profile
    │   └── AuthTests.cs            # Login/register flow tests
    ├── API/                        # Direct HTTP API tests (no browser)
    │   ├── PlayersControllerTests.cs
    │   ├── PitchesControllerTests.cs
    │   ├── BattlesControllerTests.cs
    │   └── CollectionControllerTests.cs
    ├── Helpers/
    │   ├── BlazorWaitHelper.cs     # WaitForBlazorAsync, WaitForBlazorElementAsync
    │   └── TestDataFactory.cs      # PlayerModel, PitchModel seed helpers
    └── Mobile/                     # Mobile viewport test variants
        ├── MapPageMobileTests.cs   # Pixel 5 / iPhone 13 viewport
        └── ResponsiveTests.cs
  error_handling_in_domain: |
    - Playwright auto-waits for element actionability (visible, enabled, stable) before actions — no manual Task.Delay needed.
    - Use Expect().ToBeVisibleAsync() / ToHaveTextAsync() with configurable timeout (default 5s, override via .runsettings <ExpectTimeout>).
    - Blazor WASM startup failures (e.g., missing DLLs) produce console errors — capture with page.Console event listener.
    - For [Authorize] controllers, test auth handler returns AuthenticateResult.Success with test claims.
    - Test database transactions: rollback after each test or use Respawn to reset state.
  testing_in_domain: |
    - Multi-layered: API tests (WebApplicationFactory HttpClient) + E2E tests (Playwright browser) + mobile viewport variants.
    - Test isolation: Playwright creates fresh BrowserContext per test (separate cookies, localStorage, permissions).
    - Database isolation: Each test class seeds known data; tests never depend on test execution order.
    - Parallel execution: xUnit runs test classes in parallel (default); each Playwright test uses isolated BrowserContext; Blazor WASM memory footprint ~50-100MB per context.
    - CI: headless Chromium by default; set <Headless>false</Headless> in .runsettings for local debugging.
    - Filtering: dotnet test --filter "Category=Smoke" (requires [Trait("Category", "Smoke")] in xUnit or [Category("Smoke")] in NUnit).
  documentation_in_domain: |
    - Playwright official docs: https://playwright.dev/dotnet/docs/intro
    - ASP.NET Core integration tests: https://learn.microsoft.com/en-us/aspnet/core/test/integration-tests
    - Playwright .NET API reference: https://playwright.dev/dotnet/docs/api/class-playwright
    - Devices registry source: https://github.com/microsoft/playwright/blob/main/packages/playwright-core/src/server/deviceDescriptorsSource.json

