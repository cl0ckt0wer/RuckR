patterns_found:
  - category: "architecture"
    pattern: "WebApplicationFactory<TProgram> for in-memory ASP.NET Core hosting"
    description: "Microsoft.AspNetCore.Mvc.Testing provides WebApplicationFactory<TProgram> that creates an in-memory TestServer for the SUT. The test project references the Server project and uses the implicit Program class as TEntryPoint. Need InternalsVisibleTo or a public partial class Program since top-level statements generate an internal class."
    examples:
      - file: "Microsoft official docs"
        location: "https://learn.microsoft.com/en-us/aspnet/core/test/integration-tests"
        snippet: "public class BasicTests : IClassFixture<WebApplicationFactory<Program>> { ... }"
    prevalence: "common"

  - category: "architecture"
    pattern: "CustomWebApplicationFactory inheriting WebApplicationFactory<T>"
    description: "Override ConfigureWebHost to replace DbContext registration with test-specific connection string (Docker SQL Server), configure test services, and set environment. The factory is shared via IClassFixture<T> in xUnit or [SetUp]/[TearDown] in NUnit."
    examples:
      - file: "Microsoft official docs"
        location: "https://learn.microsoft.com/en-us/aspnet/core/test/integration-tests#customize-webapplicationfactory"
        snippet: "protected override void ConfigureWebHost(IWebHostBuilder builder) { builder.ConfigureServices(services => { ... }); builder.UseEnvironment(\"Development\"); }"
    prevalence: "common"

  - category: "architecture"
    pattern: "PageTest base class from Microsoft.Playwright.{NUnit|Xunit|MSTest}"
    description: "Playwright provides framework-specific base classes (PageTest, ContextTest, BrowserTest, PlaywrightTest) that manage IPlaywright/IBrowser/IBrowserContext/IPage lifecycle. Extend PageTest for most E2E tests — each [Test]/[Fact] gets a fresh Page in isolated BrowserContext."
    examples:
      - file: "playwright.dev docs"
        location: "https://playwright.dev/dotnet/docs/test-runners"
        snippet: "public class ExampleTest : PageTest { [Test] public async Task HasTitle() { await Page.GotoAsync(\"https://playwright.dev\"); await Expect(Page).ToHaveTitleAsync(new Regex(\"Playwright\")); } }"
    prevalence: "common"

  - category: "structure"
    pattern: "Blazor WASM render detection: Page.WaitForSelectorAsync on Blazor-specific DOM"
    description: "Blazor WASM loads in stages (HTML → blazor.webassembly.js → .NET runtime → Blazor app → component render). Page.WaitForLoadStateAsync(LoadState.NetworkIdle) fires after static resources load but BEFORE Blazor renders components. Reliable detection requires waiting for a DOM element that Blazor inserts (e.g., an h3 heading, a .card div, or a #blazor-error-ui element)."
    examples:
      - file: "RuckR/Client/Pages/Profile.razor"
        location: "RuckR/Client/Pages/Profile.razor:5"
        snippet: "<!-- Test waits for: --> await Page.WaitForSelectorAsync(\"h3:has-text('Profile')\");"
    prevalence: "common"

  - category: "structure"
    pattern: "Playwright.Devices for mobile viewport emulation"
    description: "playwright.Devices is an IReadOnlyDictionary<string, BrowserNewContextOptions> containing ~50+ device presets (iPhone 13, Pixel 5, iPad Pro, etc.) with correct UserAgent, ViewportSize, DeviceScaleFactor, IsMobile, HasTouch. Can also create custom BrowserNewContextOptions."
    examples:
      - file: "playwright.dev docs"
        location: "https://playwright.dev/dotnet/docs/emulation#devices"
        snippet: "var pixel5 = playwright.Devices[\"Pixel 5\"];\nawait using var context = await browser.NewContextAsync(pixel5);"
    prevalence: "common"

  - category: "structure"
    pattern: "Override ContextOptions() for per-test-class viewport/baseURL"
    description: "The PageTest/ContextTest base classes allow overriding ContextOptions() to return BrowserNewContextOptions with custom ViewportSize, BaseURL, ColorScheme, Locale, Geolocation, Permissions. This avoids repeating configuration in each test."
    examples:
      - file: "playwright.dev docs"
        location: "https://playwright.dev/dotnet/docs/test-runners#customizing-browsercontext-options"
        snippet: "public override BrowserNewContextOptions ContextOptions() { return new() { ViewportSize = new() { Width = 393, Height = 851 }, BaseURL = \"https://localhost:7161\" }; }"
    prevalence: "common"

  - category: "error_handling"
    pattern: "Blazor reconnection UI detection and dismissal"
    description: "Blazor WASM displays a reconnection modal (components-reconnect-modal) when the SignalR circuit or WASM runtime restarts. In headless tests, this modal may block interactions. Tests can suppress it via JS evaluation or wait for it to disappear."
    examples:
      - file: "Community pattern"
        location: "N/A (community knowledge)"
        snippet: "// Before test: await Page.EvaluateAsync(\"() => { const e = document.getElementById('components-reconnect-modal'); if(e) e.remove(); }\");\n// Or: wait for it to not exist: await Expect(Page.Locator(\"#components-reconnect-modal\")).ToBeHiddenAsync();"
    prevalence: "occasional"

  - category: "testing"
    pattern: "Dual-mode testing: WebApplicationFactory for API + Playwright for browser E2E"
    description: "For a Blazor WASM hosted app, two test modes exist: (1) API-only tests use WebApplicationFactory.CreateClient() to send HTTP requests directly to controllers without a browser; (2) E2E tests use Playwright to navigate a real Chromium browser to the WebApplicationFactory-hosted URL. The same CustomWebApplicationFactory can serve both modes."
    examples:
      - file: "Microsoft docs + community"
        location: "https://learn.microsoft.com/en-us/aspnet/core/test/integration-tests"
        snippet: "var client = _factory.CreateClient(); // API tests\nvar response = await client.GetAsync(\"/players\");\n\n// E2E tests (Playwright):\nvar page = await browser.NewPageAsync();\nawait page.GotoAsync(client.BaseAddress.ToString() + \"/map\");"
    prevalence: "common"

  - category: "convention"
    pattern: "xUnit vs NUnit for Playwright .NET"
    description: "NUnit has the most downloads (18M) and largest community. xUnit uses IAsyncLifetime (InitializeAsync/DisposeAsync) which maps cleanly to Playwright's async lifecycle. NUnit uses [SetUp]/[TearDown] (can be async with async Task). Both frameworks work equally well; xUnit's constructor injection + IClassFixture is cleaner for WebApplicationFactory sharing. MSTest is least popular for Playwright (2.8M downloads)."
    examples:
      - file: "NuGet.org download stats"
        location: "https://www.nuget.org/packages/Microsoft.Playwright.NUnit/"
        snippet: "NUnit: 18.0M total downloads | xUnit: 783K | MSTest: 2.8M"
    prevalence: "common"

related_architecture:
  components_relevant_to_domain:
    - component: "RuckR.Server (ASP.NET Core host)"
      responsibility: "Hosts API controllers, serves Blazor WASM static files, SignalR hub, ASP.NET Core Identity"
      location: "RuckR/Server/"
      relationship_to_domain: "System Under Test (SUT) — WebApplicationFactory<Program> targets this project; Playwright browser navigates to URLs served by this host"
    - component: "RuckR.Client (Blazor WASM SPA)"
      responsibility: "Browser-based SPA with Fluxor state, Leaflet.js map, GPS geolocation, PVP battle UI"
      location: "RuckR/Client/"
      relationship_to_domain: "Rendered in Chromium browser — Playwright interacts with rendered Blazor components via DOM selectors"
    - component: "RuckR.Shared (Models)"
      responsibility: "Data models, DTOs, enums shared between Server and Client"
      location: "RuckR/Shared/"
      relationship_to_domain: "Test data factories use these models; API response assertions deserialize to these types"
    - component: "RuckRDbContext (EF Core)"
      responsibility: "SQL Server database context with spatial support (NetTopologySuite)"
      location: "RuckR/Server/Data/"
      relationship_to_domain: "Test must replace connection string with Docker SQL Server; seed test data via DbContext"
  interfaces_used_by_domain:
    - interface: "WebApplicationFactory<TEntryPoint>"
      location: "Microsoft.AspNetCore.Mvc.Testing (NuGet)"
      usage_pattern: "IClassFixture<CustomWebApplicationFactory<Program>> in xUnit test classes; creates in-memory TestServer hosting Blazor WASM + API"
    - interface: "IPlaywright / IBrowser / IBrowserContext / IPage"
      location: "Microsoft.Playwright (NuGet)"
      usage_pattern: "Managed by PageTest base class; IPage is the primary test surface (navigation, locators, assertions)"
    - interface: "ILocator / IReadOnlyList<ILocator>"
      location: "Microsoft.Playwright (NuGet)"
      usage_pattern: "Page.GetByRole(), Page.Locator(), Page.GetByText() return ILocator for web-first assertions"
    - interface: "IJSObjectReference / IJSRuntime"
      location: "Microsoft.JSInterop (ASP.NET Core)"
      usage_pattern: "Blazor's JS interop boundary — Playwright can also call Page.EvaluateAsync() to run JS directly"
  data_flow_involving_domain: |
    1. dotnet test starts → xUnit creates CustomWebApplicationFactory<Program> → in-memory TestServer starts
    2. Playwright launches Chromium browser → navigates to TestServer URL (e.g., http://localhost:5000/)
    3. Browser loads index.html → blazor.webassembly.js → .NET runtime → Blazor app → page renders
    4. Playwright waits for Blazor DOM elements → performs actions (click, fill, navigate)
    5. Blazor components call Server API via HttpClient → API returns JSON → Blazor re-renders
    6. Playwright assertions verify DOM state
    7. Alternatively: API tests skip browser → use HttpClient from WebApplicationFactory → assert HTTP responses
  key_relationships_to_domain:
    - from: "RuckR.Tests (new project)"
      to: "RuckR.Server"
      relationship: "ProjectReference + WebApplicationFactory<Program>"
    - from: "RuckR.Tests (new project)"
      to: "Microsoft.Playwright"
      relationship: "PackageReference (creates IPlaywright, launches Chromium)"
    - from: "RuckR.Tests (new project)"
      to: "Docker SQL Server"
      relationship: "Connection string dependency — test appsettings override"
    - from: "Playwright Chromium browser"
      to: "RuckR.Client Blazor WASM"
      relationship: "HTTP navigation + DOM interaction"

