domain_security_considerations:
  sensitive_areas:
    - area: "ASP.NET Core Identity authentication"
      location: "RuckR/Server/Program.cs:34-38"
      concern: "Test auth handler must be isolated — mock authentication returns test claims, never real credentials"
    - area: "Database connection string"
      location: "RuckR/Server/appsettings.json:17"
      concern: "Docker SQL Server password must not be hardcoded — use environment variables or user secrets in test project"
    - area: "Antiforgery tokens"
      location: "All POST/PUT/DELETE endpoints"
      concern: "API tests (HttpClient) must handle antiforgery tokens; E2E tests (Playwright) handle them automatically via browser"
  authentication_patterns_in_domain: |
    Use TestAuthHandler (AuthenticationHandler<AuthenticationSchemeOptions>) registered via ConfigureTestServices for [Authorize] controllers.
    Playwright E2E tests authenticate by filling login form and submitting, or by setting auth cookies directly via BrowserContext.AddCookiesAsync().
  authorization_patterns_in_domain: |
    All controllers decorated with [Authorize] — API tests must mock auth; E2E tests must log in first.
    Authorization policies (if any) tested by varying test user claims.
  data_validation_in_domain: |
    Playwright assertions (Expect API) auto-retry until condition met or timeout — replaces manual retry loops.
    Server-side validation errors rendered in Blazor ValidationMessage components — test via Expect(Page.Locator(".validation-message")).ToBeVisibleAsync().

testing_patterns:
