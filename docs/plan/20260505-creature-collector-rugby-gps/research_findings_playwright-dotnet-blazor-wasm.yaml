    - "Mobile viewport tests (Pixel 5, iPhone 13)"
    - "Authentication flow tests (login, register, [Authorize] endpoints)"
    - "SignalR real-time tests (battle notifications)"
    - "Map/geolocation tests (mock geolocation via BrowserContext)"
  test_organization: |
    RuckR.Tests/
    ├── E2E/ — Playwright browser tests
    ├── API/ — Direct HTTP tests
    ├── Mobile/ — Mobile viewport variants
    └── Helpers/ — Wait helpers, test data factories
  mock_patterns:
    - "TestAuthHandler: Mocks ASP.NET Core Identity for [Authorize] controllers"
    - "BrowserContext.SetGeolocationAsync(): Mocks GPS position for map tests"
    - "Page.RouteAsync(): Intercepts network requests to mock API responses"
    - "CustomWebApplicationFactory.ConfigureWebHost: Replaces DbContext with test database"

open_questions:
  - question: "Should RuckR.Server's Program class be made public partial for WebApplicationFactory?"
    context: "Top-level statements in .NET 10 generate an internal Program class. WebApplicationFactory<Program> requires access to it. Solution: add 'public partial class Program { }' at the bottom of Program.cs, or use InternalsVisibleTo in .csproj."
    type: "decision_blocker"
    affects: ["RuckR.Server/Program.cs", "RuckR.Tests/CustomWebApplicationFactory.cs"]
  - question: "Docker SQL Server startup in CI — should tests manage container lifecycle or assume pre-existing?"
    context: "Testcontainers-dotnet (https://github.com/testcontainers/testcontainers-dotnet) can spin up Docker SQL Server per test run. Alternative: assume a docker-compose.yml exists and is started before dotnet test. Testcontainers adds complexity but ensures isolation."
    type: "research"
    affects: ["CI/CD setup", "docker-compose.yml", "RuckR.Tests.csproj"]
  - question: "Should the seed data generator (PlayerGeneratorService) run in test or use fixed test fixtures?"
    context: "Program.cs seeds data on startup via SeedIfEmptyAsync. Tests could either (a) let it seed with a known seed value, (b) disable it and insert fixed test data, or (c) use a separate test seed. Fixed test fixtures are more deterministic."
    type: "research"
    affects: ["CustomWebApplicationFactory.cs", "TestDataFactory.cs"]
  - question: "How to test SignalR real-time features (battle notifications) with Playwright?"
    context: "SignalR connections require a second browser context to simulate two users. Playwright can create multiple BrowserContexts (isolated sessions). Need to coordinate two users: challenger + opponent, each in their own browser context."
    type: "nice_to_know"
    affects: ["E2E/BattleTests.cs", "Test architecture"]
  - question: "Should the reconnection UI (#components-reconnect-modal) be disabled entirely in test runs?"
    context: "The Blazor WASM hosted model shows a reconnection modal if the WASM runtime restarts. In tests, this can block interactions. Options: suppress via Blazor.start() options or remove via Page.EvaluateAsync() in test setup."
    type: "research"
    affects: ["BlazorWaitHelper.cs", "E2E test reliability"]

gaps:
  - area: "WebApplicationFactory with Blazor WASM hosted model"
    description: "The Microsoft docs for WebApplicationFactory focus on MVC/Razor Pages. Specific guidance for Blazor WASM hosted (where Server serves WASM static files + API + SignalR) is sparse. Need to verify that WebApplicationFactory correctly serves _framework/blazor.webassembly.js and .NET WASM runtime files in tests."
    impact: "research_blocker"
    affects: ["CustomWebApplicationFactory.cs", "E2E test setup"]
  - area: "Fluxor state initialization during tests"
    description: "Fluxor dispatches initial actions on Blazor app startup. Tests may need to wait for specific Fluxor state before interacting with pages (e.g., LocationState.UserLatitude must be set before map renders). No established pattern for detecting Fluxor state readiness from Playwright DOM."
    impact: "research_blocker"
    affects: ["E2E/MapPageTests.cs", "BlazorWaitHelper.cs"]
  - area: "Leaflet.js map element detection"
    description: "The Map page initializes Leaflet.js via JS interop (MapService.InitMapAsync in OnAfterRenderAsync). The map container (#ruckr-map) exists in DOM immediately, but Leaflet tiles load asynchronously. Playwright may need to wait for specific Leaflet CSS classes (.leaflet-tile-loaded) or tile network requests to complete."
    impact: "research_blocker"
    affects: ["E2E/MapPageTests.cs"]
  - area: "Browser binary installation automation"
    description: "CI pipeline must run pwsh playwright.ps1 install before dotnet test. The playwright.ps1 script is generated during dotnet build. On Windows CI agents, PowerShell must be available. The script downloads ~300MB of browser binaries to %USERPROFILE%/.cache/ms-playwright."
    impact: "nice_to_know"
    affects: ["CI/CD setup", "README test instructions"]
  - area: "Concurrent Blazor WASM contexts memory usage"
    description: "Each Blazor WASM instance loads the .NET runtime (~5-8 MB for dotnet.wasm) plus application assemblies. Running 4-8 parallel Playwright browser contexts each with a full Blazor WASM app may exceed CI memory limits (common 8GB CI workers). May need to limit xUnit.MaxParallelThreads."
    impact: "nice_to_know"
    affects: ["playwright.runsettings", "CI configuration"]
