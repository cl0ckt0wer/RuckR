plan_id: "20260505-creature-collector-rugby-gps"
objective: "Research Microsoft.Playwright (.NET bindings) setup and usage patterns for testing a Blazor WASM SPA hosted by ASP.NET Core, including WebApplicationFactory integration, mobile viewport configuration, and Blazor-specific timing challenges."
focus_area: "playwright-dotnet-blazor-wasm"
created_at: "2026-05-06T00:00:00Z"
created_by: "gem-researcher"
status: completed
tldr: |
  - Microsoft.Playwright 1.59.0 (latest stable, April 9 2026) targets .NET Standard 2.0, fully compatible with net10.0.
  - Recommended test framework: xUnit with Microsoft.Playwright.Xunit (v1.59.0) for IAsyncLifetime support; NUnit (most popular with 18M downloads) also well-supported.
  - WebApplicationFactory<Program> from Microsoft.AspNetCore.Mvc.Testing enables in-memory hosting of the Blazor WASM + ASP.NET Core server in tests.
  - Blazor WASM render detection requires waiting for specific Blazor-rendered DOM elements (e.g., h3, .card), NOT NetworkIdle alone.
  - Mobile viewport: Playwright.Devices["Pixel 5"] / Playwright.Devices["iPhone 13"] or custom BrowserNewContextOptions with ViewportSize/IsMobile/HasTouch.
  - Browser binary installation: dotnet build then pwsh bin/Debug/net10.0/playwright.ps1 install.

