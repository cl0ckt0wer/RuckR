related_conventions:
  naming_patterns_in_domain: |
    Follows existing project conventions:
    - Services: PascalCase, e.g., `GeolocationService` in `RuckR.Client/Services/`
    - Models: PascalCase in `RuckR.Shared.Models`, e.g., `GeoPosition`, `DistanceBucket`
    - JS modules: kebab-case in `wwwroot/js/`, e.g., `geolocation.module.js`
    - Fluxor features: PascalCase in `Client/Store/`, e.g., `LocationFeature` with `LocationState`, `LocationReducers`, `LocationActions`
    - Block-scoped namespaces (per PCC-02)
  structure_of_domain: |
    Proposed file structure:
    ```
    RuckR.Client/
    ├── Services/
    │   ├── IGeolocationService.cs         # Interface: GetCurrentPositionAsync, StartWatchAsync, StopWatch
    │   └── GeolocationService.cs          # Implementation wrapping IJSObjectReference
    ├── Store/
    │   └── LocationFeature/
    │       ├── LocationState.cs           # Fluxor feature state (lat, lng, accuracy, error, isWatching)
    │       ├── LocationReducers.cs        # Reducers for UpdatePosition, PositionError, StartWatch, StopWatch
    │       └── LocationActions.cs         # Action records
    ├── wwwroot/
    │   └── js/
    │       └── geolocation.module.js      # JS module: getPosition, startWatch, stopWatch, haversineDistance
    └── Pages/
        └── Map.razor                      # Consumes IGeolocationService and LocationState
    RuckR.Shared/
    └── Models/
        ├── GeoPosition.cs                 # DTO: Latitude, Longitude, Accuracy, Timestamp
        └── DistanceBucket.cs              # Enum: Within50m, Within100m, Within250m, Within500m, Beyond
    RuckR.Server/
    └── Hubs/
        └── GameHub.cs                     # SignalR hub: UpdateLocation, NearbyPlayerMoved, JoinLocationGroup
    ```
  error_handling_in_domain: |
    Geolocation-specific error handling:
    - Permission denied → display warning, allow manual coordinate entry
    - Position unavailable → retry with lower accuracy or timeout
    - Timeout → exponential backoff (1s, 2s, 4s, 8s)
    - JSDisconnectedException → not applicable in WASM (no SignalR circuit), but catch in Server-side prerendering
    - watchPosition errors → fire Fluxor LocationError action, display in UI
    - All errors surfaced via Fluxor state (LocationState.Error property)
  testing_in_domain: "No test projects exist yet (per AGENTS.md). Manual verification planned per wave delivery."
  documentation_in_domain: "PRD.yaml is the primary spec. AGENTS.md contains ADRs. This research report documents the geolocation approach."

