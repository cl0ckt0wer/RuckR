open_questions:
  - question: "Should distance fuzz (±20%) be applied client-side or server-side?"
    context: "PRD specifies fuzzy distance display but doesn't define where the transformation happens. Client-side fuzz means the display is randomized per session. Server-side fuzz means consistent displays across all users viewing the same player."
    type: "decision_blocker"
    affects: ["DistanceBucket display logic", "GeolocationService", "GameHub broadcast"]

  - question: "Is the Blazor.Geolocation.WebAssembly source generator package (.NET 8/9) compatible with .NET 10?"
    context: "The package is source-generated and targets net8.0 and net9.0. net10.0 was listed as 'computed compatible' on NuGet.org but not explicitly targeted. The package's last release was Dec 2024, predating .NET 10."
    type: "research"
    affects: ["Package dependency decision", "Client .csproj"]

  - question: "Should location state be global (app-level) or per-page with Fluxor?"
    context: "PRD says location should be available across multiple pages. Fluxor features can be registered once and consumed anywhere. Question is whether to auto-start watch on app load or only when Map page is active."
    type: "research"
    affects: ["GeolocationService lifecycle", "Fluxor feature registration", "Battery impact"]

  - question: "What is the target proximity threshold for pitch discovery?"
    context: "US-03 says 100m default but also mentions 500m for nearby pitch highlighting. Need clarified: is 100m the hard discovery trigger while 500m is the 'visible on map' radius?"
    type: "research"
    affects: ["Haversine calculation threshold", "Pitch query radius", "UI distance bucket display"]

  - question: "What SignalR group strategy for location sharing?"
    context: "Hub needs to broadcast location only to nearby players. Options: geographic grid cells (~1km squares), dynamic proximity groups (server recalculates), or global broadcast with client-side filtering."
    type: "decision_blocker"
    affects: ["GameHub architecture", "Server CPU load", "Message volume"]

gaps:
  - area: ".NET 10 NuGet compatibility for geolocation packages"
    description: "No community geolocation NuGet package explicitly targets net10.0. Blazor.Geolocation.WebAssembly (v9.0.1) computed as 'net10.0 compatible' but not verified. BrowserInterop (320K downloads) last updated 2020."
    impact: "decision_blocker"
    affects: ["Build pipeline", "Package dependency selection"]

  - area: "Service Worker geolocation support"
    description: "Confirmed: Service Workers run in a Worker context without DOM access. They cannot access window.navigator.geolocation. Background location tracking via SW is impossible. Location updates only possible while app tab is open/visible."
    impact: "research_blocker"
    affects: ["Background location strategy", "User experience when tab is backgrounded"]

  - area: "Mobile browser watchPosition behavior when screen locked"
    description: "iOS Safari and Chrome Android aggressively throttle or pause watchPosition when the screen locks or tab is backgrounded. Research needed on exactly when updates resume (on unlock? on tab focus?)."
    impact: "research_blocker"
    affects: ["Location update frequency strategy", "Reconnection behavior"]

  - area: "Fluxor middleware for location throttling"
    description: "No existing Fluxor middleware in the codebase. Need to design: should location updates be throttled at the geolocation service level (pre-dispatch) or via Fluxor middleware (post-dispatch)? Recommended: throttle at service level (only dispatch when position changes >10m or >5s elapsed)."
    impact: "nice_to_know"
    affects: ["Fluxor action frequency", "Component re-render performance"]
