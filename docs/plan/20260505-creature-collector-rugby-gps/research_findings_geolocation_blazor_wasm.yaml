patterns_found:
  - category: architecture
    pattern: "JS Module Isolation via IJSObjectReference"
    description: "The canonical Blazor pattern for browser API interop: load a JS module via JS.InvokeAsync<IJSObjectReference>(\"import\", \"./path/to/module.js\"), then call exported functions via module.InvokeAsync<T>() or module.InvokeVoidAsync(). This is the exact pattern ADR-006 prescribes for Leaflet.js interop and applies identically to geolocation."
    examples:
      - file: "Microsoft Learn — JS Collocation"
        location: "JsCollocation2.razor (docs example)"
        snippet: |
          module = await JS.InvokeAsync<IJSObjectReference>("import",
              "./Pages/JsCollocation2.razor.js");
          result = await module.InvokeAsync<string>("showPrompt2", "What's your name?");
    prevalence: common

  - category: architecture
    pattern: "Callback-based browser API via [JSInvokable]"
    description: "For browser APIs that use callbacks (like watchPosition), the pattern is: JS calls a .NET static method decorated with [JSInvokable] by invoking DotNet.invokeMethodAsync. This is how the Blazor.Geolocation source generator package works internally, but can be done manually without a NuGet dependency."
    examples:
      - file: "MDN — Geolocation.watchPosition()"
        location: "watchPosition success callback pattern"
        snippet: |
          // JS module
          export function startWatch(dotNetRef, options) {
            const id = navigator.geolocation.watchPosition(
              (pos) => dotNetRef.invokeMethodAsync('OnPositionChanged', pos.coords.latitude, pos.coords.longitude),
              (err) => dotNetRef.invokeMethodAsync('OnPositionError', err.code, err.message),
              options
            );
            return id;
          }
    prevalence: common

  - category: structure
    pattern: "Service wrapper for JS interop"
    description: "Encapsulate all JS interop calls in a dedicated C# service class (e.g., GeolocationService) that wraps IJSRuntime/IJSObjectReference. This keeps Razor components clean and enables reuse across pages."
    examples:
      - file: "RuckR.Client/wwwroot/js/ (proposed)"
        location: "Proposed: geolocation.module.js + GeolocationService.cs"
        snippet: |
          // Registration in Program.cs
          builder.Services.AddScoped<IGeolocationService, GeolocationService>();
    prevalence: common

  - category: integration
    pattern: "SignalR .NET Client for Blazor WASM"
    description: "Blazor WASM uses the Microsoft.AspNetCore.SignalR.Client NuGet package (not the JS client). HubConnectionBuilder creates connections from C# code. HubConnection.SendAsync() sends messages to server hub methods. HubConnection.On<T>() registers handlers for server-to-client calls."
    examples:
      - file: "Microsoft Learn — SignalR Blazor Tutorial"
        location: "Pages/Chat.razor"
        snippet: |
          hubConnection = new HubConnectionBuilder()
              .WithUrl(Navigation.ToAbsoluteUri("/chathub"))
              .Build();
          hubConnection.On<string, string>("ReceiveMessage", (user, message) => { ... });
          await hubConnection.StartAsync();
          await hubConnection.SendAsync("SendMessage", userInput, messageInput);
    prevalence: common

  - category: calculation
    pattern: "Haversine formula for spherical distance"
    description: "Standard formula for calculating great-circle distance between two lat/lng points. JavaScript implementation is ~10 lines. Used to determine proximity to pitches and for fuzzy distance display."
    examples:
      - file: "N/A (standard algorithm)"
        location: "Wikipedia / any geo library"
        snippet: |
          // C# Haversine
          double dLat = ToRad(lat2 - lat1);
          double dLon = ToRad(lon2 - lon1);
          double a = Math.Sin(dLat/2)*Math.Sin(dLat/2) +
                     Math.Cos(ToRad(lat1))*Math.Cos(ToRad(lat2))*
                     Math.Sin(dLon/2)*Math.Sin(dLon/2);
          double c = 2 * Math.Atan2(Math.Sqrt(a), Math.Sqrt(1-a));
          return EARTH_RADIUS_METERS * c;
    prevalence: common

