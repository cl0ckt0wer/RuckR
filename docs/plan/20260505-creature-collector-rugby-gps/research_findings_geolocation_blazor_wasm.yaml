status: completed
tldr: |
  - Browser Geolocation API accessed via JS module interop (IJSObjectReference) — no NuGet dependency needed
  - `navigator.geolocation.watchPosition()` for continuous tracking; throttles in background tabs
  - Service Workers CANNOT access geolocation API (no DOM, no window.navigator)
  - Fuzzy distance applied client-side for display only; server gets real coordinates for PostGIS proximity
  - SignalR .NET client `SendAsync()` for location updates to hub; throttle by minimum 10m displacement
  - Haversine formula for distance calculation; ±20% fuzz on display string only
  - Recommended: custom JS interop module over community NuGet packages (better .NET 10 compatibility, full control)

