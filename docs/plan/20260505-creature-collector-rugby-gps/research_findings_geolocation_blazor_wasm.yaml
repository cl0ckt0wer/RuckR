  data_validation_in_domain: |
    - Latitude: -90 to 90
    - Longitude: -180 to 180
    - Accuracy: positive number, typically 1-100 meters
    - Timestamp: must be recent (within last 60 seconds for watchPosition)
    - Hub messages: validate coordinate range before broadcasting

