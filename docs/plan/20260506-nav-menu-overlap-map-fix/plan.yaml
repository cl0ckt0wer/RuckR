      (2) Mobile 375×667 (simulated) — collapsible nav above map, map height clipping.
      Save screenshots to docs/plan/20260506-nav-menu-overlap-map-fix/screenshots/before/.
      These serve as the pre-fix baseline for comparison in T5.
