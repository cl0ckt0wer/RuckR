plan_id: "20260506-nav-menu-overlap-map-fix"
objective: >
  Fix navigation menu items overlapping the map component. Two issues addressed:
  1. Desktop: .sidebar (250px, sticky left) lacks overflow:hidden — nav item text
     like "Hello, {username}!" overflows into the map area.
  2. Mobile: Map.razor uses height:calc(100vh - 56px) which doesn't account for
     the sidebar/nav bar height, causing layout breakage.
created_at: "2026-05-06T14:00:00Z"
created_by: gem-planner
status: pending
research_confidence: high
plan_metrics:
  wave_1_task_count: 1
  total_dependencies: 3
  risk_score: low
tldr: >
  3 waves, 5 tasks. Wave 1: baseline screenshots (gem-browser-tester). Wave 2: three
  parallel CSS/Razor fixes — sidebar overflow+z-index (MainLayout.razor.css), nav-item
  text truncation (NavMenu.razor.css), map height:100% (Map.razor). Wave 3: verification
  screenshots confirming no overlap. All changes are CSS-only, no logic affected. No new
  files created — edits only.

open_questions: []

gaps: []

pre_mortem:
  overall_risk_level: low
  critical_failure_modes:
    - scenario: "height:100% on #ruckr-map collapses to 0 because parent chain (article.content or main) lacks explicit height"
      likelihood: medium
      impact: medium
      mitigation: "Task T2 adds height:100% and overflow:hidden to article.content in MainLayout.razor.css. Verify with screenshots in T5. Fallback: use min-height:100vh or revert to calc() if flex chain breaks on a specific viewport."
    - scenario: "text-overflow:ellipsis on .nav-item ::deep a breaks the 'Hello, username!' span which is not an <a> element — span still overflows"
      likelihood: low
      impact: low
      mitigation: "The sidebar overflow-x:hidden (T2) clips any overflow regardless of element type. The 'Hello' span is inside .nav-item within the .sidebar, so overflow-x:hidden on .sidebar catches it at the container level."
    - scenario: "z-index:10 on .sidebar causes sibling stacking issues with overlays or modals that have z-index < 10"
      likelihood: low
      impact: low
      mitigation: "Map overlays use z-index:1000-2000, well above 10. Bootstrap modals use z-index:1050+. The z-index:10 only affects sidebar stacking relative to the main content area. No conflict expected."
  assumptions:
    - "The browser supports CSS text-overflow:ellipsis (all modern browsers do)"
    - "The Blazor WASM app renders reliably for screenshot capture"
    - "No other components rely on the old calc(100vh - 56px) height value"

implementation_specification:
  code_structure: >
    Edits only — no new files. Three files modified:
    - RuckR/Client/Shared/MainLayout.razor.css → sidebar overflow+z-index, article.content height
    - RuckR/Client/Shared/NavMenu.razor.css → nav-link text truncation
    - RuckR/Client/Pages/Map.razor → height:calc → height:100%, remove dead z-index
  affected_areas:
    - "RuckR/Client/Shared/MainLayout.razor.css — .sidebar (L58-63), article.content (new rule)"
    - "RuckR/Client/Shared/NavMenu.razor.css — .nav-item ::deep a (L34-41)"
    - "RuckR/Client/Pages/Map.razor — <style> block (L19), loading state (L41), error state (L51)"
  component_details:
    - component: MainLayout sidebar (.sidebar)
      responsibility: "Sticky left navigation column (250px desktop, natural flow mobile). Must contain its content and stack above main content."
      interfaces: ["CSS class .sidebar applied to <div> in MainLayout.razor L4"]
      dependencies: []
      integration_points: ["NavMenu.razor, ConnectionStatus.razor"]
    - component: NavMenu links (.nav-item ::deep a)
      responsibility: "Navigation links within the sidebar. Must truncate with ellipsis when text exceeds sidebar width."
      interfaces: ["CSS deep selector on <NavLink> and <a> elements inside .nav-item"]
      dependencies: []
      integration_points: ["Blazor NavLink component, AuthorizeView 'Hello, {username}' span"]
    - component: Map container (#ruckr-map)
      responsibility: "Full-height map viewport that fills remaining space in the main content area."
      interfaces: ["CSS id #ruckr-map", "leaflet.js map initialization target"]
      dependencies:
        - component: MainLayout flex container
          relationship: "Inherits height from parent chain: .page → main → article.content → #ruckr-map"
      integration_points: ["MapService.InitMapAsync('ruckr-map', ...)", "loading/error state overlays"]

contracts: []

