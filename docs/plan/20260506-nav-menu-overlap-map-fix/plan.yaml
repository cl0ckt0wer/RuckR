        likelihood: low
        impact: low
        mitigation: "The sidebar is fixed at 250px which accommodates typical nav item text. If wrapping is needed, the overflow-x:hidden on sidebar (T2) clips regardless."

  - id: T4
    title: "Fix Map.razor — replace calc() height with flex-based 100% sizing"
    description: >
      Three changes to RuckR/Client/Pages/Map.razor:

      1. L19: Change #ruckr-map style from height:calc(100vh - 56px) to height:100%.
         Remove the unused z-index:1 declaration.

      2. L41: Change loading state div style from height:calc(100vh - 56px) to
         height:100%.

      3. L51: Change error state div style from height:calc(100vh - 56px) to
         height:100%.

      The 100% height relies on the parent chain (article.content → main → .page)
      having defined heights via flex layout. T2 ensures article.content has
      height:100% and overflow:hidden, completing the chain. The old calc() assumed
      a fixed 56px top-row which breaks on mobile where the nav menu adds extra height
      above the main content area.
