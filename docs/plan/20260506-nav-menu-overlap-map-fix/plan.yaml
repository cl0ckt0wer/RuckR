  # ========================================================================
  # WAVE 2: CSS Fixes (parallel — independent files)
  # ========================================================================
  - id: T2
    title: "Fix MainLayout.razor.css — sidebar overflow and article.content height"
    description: >
      Two changes to RuckR/Client/Shared/MainLayout.razor.css:

      1. In the @media (min-width: 641px) block, add overflow-x:hidden and z-index to
         the .sidebar rule (L58-63). This clips any nav item text that overflows the
         250px sidebar and ensures proper stacking above the main content.

      2. Add a new rule for article.content to support the map's height:100% fix.
         Set height:100% and overflow:hidden so that child elements (Map.razor's
         #ruckr-map) can fill the remaining vertical space. Also remove the padding-top
         conflict by setting display:flex; flex-direction:column on the content area
         (or simply set box-sizing:border-box with height:100%).

      Changes are scoped to the Blazor component CSS so they don't affect global styles.
    wave: 2
    agent: gem-implementer
    prototype: false
    priority: high
    status: pending
    dependencies: []
    conflicts_with: []
    context_files:
      - path: RuckR/Client/Shared/MainLayout.razor.css
        description: "Component-scoped CSS for MainLayout — sidebar, top-row, page layout"
      - path: RuckR/Client/Shared/MainLayout.razor
        description: "Layout markup — .sidebar at L4, article.content at L14"
    estimated_effort: small
    estimated_files: 1
    estimated_lines: 8
    focus_area: null
    tech_stack: [CSS3, Blazor CSS isolation]
    verification:
      - "dotnet build RuckR.Client.csproj succeeds"
      - "Manual inspection: sidebar no longer overflows text into map area on desktop"
      - "article.content fills remaining height so #ruckr-map { height:100% } works"
    acceptance_criteria:
      - ".sidebar rule (L58-63) includes overflow-x:hidden"
      - ".sidebar rule includes z-index:10 (or z-index:var(--sidebar-z, 10))"
      - "New rule for article.content: height:100%, overflow:hidden"
      - "No visual regression: sidebar still 250px wide, sticky, gradient background intact"
      - "Build succeeds without CSS errors"
    failure_modes:
      - scenario: "overflow-x:hidden clips the Bootstrap collapse animation or hamburger toggle on narrow viewports"
        likelihood: low
        impact: low
        mitigation: "The .sidebar overflow-x:hidden is only active at min-width:641px (desktop). On mobile, the sidebar flows naturally without the sticky positioning. No animation is affected."

  - id: T3
    title: "Fix NavMenu.razor.css — add text truncation to nav links"
    description: >
      Add text-overflow:ellipsis, overflow:hidden, and white-space:nowrap to the
      .nav-item ::deep a rule in RuckR/Client/Shared/NavMenu.razor.css (L34-41).

      This ensures long nav link text (e.g., "Nearby Players", "Hello, TestUserWithAVeryLongDisplayName!")
      is gracefully truncated with an ellipsis rather than overflowing the sidebar width.

      Note: The "Hello, {username}!" span at NavMenu.razor L51 is not an <a> element so
      it won't be affected by ::deep a. However, the sidebar overflow-x:hidden from T2
      clips it at the container level. For completeness, consider adding a separate rule
      for .nav-link-text span overflow, but the sidebar clip + this nav-link fix covers
      the primary case.
    wave: 2
    agent: gem-implementer
    prototype: false
    priority: high
    status: pending
    dependencies: []
    conflicts_with: []
    context_files:
      - path: RuckR/Client/Shared/NavMenu.razor.css
        description: "Component-scoped CSS for NavMenu — nav items, links, toggler"
      - path: RuckR/Client/Shared/NavMenu.razor
        description: "NavMenu markup — NavLink elements, AuthorizeView span at L51"
    estimated_effort: small
    estimated_files: 1
    estimated_lines: 3
    focus_area: null
    tech_stack: [CSS3, Blazor CSS isolation]
    verification:
      - "dotnet build RuckR.Client.csproj succeeds"
      - "Long nav link text is truncated with '...' instead of overflowing"
      - "Nav link icons (oi-*) remain visible and not clipped"
    acceptance_criteria:
