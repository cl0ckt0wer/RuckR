plan_id: nuget-package-update
objective: Research how to update NuGet packages in this .NET project using dotnet CLI tools
focus_area: nuget-package-management
created_at: 2026-05-05T21:50:00Z
created_by: RESEARCHER
status: completed
tldr: |
  - 3 projects in solution (Server, Client, Shared) all targeting net8.0 with 3 top-level NuGet packages pinned to 8.0.0
  - dotnet list package --outdated shows 10.0.7 as latest for WASM packages; dotnet-outdated (TFM-aware) shows 8.0.26 as max compatible
  - No Directory.Packages.props — each csproj has inline PackageReference with explicit versions
  - dotnet-outdated-tool v4.7.0 already installed globally; built-in dotnet package update available in SDK 10
  - Critical: Blazor WASM packages (Microsoft.AspNetCore.Components.WebAssembly*) are TFM-locked — 10.x requires net10.0 target framework
  - Shared project has zero NuGet dependencies
  - Auto-referenced packages (ILLink.Tasks, Sdk.WebAssembly.Pack) are SDK-managed and already current

research_metadata:
  methodology: |
    semantic_search + grep_search (glob *.csproj, Directory.Packages.props),
    dotnet list package --outdated, dotnet list package --include-transitive,
    dotnet-outdated tool (with and without --version-lock),
    dotnet package update --help, dotnet tool list --global,
    dotnet workload list, manual csproj inspection
  scope: full-solution
  confidence: high
  coverage: 100
  decision_blockers: 1
  research_blockers: 0

