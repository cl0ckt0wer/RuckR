patterns_found:
  - category: structure
    pattern: Inline PackageReference with exact version pinning
    description: All PackageReference elements use Version="8.0.0" (exact, not floating). No Version="8.0.*" or central package management in use.
    examples:
      - file: RuckR/Server/RuckR.Server.csproj
        location: "10"
        snippet: '<PackageReference Include="Microsoft.AspNetCore.Components.WebAssembly.Server" Version="8.0.0" />'
      - file: RuckR/Client/RuckR.Client.csproj
        location: "11"
        snippet: '<PackageReference Include="Microsoft.AspNetCore.Components.WebAssembly" Version="8.0.0" />'
    prevalence: common

  - category: architecture
    pattern: Blazor WASM hosted model with Server project serving Client
    description: |
      Standard "ASP.NET Core hosted" Blazor WASM pattern:
      - Server references Client via ProjectReference
      - Server references Microsoft.AspNetCore.Components.WebAssembly.Server to serve WASM assets
      - Client uses BlazorWebAssembly SDK with WebAssembly + DevServer packages
      - Shared is a netstandard-style bridge with SupportedPlatform browser
    examples:
      - file: RuckR/Server/RuckR.Server.csproj
        location: "14"
        snippet: '<ProjectReference Include="..\Client\RuckR.Client.csproj" />'
    prevalence: common

  - category: structure
    pattern: Auto-referenced SDK packages not in csproj
    description: |
      Microsoft.NET.ILLink.Tasks and Microsoft.NET.Sdk.WebAssembly.Pack are auto-referenced (A)
      by the BlazorWebAssembly SDK. Not declared in any csproj — managed by SDK version.
      ILLink.Tasks is [8.0.25, ) resolved to 8.0.25.
      Sdk.WebAssembly.Pack is [10.0.7, ) resolved to 10.0.7 (because SDK 10.0.x is installed).
    examples:
      - file: RuckR/Client/RuckR.Client.csproj
        location: "(transitive, auto-referenced)"
        snippet: 'Microsoft.NET.Sdk.WebAssembly.Pack (A) [10.0.7, ) -> 10.0.7'
    prevalence: common

  - category: structure
    pattern: PrivateAssets="all" for dev-only packages
    description: DevServer package marked PrivateAssets="all" — consumed at dev time only, never flows to publish output
    examples:
      - file: RuckR/Client/RuckR.Client.csproj
        location: "12"
        snippet: '<PackageReference Include="Microsoft.AspNetCore.Components.WebAssembly.DevServer" Version="8.0.0" PrivateAssets="all" />'
    prevalence: occasional

