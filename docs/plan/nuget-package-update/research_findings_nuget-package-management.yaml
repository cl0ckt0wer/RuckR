open_questions:
  - question: Should packages be updated within the 8.0.x line (compatible, safe) or jump to 10.0.x (requires TFM upgrade)?
    context: |
      ADR-001 calls for .NET 10 upgrade. dotnet-outdated (TFM-aware) shows 8.0.26 as max. 
      dotnet list package --outdated shows 10.0.7 as latest. The 10.x packages require net10.0 TFM.
      Two strategies:
        A) Update packages to 8.0.26 now (safe, no TFM change), then do TFM + packages together later.
        B) Do TFM + packages in one atomic change per ADR-001.
    type: decision_blocker
    affects: [RuckR.Server.csproj, RuckR.Client.csproj, RuckR.sln]

  - question: Should the DevServer package (PrivateAssets=all) be updated to 10.0.7 even if TFM stays at net8.0?
    context: |
      DevServer 8.0.0 → 10.0.7 is a major jump shown by dotnet-outdated (with --version-lock None).
      Since it's PrivateAssets=all and dev-only, TFM compatibility may be less strict, but needs verification.
      dotnet-outdated flags this as red (major version, possible breaking changes).
    type: research
    affects: [RuckR.Client.csproj]

  - question: Are there any known vulnerabilities in the 24 transitive dependencies currently resolved to 8.0.0?
    context: |
      dotnet package update --vulnerable would check this, but requires NuGet vulnerability database access.
      All transitive packages (System.Text.Json 8.0.0, Extensions.* 8.0.0) are 6 major patch versions behind.
    type: research
    affects: [RuckR.Server.csproj, RuckR.Client.csproj]

gaps:
  - area: Central Package Management
    description: |
      No Directory.Packages.props exists. All versions are duplicated across csproj files.
      For a 3-project solution this is manageable, but adopting CPM would make future updates a single-line change
      and prevent version drift between Server and Client packages.
    impact: nice_to_know
    affects: [All .csproj files]

  - area: Package version floating/range constraints
    description: |
      All packages use exact Version="8.0.0". No floating versions (8.0.*) or version ranges.
      This means every update requires manual csproj edits. Floating versions would auto-absorb patches.
    impact: nice_to_know
    affects: [RuckR.Server.csproj, RuckR.Client.csproj]

  - area: Vulnerability scanning
    description: |
      No automated vulnerability scanning in place. The dotnet package update --vulnerable command exists
      but has not been run. The project is 6+ patch versions behind on all packages.
    impact: research_blocker
    affects: [Security posture]

  - area: Blazor WASM workload
    description: |
      No wasm-tools workload installed (only android, ios, maccatalyst, maui-windows).
      The wasm-tools workload may be needed for AOT compilation or advanced WASM scenarios in .NET 10.
      Currently not required for basic Blazor WASM operation.
    impact: nice_to_know
    affects: [RuckR.Client build/publish]
