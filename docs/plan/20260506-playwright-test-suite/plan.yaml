pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "Testcontainers.MsSql fails to start Docker container because Docker Desktop is not running or not installed on developer machine"
      likelihood: medium
      impact: high
      mitigation: "DatabaseFixture detects Docker availability at test startup and skips with clear message if unavailable. Alternative connection string for LocalDB provided in appsettings.Test.json as fallback. Document Docker Desktop requirement in TESTING.md."

    - scenario: "Playwright browser binaries not installed — dotnet test fails with 'Playwright executable not found'"
      likelihood: high
      impact: high
      mitigation: "Add build target to RuckR.Tests.csproj that runs playwright.ps1 install after build. Document the one-time setup command in TESTING.md. PlaywrightFixture validates browser availability on first use and throws descriptive error."

    - scenario: "WebApplicationFactory fails to serve Blazor WASM _framework assets on first test run (asset paths not resolved)"
      likelihood: medium
      impact: critical
      mitigation: "CustomWebApplicationFactory overrides WebHost to set WebRootPath to Client's published output. Pre-build step: dotnet publish RuckR.Client before dotnet test. Fallback pattern documented; if unsolvable, switch to standalone Kestrel server started via Process."

    - scenario: "GPS AddInitScript override conflicts with Blazor's JS interop — watchPosition override either doesn't fire or fires before DotNetObjectReference is created"
      likelihood: medium
      impact: high
      mitigation: "Queue-based GPS script: override caches positions, starts emitting only after a 'startGps' signal from Blazor (detected via polling for a DOM marker set by GeolocationService). Fallback: use Playwright's Context.SetGeolocationAsync() for single-position tests only."

    - scenario: "Multi-user PVP test (T4-04) fails intermittently due to SignalR message delivery timing — assertion fires before opponent's toast notification renders"
      likelihood: medium
      impact: medium
      mitigation: "Use LocatorAssertions with 30s timeout. Assert on DOM text presence rather than WebSocket frames. Add WaitForSelectorAsync on the NotificationToast .toast element. Retry assertion with Playwright's auto-retry built into Expect API."

    - scenario: "Rate limit state (ConcurrentDictionary) persists across test runs in shared WebApplicationFactory, causing 429 errors in subsequent test classes"
      likelihood: medium
      impact: medium
      mitigation: "Add a test-only reset endpoint (or DI-managed rate limiter service with ResetForTest() method). Alternative: create new WebApplicationFactory per test class (isolated rate limit state). Document in TESTING.md limit on parallel execution."

    - scenario: "Blazor WASM cold-start delay (>5 seconds for .NET runtime download + JIT) causes Playwright navigation timeouts"
      likelihood: high
      impact: medium
      mitigation: "Increase Page.SetDefaultNavigationTimeout to 30 seconds. Reuse BrowserContext across tests within a class (Context is isolated, stays warm). Warm up Blazor WASM in IClassFixture setup by navigating to a light page first."

  assumptions:
    - "Docker Desktop (or Docker Engine) is installed and running on the developer machine"
    - "Playwright Chromium browser has been installed via pwsh bin/Debug/net10.0/playwright.ps1 install chromium"
    - "SQL Server LocalDB is available as fallback if Docker is unavailable (included with Visual Studio)"
    - "dotnet publish RuckR.Client produces static _framework assets testable via WebApplicationFactory"
    - "ASP.NET Core Identity cookie auth flows to playright browser context automatically (same-origin)"
    - "The existing seed data (500 players around London at 51.5074, -0.1278) provides sufficient test data coverage"
    - "No external network dependencies beyond localhost — OpenStreetMap tile CDN may be unreachable in sandboxed CI"
    - "Single test worker (no xUnit parallelization) to avoid Blazor WASM memory contention and rate-limit state conflicts"

