  - id: T4-01
    title: "GPS geolocation mock test — grant permission, set coordinates, verify map response"
    description: >
      Create E2E/GpsMockE2ETests.cs. This is the most technically challenging test
      due to the JS interop watching approach.
      Test flow:
      (1) Create a GPS-enabled BrowserContext via PlaywrightFixture.CreateGpsContextAsync(51.5, -0.1).
          This grants geolocation permission and injects InitScript that overrides
          navigator.geolocation.watchPosition to emit the specified coordinates.
      (2) Navigate to /map.
      (3) Verify GPS disabled banner is NOT visible (permission granted).
      (4) Verify user marker appears (.user-location-pulse CSS class).
      (5) Verify pitch markers load near the mocked GPS position.
      (6) Verify map is centered near mocked coordinates (check via Page.EvaluateAsync
          for map.getCenter()).

      The InitScript for GPS mock (injected BEFORE any page JS runs):
      ```js
      const fakeCoords = { latitude: 51.5, longitude: -0.1, accuracy: 10 };
      const origGetCurrentPosition = navigator.geolocation.getCurrentPosition.bind(navigator.geolocation);
      const origWatchPosition = navigator.geolocation.watchPosition.bind(navigator.geolocation);
      navigator.geolocation.getCurrentPosition = (success, error) => {
        success({ coords: fakeCoords, timestamp: Date.now() });
      };
      navigator.geolocation.watchPosition = (success, error) => {
        success({ coords: fakeCoords, timestamp: Date.now() });
        return 1; // watchId
      };
      ```
      This script MUST run via Page.AddInitScriptAsync() BEFORE Page.GotoAsync().
      Verify the mock is active by calling Page.EvaluateAsync to check navigator.geolocation
      overridden status.
