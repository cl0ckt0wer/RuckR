  - id: T6-01
    title: "Add data-testid attributes to key Blazor components for reliable locators"
    description: >
      Add data-testid attributes to key interactive elements across Blazor pages to
      improve test locator reliability. This is a non-breaking, purely additive change
      to production code — attributes are ignored by browsers and only used by tests.
      Elements to annotate (per page):
      - Map.razor: #ruckr-map → data-testid="map-container";
        onboarding dismiss button → data-testid="onboarding-dismiss";
        pitch overlay → data-testid="pitch-overlay"; capture button → data-testid="capture-players-btn"
      - Catalog.razor: position select → data-testid="filter-position";
        rarity select → data-testid="filter-rarity"; name input → data-testid="filter-name";
        player cards container → data-testid="player-cards-grid"
      - Collection.razor: favorite buttons → data-testid="favorite-btn-{playerId}";
        Explore Map CTA → data-testid="explore-map-cta"
      - PlayerGrid.razor: radius select → data-testid="radius-select";
        challenge buttons → data-testid="challenge-btn-{playerId}"
      - Battle.razor: tab buttons → data-testid="tab-new-challenge" / "tab-active-challenges";
        player select → data-testid="select-challenge-player";
        opponent input → data-testid="opponent-username";
        submit button → data-testid="submit-challenge";
        accept modal → data-testid="accept-modal"
      - NavMenu.razor: each NavLink → data-testid="nav-{pagename}"
      - NotificationToast.razor: toast container → data-testid="toast-container"
      - ConnectionStatus.razor: status dot → data-testid="connection-dot"
