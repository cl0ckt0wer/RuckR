plan_id: "20260506-playwright-test-suite"
objective: >
  Create a comprehensive Playwright test suite for the RuckR rugby GPS game using
  .NET Microsoft.Playwright NuGet bindings, xUnit, and WebApplicationFactory.
  Covers E2E browser tests, direct API tests, GPS geolocation mocking, multi-user
  SignalR PVP flow verification, and mobile viewport testing. Database isolation
  via Docker SQL Server (Testcontainers.MsSql). All tests run locally — no CI/CD.
created_at: "2026-05-06T12:00:00Z"
created_by: gem-planner
status: pending
research_confidence: high
plan_metrics:
  wave_1_task_count: 7
  total_dependencies: 59
  risk_score: medium
tldr: >
  6 waves, 32 tasks. Test Infrastructure (project, fixtures, helpers) → Page Objects
  + Auth → E2E Smoke → GPS + Multi-User PVP → API tests → Polish (data-testid, mobile,
  docs). Microsoft.Playwright 1.59.0 with xUnit + IClassFixture. Testcontainers.MsSql
  for Docker SQL Server lifecycle. WebApplicationFactory<Program> for in-process test
  server. GPS mocked via AddInitScriptAsync() override of navigator.geolocation.
  Multi-user PVP via two BrowserContext instances with independent auth cookies.

