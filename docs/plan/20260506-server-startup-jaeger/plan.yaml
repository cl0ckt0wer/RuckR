        mitigation: "Document that dotnet tools directory (~/.dotnet/tools on Linux/macOS, %USERPROFILE%/.dotnet/tools on Windows) must be on PATH; provide verification command"

  - id: T2
    title: "Configure OTEL OTLP exporter endpoint to Aspire Dashboard port"
    description: >
      Add `OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:18889` to the `https` launch
      profile's `environmentVariables` in `RuckR/Server/Properties/launchSettings.json`.
      This ensures the OTLP exporter in Program.cs (`UseOtlpExporter()`) sends telemetry
      to the Aspire Dashboard's OTLP gRPC receiver instead of the default
      `http://localhost:4317`. Also add it to the `http` profile for consistency.
      The existing `ASPNETCORE_ENVIRONMENT=Development` entry remains unchanged.
      This is the single configuration change needed — the OTLP exporter reads this
      env var at startup with zero code changes.
    wave: 1
    agent: gem-devops
    prototype: false
    priority: high
    status: pending
    dependencies: []
    context_files:
      - path: RuckR/Server/Properties/launchSettings.json
        description: "Add OTEL_EXPORTER_OTLP_ENDPOINT to https and http profile environmentVariables"
      - path: RuckR/Server/Program.cs
        description: "Line 100: UseOtlpExporter() reads OTEL_EXPORTER_OTLP_ENDPOINT env var"
    estimated_effort: small
    estimated_files: 1
    estimated_lines: 4
