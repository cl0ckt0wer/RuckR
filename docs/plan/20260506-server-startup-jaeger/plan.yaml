  - id: T4
    title: "Create OpenCode slash command for server startup"
    description: >
      Create the file `.opencode/commands/start-server.md` that registers a
      `/start-server` slash command in OpenCode. The command file uses OpenCode's
      command definition conventions (YAML frontmatter for metadata, Markdown body
      for the command execution logic).

      **Frontmatter**:
      - `name: start-server`
      - `description: Start RuckR server with Aspire Dashboard telemetry`

      **Body**: The command invokes the PowerShell startup script with execution
      policy bypass: `powershell -ExecutionPolicy Bypass -File scripts/start-ruckr.ps1`.
      Include a brief explanation of what the command does: starts the Aspire Dashboard,
      builds the solution, launches the server, and provides live telemetry at
      http://localhost:18888.

      The command should be registered in OpenCode's command palette. Follow the
      existing `.opencode/` directory conventions — no other command files exist, so
      this establishes the pattern.
