        source_hint: "Check latest Aspire.Dashboard version on NuGet; pinning avoids surprise breakage but requires periodic updates"

pre_mortem:
  overall_risk_level: low
  critical_failure_modes:
    - scenario: "Aspire Dashboard fails to start because ports 18888 or 18889 are already in use"
      likelihood: medium
      impact: medium
      mitigation: "Script checks port availability before starting dashboard; prints clear error message with process-kill instructions if ports occupied; provides --dashboard-port and --otlp-port script parameters as overrides"

    - scenario: "Server build fails (missing SDK, NuGet restore failure, or compilation error) and script proceeds to start anyway"
      likelihood: low
      impact: high
      mitigation: "Script checks dotnet build exit code; aborts with non-zero exit and clear error message on build failure; does NOT attempt to start server"

    - scenario: "Server starts but health endpoint never returns 200 (database migration pending, SQL Server unavailable)"
      likelihood: medium
      impact: medium
      mitigation: "Script polls /api/telemetry/health with configurable timeout (default 60s) and interval (2s); prints progressive dots to show activity; exits with timeout error and instructions to check server log"

    - scenario: "PowerShell execution policy blocks the .ps1 script"
      likelihood: medium
      impact: low
      mitigation: "Document execution policy bypass in AGENTS.md and script comments: powershell -ExecutionPolicy Bypass -File scripts/start-ruckr.ps1; the OpenCode command can include the bypass flag"

    - scenario: "dotnet tool install -g fails due to NuGet source unavailability or permissions"
      likelihood: low
      impact: medium
      mitigation: "Script checks if aspire-dashboard is already installed (dotnet tool list -g); skips install if present; if install fails, prints manual install command and exits"

  assumptions:
    - ".NET 10 SDK is installed and dotnet CLI is on PATH"
    - "PowerShell 5.1 or later is available (Windows default)"
    - "SQL Server LocalDB is installed and running (existing app requirement)"
    - "Ports 18888 and 18889 are available on localhost (Aspire Dashboard defaults)"
    - "The Aspire.Dashboard .NET global tool supports net10.0 runtime"
    - "No TLS certificate issues for localhost:7161 (existing dev cert must be trusted)"
    - "The script is for local development only — not for production deployment"
    - "Aspire Dashboard OTLP endpoint uses gRPC on port 18889 (matching existing OTLP exporter gRPC default)"

