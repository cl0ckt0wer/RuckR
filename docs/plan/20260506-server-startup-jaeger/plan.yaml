  # ========================================================================
  # WAVE 2: Startup Script
  # ========================================================================
  - id: T3
    title: "Create server startup PowerShell script (scripts/start-ruckr.ps1)"
    description: >
      Create a single PowerShell script `scripts/start-ruckr.ps1` that orchestrates
      the full RuckR development startup workflow. The script performs the following
      phases in order:

      **Phase 0 — Tool Check**: Verify dotnet CLI is on PATH. Check if Aspire.Dashboard
      is installed (`dotnet tool list -g`); install if missing.

      **Phase 1 — Start Aspire Dashboard**: Launch the dashboard as a background process
      using `Start-Process -NoNewWindow` (or `Start-Job` for output capture). Wait for
      dashboard readiness by polling `http://localhost:18888` (up to 15s). If dashboard
      fails to start (port conflict), print the conflicting process info and exit.

      **Phase 2 — Build**: Run `dotnet build RuckR.sln` with colorized output. Check
      exit code; abort on failure with build error summary.

      **Phase 3 — Start Server**: Set `$env:OTEL_EXPORTER_OTLP_ENDPOINT` and launch
      the server via `Start-Job -Name RuckRServer { dotnet run ... }` (matching the
      AGENTS.md documented pattern). Redirect stdout+stderr to a timestamped log file
      at `docs/plan/20260506-server-startup-jaeger/logs/server-{timestamp}.log`.
      The job runs in background — this is non-blocking.

      **Phase 4 — Health Poll**: Poll `GET https://localhost:7161/api/telemetry/health`
      every 2 seconds up to a configurable timeout (default 60s). Print progressive
      dots. On success, print green checkmark. On timeout, print the last N lines of
      the server log and exit with instructions.

      **Phase 5 — Summary**: Print a formatted summary table:
      - Aspire Dashboard UI: http://localhost:18888
      - OTLP Endpoint: http://localhost:18889
      - App URL: https://localhost:7161
      - App HTTP: http://localhost:5282
      - Server Log: {logFilePath}
      - Stop Commands: `Get-Job -Name RuckRServer | Stop-Job; Get-Job -Name RuckRServer | Remove-Job`

      **Phase 6 — Keep Alive**: Print "Press Ctrl+C to stop all processes." The script
      remains running to keep the PowerShell session alive (the jobs are tied to the
      session). On Ctrl+C, cleanly stop the dashboard process and server job.

      **Parameters** (optional):
      - `-DashboardPort 18888` — override dashboard UI port
      - `-OtlpPort 18889` — override OTLP endpoint port
      - `-TimeoutSeconds 60` — override health poll timeout
      - `-SkipBuild` — skip build phase (assumes already built)
      - `-LaunchProfile https` — override launch profile (default: https)

      Include comment-based help at the top of the script with .SYNOPSIS, .DESCRIPTION,
      .PARAMETER blocks. Use Write-Host with colors for user-facing output (Green=success,
      Yellow=warning, Red=error, Cyan=info). Use Write-Output for loggable output.
    wave: 2
    agent: gem-implementer
    prototype: false
    priority: high
    status: pending
    dependencies: [T1, T2]
    context_files:
      - path: AGENTS.md
        description: "Lines 41-55: canonical Start-Job pattern for server startup"
      - path: RuckR/Server/Properties/launchSettings.json
        description: "Launch profiles with URLs and environment variables"
      - path: RuckR/Server/Controllers/TelemetryController.cs
        description: "Lines 30-34: GET /api/telemetry/health endpoint for readiness polling"
    estimated_effort: medium
    estimated_files: 1
    estimated_lines: 120
    focus_area: server-startup-jaeger-otel
    tech_stack: [PowerShell 5.1+, .NET 10 CLI, Aspire.Dashboard]
    test_coverage: null
    research_sources:
