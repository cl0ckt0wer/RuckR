tasks:
  # ========================================================================
  # WAVE 1: Aspire Dashboard Installation + Endpoint Configuration
  # ========================================================================
  - id: T1
    title: "Install Aspire.Dashboard .NET global tool"
    description: >
      Install the Aspire.Dashboard .NET global tool on the development machine.
      Run `dotnet tool install -g Aspire.Dashboard` to install the latest stable
      version. If already installed (detected via `dotnet tool list -g`), skip
      installation and report existing version. Verify the tool is callable by
      running `aspire-dashboard --version` or `dotnet aspire-dashboard --version`.
      This tool provides an OTLP-compatible telemetry backend with a built-in
      web UI — no Docker, no external services, no configuration files needed.
      The dashboard listens on http://localhost:18888 (UI) and http://localhost:18889
      (OTLP gRPC) by default.
    wave: 1
    agent: gem-devops
    prototype: false
    priority: high
    status: pending
    dependencies: []
    context_files:
      - path: RuckR/Server/Program.cs
        description: "Confirms UseOtlpExporter() uses gRPC — Aspire Dashboard natively accepts OTLP/gRPC"
      - path: RuckR/Server/RuckR.Server.csproj
        description: "Confirms OpenTelemetry.Exporter.OpenTelemetryProtocol 1.11.2 is installed"
    estimated_effort: small
    estimated_files: 0
    estimated_lines: 0
    focus_area: server-startup-jaeger-otel
    tech_stack: [.NET 10, Aspire.Dashboard, dotnet CLI]
    test_coverage: null
    research_sources:
