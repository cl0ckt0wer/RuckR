    verification:
      - "scripts/start-ruckr.ps1 exists and is valid PowerShell syntax"
      - "Script comment-based help is accessible via Get-Help .\\scripts\\start-ruckr.ps1"
      - "Running script starts Aspire Dashboard on http://localhost:18888"
      - "Running script builds solution and starts server on https://localhost:7161"
      - "Server health endpoint returns 200 within timeout"
      - "Ctrl+C stops both processes cleanly"
      - "Server log file created with stdout+stderr output"
    acceptance_criteria:
      - "Phase 0: dotnet CLI and Aspire.Dashboard verified/installed"
      - "Phase 1: Aspire Dashboard starts non-blocking; port conflict handled with clear error"
      - "Phase 2: dotnet build runs; failure aborts script with non-zero exit code"
      - "Phase 3: Server starts via Start-Job with OTEL_EXPORTER_OTLP_ENDPOINT set; stdout+stderr captured to log"
      - "Phase 4: Health endpoint polled at 2s intervals; timeout at 60s default; dots printed during wait; timeout prints last 20 log lines"
      - "Phase 5: Summary table printed with all URLs, log path, and stop instructions"
      - "Phase 6: Script stays alive; Ctrl+C handler stops dashboard + server; cleanup message printed"
      - "All 5 optional parameters supported and documented in comment-based help"
      - "Script uses colored output (Green/Yellow/Red/Cyan) for user-facing messages"
