plan_id: "20260506-server-startup-jaeger"
objective: >
  Automate RuckR server startup with a single PowerShell script that launches both the
  Aspire Dashboard (OTEL backend) and the server, configures the OTLP exporter endpoint
  to the dashboard's native OTLP port, and provides an OpenCode slash command for
  one-command startup. Replaces manual inline PowerShell with a reusable, documented
  workflow that gives developers instant distributed tracing visibility.
created_at: "2026-05-06T23:00:00Z"
created_by: gem-planner
status: pending
research_confidence: high
plan_metrics:
  wave_1_task_count: 2
  total_dependencies: 4
  risk_score: low
tldr: >
  4 waves, 5 tasks. Wave 1: install Aspire.Dashboard global tool + set OTLP endpoint
  in launchSettings.json. Wave 2: create scripts/start-ruckr.ps1 (starts dashboard +
  builds + starts server non-blocking, polls health, prints summary). Wave 3: create
  .opencode/commands/start-server.md (OpenCode slash command wrapping the script).
  Wave 4: run script and verify both server health and dashboard structured logs page
  receive telemetry with no connection errors. Zero code changes beyond one env var.

open_questions:
  - question: "Is PowerShell 7+ (pwsh) available, or only Windows PowerShell 5.1?"
    context: "Start-Job works in both; Start-Process -NoNewWindow is PS 5.1+. The script should target Windows PowerShell 5.1 for maximum compatibility on Windows dev machines."
    type: nice_to_know
    affects: [T3]

  - question: "Should OTEL_EXPORTER_OTLP_ENDPOINT be set only in the script, or also in launchSettings.json for IDE-launched sessions?"
    context: "Setting in launchSettings.json ensures dotnet run from Visual Studio/Rider also exports to the dashboard. Setting only in the script means IDE-launched sessions won't export."
    type: decision_blocker
    affects: [T2]

gaps:
