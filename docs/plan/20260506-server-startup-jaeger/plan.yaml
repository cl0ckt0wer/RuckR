      - "Tool version is latest stable (no --version pin unless specified)"
    acceptance_criteria:
      - "Aspire.Dashboard installed as a global .NET tool"
      - "Tool executable available on PATH (aspire-dashboard or dotnet aspire-dashboard)"
      - "Installation is idempotent — second run skips if already present"
    failure_modes:
      - scenario: "NuGet source unavailable or authentication required for global tool install"
        likelihood: low
        impact: medium
        mitigation: "Print manual install URL (https://www.nuget.org/packages/Aspire.Dashboard) and fallback instructions; suggest --add-source if using private feed"
      - scenario: "aspire-dashboard command not found on PATH after install (dotnet tools directory not in PATH)"
