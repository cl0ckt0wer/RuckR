  # ========================================================================
  # WAVE 4: Verification
  # ========================================================================
  - id: T5
    title: "Verify end-to-end: server health, dashboard telemetry, no connection errors"
    description: >
      Run the `scripts/start-ruckr.ps1` script and perform a comprehensive verification
      that the entire telemetry pipeline is working end-to-end:

      **(A) Server Health Check**: Confirm `GET https://localhost:7161/api/telemetry/health`
      returns `{"status":"healthy",...}` with HTTP 200. This proves the server started
      and the telemetry controller is functional.

      **(B) OTLP Exporter Configuration**: Confirm `GET https://localhost:7161/api/telemetry/status`
      reports `otlpEndpoint` as `http://localhost:18889` (not the default localhost:4317).
      This proves the env var from launchSettings.json was picked up.

      **(C) Aspire Dashboard UI**: Navigate to `http://localhost:18888` in a browser.
      Verify the dashboard loads and displays the "Structured Logs" page. Confirm that
      log entries from RuckR.Server appear (look for the seed service log entries:
      "Seed data generation skipped" or "Seeded X players"). This proves OTLP log
      export is working.

      **(D) Traces Page**: In the Aspire Dashboard, navigate to the "Traces" page.
      Verify that HTTP request traces appear (look for GET requests to /api/telemetry/health
      or /api/telemetry/status from the health polling). This proves OTLP trace export
      is working.

      **(E) No Connection Errors**: Check the server log file for any `connection_error`
      or `error.type` entries related to OTLP export. Confirm zero connection errors.
      Previously (with no collector), the server log showed `http.client.request.duration`
      with `error.type:connection_error` for localhost:4317. With the Aspire Dashboard
      running, these errors should be absent.

      **(F) Metrics Page**: In the Aspire Dashboard, navigate to the "Metrics" page.
      Verify that runtime metrics appear (dotnet.gc.*, dotnet.process.*, http.client.*).
      This proves OTLP metric export is working.

      Record evidence: screenshot of dashboard structured logs page showing server log
      entries, screenshot of traces page showing HTTP traces, and the server log file
      confirming zero OTLP connection errors. Save evidence to
      `docs/plan/20260506-server-startup-jaeger/screenshots/`.
