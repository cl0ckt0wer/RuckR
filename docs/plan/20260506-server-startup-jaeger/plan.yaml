    failure_modes:
      - scenario: "Start-Process for Aspire Dashboard spawns window that immediately closes (dashboard crashes)"
        likelihood: low
        impact: medium
        mitigation: "Capture dashboard stderr via -RedirectStandardError; if dashboard process exits within 5s, print stderr output and exit"
      - scenario: "Health endpoint returns non-200 (e.g., 503) during startup because EF migrations are running"
        likelihood: medium
        impact: low
