      - "http profile contains OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:18889"
      - "Server starts with dotnet run --launch-profile https and logs show OTLP endpoint as localhost:18889"
    acceptance_criteria:
      - "OTEL_EXPORTER_OTLP_ENDPOINT added to https profile environmentVariables"
      - "OTEL_EXPORTER_OTLP_ENDPOINT added to http profile environmentVariables"
