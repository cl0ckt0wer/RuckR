patterns_found:
  - category: architecture
    pattern: API Controller with in-memory static data
    description: |
      Controllers follow [ApiController] + [Route("[controller]")] pattern, inherit ControllerBase,
      inject ILogger<T>, and store data in static fields (no database, no repository, no service layer).
      URL path derives from controller class name: WeatherForecastController → /WeatherForecast.
    examples:
      - file: WeatherForecastController.cs
        location: RuckR/Server/Controllers/WeatherForecastController.cs:6-33
        snippet: |
          [ApiController]
          [Route("[controller]")]
          public class WeatherForecastController : ControllerBase
          {
              private static readonly string[] Summaries = new[] { ... };
              [HttpGet]
              public IEnumerable<WeatherForecast> Get() { ... }
          }
    prevalence: common

  - category: structure
    pattern: Direct HttpClient injection in Blazor pages
    description: |
      Client pages inject HttpClient directly via @inject (not through a typed service wrapper).
      API calls use GetFromJsonAsync<T>() with the controller route name as a relative URL.
      BaseAddress is set in Client/Program.cs to the host origin — so the Blazor WASM app
      calls back to its own server.
    examples:
      - file: FetchData.razor
        location: RuckR/Client/Pages/FetchData.razor:3,43-46
        snippet: |
          @inject HttpClient Http
          forecasts = await Http.GetFromJsonAsync<WeatherForecast[]>("WeatherForecast");
    prevalence: common

  - category: architecture
    pattern: Blazor WASM hosted model (single server hosts API + serves WASM)
    description: |
      The Server project hosts both the ASP.NET Core API (controllers) AND serves the compiled
      Blazor WebAssembly client. The client is never run standalone. All /api routes are handled
      by controllers; any unmatched route falls back to index.html (the WASM SPA entry point).
    examples:
      - file: Program.cs (Server)
        location: RuckR/Server/Program.cs:26-34
        snippet: |
          app.UseBlazorFrameworkFiles();
          app.MapControllers();
          app.MapFallbackToFile("index.html");
    prevalence: common

  - category: structure
    pattern: Three-project solution (Server, Client, Shared)
    description: |
      Standard Blazor WASM hosted template structure. Shared holds models consumed by both
      Server (serialization) and Client (deserialization). Server references both Client
      (to serve WASM assets) and Shared. Client references Shared only.
    examples:
      - file: RuckR.Server.csproj
        location: RuckR/Server/RuckR.Server.csproj:14-16
        snippet: |
          <ProjectReference Include="..\Client\RuckR.Client.csproj" />
          <ProjectReference Include="..\Shared\RuckR.Shared.csproj" />
    prevalence: common

  - category: naming
    pattern: Controller route name matches controller class name minus "Controller" suffix
    description: |
      The [Route("[controller]")] token automatically strips "Controller" from the class name.
      WeatherForecastController → /WeatherForecast. A ProfileController would become /Profile.
    examples:
      - file: WeatherForecastController.cs
        location: RuckR/Server/Controllers/WeatherForecastController.cs:7
        snippet: "[Route(\"[controller]\")]"
    prevalence: common

  - category: structure
    pattern: Page-level @using for Shared namespace
    description: |
      Client _Imports.razor does not include RuckR.Shared or RuckR.Shared.Models. Each page
      that needs shared models adds its own @using directive at the top of the file.
    examples:
      - file: FetchData.razor
        location: RuckR/Client/Pages/FetchData.razor:2
        snippet: "@using RuckR.Shared"
    prevalence: common

  - category: error_handling
    pattern: Null-check loading state
    description: |
      Pages check if fetched data is null and show a "<em>Loading...</em>" message during initial load.
      No try/catch for HTTP errors exists in the current codebase — errors are unhandled.
    examples:
      - file: FetchData.razor
        location: RuckR/Client/Pages/FetchData.razor:11-14
        snippet: |
          @if (forecasts == null)
          {
              <p><em>Loading...</em></p>
          }
    prevalence: common

  - category: architecture
    pattern: No authentication, no authorization
    description: |
      No auth middleware registered in Program.cs. No [Authorize] attributes anywhere.
      No Identity, no JWT, no cookie auth. Profile will be unauthenticated — single shared profile.
    examples:
      - file: Program.cs (Server)
        location: RuckR/Server/Program.cs:3-36
        snippet: "// No AddAuthentication, UseAuthentication, or UseAuthorization calls"
    prevalence: common

