plan_id: profile-feature-research
objective: Research what "finish the profile feature" should mean for this Blazor WASM project and produce concrete implementation specifications.
focus_area: profile-feature
created_at: 2026-05-05T21:47:00Z
created_by: RESEARCHER
status: completed
tldr: |
  - Profile is a 3-file stub: ProfileModel (Name+Biography), Profile.razor (6-line empty page), NavMenu link. No controller, no service, no DB, no auth.
  - The existing pattern is WeatherForecastController: [ApiController]+[Route("[controller]")] returning static in-memory data; client uses HttpClient.GetFromJsonAsync<T>() directly in the page.
  - ADR-002 mandates the profile follows this exact pattern: controller in RuckR.Server.Controllers, model in RuckR.Shared.Models, Razor page in RuckR.Client.Pages.
  - Implementation requires: expanding ProfileModel (6 fields), creating ProfileController (GET+PUT), building Profile.razor (view/edit toggle, form validation), and cleaning ProfileModel's unused usings.
  - No architecture changes needed: same in-memory static storage, same direct-HttpClient pattern, same page-level DI.

