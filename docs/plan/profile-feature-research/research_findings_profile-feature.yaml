open_questions:
  - question: Should the profile data persist across server restarts?
    context: The WeatherForecastController uses static in-memory data that resets on restart. Without a database, the profile will behave the same way — any edits will be lost when the server restarts.
    type: decision_blocker
    affects: [ProfileController data storage strategy]
  - question: Is this a single-user profile or should there be support for multiple profiles?
    context: No auth system exists. Without user identity, only a single shared profile makes sense. Adding multi-user profiles would require authentication infrastructure (Identity, JWT, cookies, etc.) which is out of scope.
    type: research
    affects: [ProfileModel design, ProfileController route design]
  - question: Should ProfileModel be in the RuckR.Shared namespace (like WeatherForecast) or RuckR.Shared.Models?
    context: WeatherForecast.cs is in namespace RuckR.Shared (root). ProfileModel.cs is in namespace RuckR.Shared.Models (sub-namespace). Inconsistency exists.
    type: nice_to_know
    affects: [Namespace consistency, @using directives in Profile.razor]
  - question: What should the initial/default profile data be?
    context: The profile starts empty (Name=null, Biography=null). Should the controller initialize defaults so the page shows something meaningful before the user edits?
    type: nice_to_know
    affects: [ProfileController GET initial state]

gaps:
  - area: Data persistence
    description: No database, no file storage, no caching. Profile data lives only in server memory and disappears on restart. The WeatherForecastController has the same limitation — this is the established pattern for the project.
    impact: research_blocker
    affects: [ProfileController]
  - area: Authentication
    description: No identity system, no auth middleware, no user concept. Profile is a single shared resource with no access control. Adding auth would require significant infrastructure (Identity, JWT, cookies, user store).
    impact: nice_to_know
    affects: [ProfileController (future), Profile.razor (future)]
  - area: Service layer
    description: No service abstraction between controllers and data. Controllers own their data directly in static fields. For a single-controller demo this is fine; if the app grows, a service layer should be introduced.
    impact: nice_to_know
    affects: [ProfileController, future controllers]
  - area: Error handling infrastructure
    description: Current codebase has zero HTTP error handling (no try/catch in FetchData.razor). Profile page should introduce basic error handling patterns that future pages can copy.
    impact: nice_to_know
    affects: [Profile.razor]
  - area: Testing
    description: No test projects, no test frameworks, no test patterns established. Profile feature will not have automated tests.
    impact: nice_to_know
    affects: [All new files]
