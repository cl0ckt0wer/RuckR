status: completed
tldr: |
  - .NET 10 SDK 10.0.203 (stable) installed locally; NuGet stable is 10.0.7 for all Blazor WASM packages
  - ASP.NET Core 10.0.7 runtime and .NET Core 10.0.7 runtime installed locally
  - Migration is 8→9→10 cumulative: MapStaticAssets (9), HttpClient streaming default (10), blazor.boot.json inlined (10), Router NotFoundPage replaces <NotFound> fragment (10)
  - Critical files: 3 .csproj, Server/Program.cs, Client/Program.cs, Client/App.razor, Client/wwwroot/index.html, Client/wwwroot/service-worker.js
  - No global.json, no Directory.Build.props; SupportedPlatform "browser" remains valid in .NET 10
