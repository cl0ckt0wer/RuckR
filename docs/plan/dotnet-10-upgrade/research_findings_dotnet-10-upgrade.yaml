open_questions:
  - question: Does the project use any .NET 8 APIs that are obsoleted or removed in .NET 10?
    context: The .NET 10 breaking changes list includes API obsoletions in core libraries and ASP.NET Core. Current code uses basic APIs (WebApplication, WebAssemblyHostBuilder, HttpClient) which are all still present in .NET 10, but a full compilation test after upgrade should verify.
    type: research
    affects:
      - RuckR.Server
      - RuckR.Client
      - RuckR.Shared
  - question: Does the client use HttpClient.ReadAsStreamAsync with synchronous Stream.Read?
    context: .NET 10 enables HttpClient response streaming by default in Blazor WASM. ReadAsStreamAsync now returns BrowserHttpReadStream (not MemoryStream), which does not support synchronous operations like Stream.Read(Span<Byte>). If the code uses synchronous reads, it will break.
    type: research
    affects:
      - RuckR.Client
  - question: Is the existing <NotFound> content in App.razor needed as a dedicated NotFound.razor page?
    context: In .NET 10, the Router <NotFound> render fragment is no longer supported. Must create a NotFound.razor page and set Router NotFoundPage parameter. The existing inline content ("Sorry, there's nothing at this address.") needs migration.
    type: decision_blocker
    affects:
      - RuckR.Client
gaps:
  - area: Full compilation verification
    description: Research confirms all known changes, but actual compilation after applying changes will reveal any project-specific issues (e.g., transitive dependency version conflicts, API obsoletions in used types).
    impact: research_blocker
    affects:
      - all projects
  - area: HttpClient streaming compatibility
    description: Cannot confirm from source code alone whether the project uses synchronous Stream.Read on HttpClient responses. Code review or compilation test needed.
    impact: decision_blocker
    affects:
      - RuckR.Client
  - area: NotFound.razor page migration
    description: The <NotFound> fragment in App.razor must be replaced with a NotFoundPage parameter pointing to a new NotFound.razor page. This is a code change, not just a config change.
    impact: decision_blocker
    affects:
      - RuckR.Client
