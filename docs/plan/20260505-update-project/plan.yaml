tldr: |
  Two-wave upgrade for RuckR Blazor WASM Hosted:
  Wave 1: .NET 8→10 TFM migration across all 3 projects, NuGet packages 8.0.0→10.0.7,
  code migrations (MapStaticAssets, Router NotFoundPage, service worker updateViaCache).
  Wave 2: Finish Profile feature stub — expand ProfileModel (6 fields with DataAnnotations),
  create ProfileController (GET/PUT), implement Profile.razor (view/edit toggle with EditForm).
