    - "No HttpClient synchronous Stream.Read usage exists in codebase (verified by research)"
    - "Single-user in-memory profile is acceptable (no auth, no DB)"
    - "Build verification is sufficient — no automated tests exist"
implementation_specification:
  code_structure: "3-project solution: RuckR.Server (ASP.NET Core host), RuckR.Client (Blazor WASM SPA), RuckR.Shared (shared models library)"
  affected_areas:
    - "All 3 .csproj files (TFM + package versions)"
    - "Server/Program.cs (middleware pipeline — MapStaticAssets + WithStaticAssets)"
    - "Client/App.razor (Router NotFoundPage parameter)"
    - "Client/Pages/NotFound.razor (new file — extracted NotFound content)"
    - "Client/wwwroot/index.html (service worker updateViaCache)"
    - "Shared/Models/ProfileModel.cs (expand from 2 to 6 properties + DataAnnotations)"
    - "Server/Controllers/ProfileController.cs (new file — GET/PUT endpoints)"
    - "Client/Pages/Profile.razor (full implementation from 6-line stub)"
  component_details:
    - component: RuckR.Server
      responsibility: "ASP.NET Core host; API controllers; serves compiled Blazor WASM assets"
      interfaces: ["ProfileController: GET /Profile, PUT /Profile"]
      dependencies:
        - component: RuckR.Client
          relationship: "ProjectReference — serves compiled WASM"
        - component: RuckR.Shared
          relationship: "ProjectReference — uses ProfileModel"
        - component: Microsoft.AspNetCore.Components.WebAssembly.Server
          relationship: "NuGet 10.0.7 — WASM hosting middleware"
      integration_points: ["Program.cs middleware pipeline", "Controllers/"]
    - component: RuckR.Client
      responsibility: "Blazor WebAssembly SPA (PWA); renders UI in browser"
      interfaces: ["Profile.razor page at /profile", "HttpClient → Server API"]
      dependencies:
        - component: RuckR.Shared
          relationship: "ProjectReference — uses ProfileModel"
        - component: Microsoft.AspNetCore.Components.WebAssembly
          relationship: "NuGet 10.0.7 — WASM runtime"
        - component: Microsoft.AspNetCore.Components.WebAssembly.DevServer
          relationship: "NuGet 10.0.7 (PrivateAssets=all) — dev debugging"
      integration_points: ["App.razor Router", "wwwroot/index.html", "Pages/"]
    - component: RuckR.Shared
      responsibility: "Shared models/types consumed by both Server and Client"
      interfaces: ["ProfileModel class with 6 properties + DataAnnotations"]
      dependencies: []
      integration_points: ["Models/ProfileModel.cs"]
