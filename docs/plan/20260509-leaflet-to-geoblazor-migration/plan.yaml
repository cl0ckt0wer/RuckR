      dependencies: []
      integration_points: ["Added as child of MapView, before GraphicsLayers"]

    - component: WindowInteropService (Blazorators-generated)
      responsibility: "Replace connection-status.module.js — wraps window.addEventListener('online'/'offline', ...) via Blazorators source generator."
      interfaces: ["Window.AddEventListener('online', callback)", "Window.AddEventListener('offline', callback)"]
