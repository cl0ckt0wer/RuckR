tldr: >
  3 waves, 11 tasks.
  W1 — Setup: GeoBlazor NuGet + Blazorators NuGets + DI.
  W2 — Rewrite: replace MapService + leaflet-map.module.js with GeoBlazor MapView/GraphicsLayer;
        replace localStorage calls with IStorageService; replace connection-status.module.js
        and client-logging.module.js with Blazorators-generated services.
  W3 — Cleanup: delete all remaining manual JS interop files, remove Leaflet CDN, full build verification.

  Key architectural decisions:
  - WebTileLayer + OSM UrlTemplate (no ArcGIS API key needed for free tile access)
  - Blazorators source generator for custom interop (Window online/offline, error logging)
  - Blazor.LocalStorage.WebAssembly for localStorage (replaces direct IJSRuntime calls)
  - Keep geolocation.module.js as-is (already on Blazorators)

open_questions:
  - description: "GeoBlazor 4.4.4 targets net8.0 — will it work with our net10.0 WASM project?"
    resolution_needed: true
    hint: "NuGet gallery shows net10.0 as 'computed' compatible. Verify at build time."
  - description: "Can we use WebTileLayer with OSM tiles without any ArcGIS API key at all?"
    resolution_needed: false
    answer: "YES. WebTileLayer is a generic XYZ tile fetcher. No ArcGIS key needed. BasemapStyle with OsmStandard requires ArcGIS styles API; WebTileLayer bypasses it entirely."
  - description: "Does GeoBlazor's ArcGIS JS SDK add significant bundle size vs Leaflet?"
    resolution_needed: true
    hint: "ArcGIS JS SDK ~400KB gzipped vs Leaflet ~40KB. Larger initial load but offset by zero custom interop code and CDN caching."
  - description: "Blazorators custom interop for window.onerror — does the source generator support event-listener-with-callback patterns?"
    resolution_needed: true
    hint: "May need a small hand-written JS shim even with Blazorators. Check Blazor.SourceGenerators docs for callback patterns."

pre_mortem:
  overall_risk_level: medium
  critical_failure_modes:
    - scenario: "GeoBlazor NuGet incompatible with net10.0-wasm target"
      likelihood: low
      impact: high
      mitigation: "Verify at first build. If incompatible, pin to net8.0 TFM for Client project as emergency fallback, or wait for GeoBlazor update."
    - scenario: "ArcGIS CDN blocked in user's region/corporate firewall"
      likelihood: low
      impact: high
      mitigation: "Provide fallback: keep leaflet-map.module.js archived; toggle via feature flag. Document self-hosting ArcGIS JS SDK option."
    - scenario: "Visual markers don't match current Leaflet custom HTML/CSS styling"
      likelihood: medium
      impact: medium
      mitigation: "GeoBlazor SimpleMarkerSymbol is less customizable than Leaflet divIcon. Accept visual differences for MVP. Can add custom renderer later via JSModule if needed."
    - scenario: "Map click hit-testing doesn't identify which Graphic was clicked"
      likelihood: low
      impact: medium
      mitigation: "GeoBlazor MapView.OnClick provides ClickEvent with MapPoint. Use GraphicsLayer.Graphics collection + GeometryEngine.Contains or distance check to identify clicked graphic."
    - scenario: "Blazorators source generator fails on Window event listener interop"
      likelihood: medium
      impact: medium
      mitigation: "Keep connection-status.module.js and client-logging.module.js as fallbacks. Migrate only localStorage to Blazorators if the custom interop proves problematic."

