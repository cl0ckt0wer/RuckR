created_by: gem-planner
status: in-progress

progress_summary: >
  Wave 1 complete (GeoBlazor NuGet added, DI configured, imports added).
  Wave 2 partially complete — Map.razor fully rewritten with GeoBlazor, connection-status.module.js removed.
  Wave 3 mostly complete — Leaflet CDN removed, leaflet-map.module.js deleted, IMapService/MapService deleted.
  Remaining: client-logging.module.js / BrowserErrorLogger deferred (kept as fallback per plan).

research_confidence: high

