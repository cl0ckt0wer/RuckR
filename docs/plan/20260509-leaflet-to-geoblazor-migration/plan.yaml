    - component: ErrorLoggerService (Blazorators-generated)
      responsibility: "Replace client-logging.module.js — wraps window.onerror + onunhandledrejection via Blazorators source generator."
      interfaces: ["Window.onerror = handler", "Window.onunhandledrejection = handler"]
      dependencies: [Blazor.SourceGenerators]
      integration_points: ["BrowserErrorLogger.cs uses generated IWindowService instead of manual DotNetObjectReference"]

    - component: IStorageService (Blazorators/Blazor.LocalStorage.WebAssembly)
      responsibility: "Replace direct IJSRuntime localStorage calls — get/set items via typed C# API."
      interfaces: ["GetItem<T>(key)", "SetItem(key, value)"]
      dependencies: [Blazor.LocalStorage.WebAssembly NuGet]
