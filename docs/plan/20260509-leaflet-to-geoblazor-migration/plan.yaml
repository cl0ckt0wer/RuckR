plan_id: "20260509-leaflet-to-geoblazor-migration"
objective: >
  Replace Leaflet.js map rendering with GeoBlazor (dymaptic.GeoBlazor.Core) to eliminate
  fragile hand-written JS interop. GeoBlazor provides 100% C# map control via the
  ArcGIS Maps SDK for JavaScript with no custom JS modules required for core functionality.

  In parallel, migrate remaining manual JS interop (connection-status.module.js,
  client-logging.module.js, localStorage calls) to the Blazorators source generator
  pattern — eliminating all fragile DotNetObjectReference / IJSObjectReference code.

