# ========================================================================
# DEPENDENCY NOTES
# ========================================================================
#
# This plan depends on the existing PRD plan (20260505-creature-collector-rugby-gps)
# for model definitions (PlayerModel, PitchModel, GeoPosition) and Fluxor stores.
# The map rewrite (T2-01) requires the Fluxor state management to already exist
# (W4 from the main plan) since Map.razor subscribes to LocationState and MapState.
#
# TIMELINE:
# T1 tasks can start immediately (no dependencies on other workstreams).
# T2 (rewrite) requires T1 + Fluxor stores to be in place.
# T3 cleanup requires T2 to be deployed and verified.
#
